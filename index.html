<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Messale Ambrosiano — Composizione della Messa</title>
<meta name="description" content="Applicazione per comporre e consultare il testo della Messa secondo il Rito Ambrosiano, ad uso personale del celebrante.">
<meta name="theme-color" content="#4a0e16">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bordeaux: #6b1420;
    --bordeaux-dark: #400c13;
    --bordeaux-light: #8a1c2a;
    --oro: #b08d2f;
    --oro-light: #ddc98a;
    --oro-soft: #f0e6c6;
    --carta: #fdfbf5;
    --testo: #241a12;
    --grigio: #6b6258;
    --grigio-soft: #948b7d;
    --bordo: #e2d9c4;
    --rubrica-rossa: #a02020;
    --font-ui: -apple-system, "Segoe UI", "Inter", "Helvetica Neue", Arial, system-ui, sans-serif;
    --font-liturgico: "Iowan Old Style", "Palatino Linotype", "Palatino", Georgia, "Book Antiqua", serif;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(64, 12, 19, 0.06), 0 1px 1px rgba(64,12,19,0.04);
    --shadow-md: 0 6px 20px rgba(64, 12, 19, 0.10), 0 2px 6px rgba(64,12,19,0.06);
    --shadow-lg: 0 18px 48px rgba(64, 12, 19, 0.20), 0 6px 16px rgba(64,12,19,0.10);
    --ease: cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: linear-gradient(180deg, #f4efe4 0%, #efe8d9 100%);
    color: var(--testo);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button, .sezione-btn, .drawer-close, section.sezione > .sezione-title {
    -webkit-tap-highlight-color: transparent;
  }
  header.app-header {
    background: linear-gradient(135deg, var(--bordeaux-light) 0%, var(--bordeaux-dark) 100%);
    color: #fff;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 3px solid var(--oro);
    box-shadow: var(--shadow-md);
    position: relative;
    z-index: 1;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    /* Logo ricolorato in bianco, senza sfondo/cerchio: l'altezza è fissata
       a un valore vicino alla somma delle righe di titolo e sottotitolo,
       ma "align-items: center" (anziché "stretch") su .header-brand fa sì
       che sia SEMPRE il blocco di testo a determinare l'altezza della riga
       dell'header, non il logo: così l'header resta esattamente alto
       quanto era prima di aggiungere il logo, che si limita a comparire
       centrato accanto al testo senza mai forzarne la crescita.
       max-height fa da rete di sicurezza per gli stessi motivi. */
    height: 2.7rem;
    max-height: 100%;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
  }
  header.app-header h1 {
    margin: 0;
    font-family: var(--font-liturgico);
    font-size: 1.5rem;
    letter-spacing: 1.2px;
    font-weight: 500;
    text-transform: uppercase;
  }
  header.app-header .sub {
    font-family: var(--font-ui);
    font-size: 0.82rem;
    letter-spacing: 0.4px;
    opacity: 0.7;
    margin-top: 4px;
  }
  /* --- Isola galleggiante (dock stile iOS) con le azioni principali --- */
  #dock {
    position: fixed;
    left: 50%;
    bottom: calc(22px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: linear-gradient(135deg, var(--bordeaux-light) 0%, var(--bordeaux-dark) 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
    max-width: calc(100vw - 16px);
  }
  #dock button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.88);
    cursor: pointer;
    transition: background 0.18s var(--ease), transform 0.18s var(--ease), color 0.18s var(--ease);
  }
  #dock button svg { width: 22px; height: 22px; }
  #dock button:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
  #dock button:active { transform: translateY(0); }
  #dock button:focus-visible { outline: 2px solid var(--oro-light); outline-offset: 2px; }
  #dock button.dock-primary {
    background: linear-gradient(135deg, var(--oro-light) 0%, var(--oro) 100%);
    color: var(--bordeaux-dark);
  }
  #dock button.dock-primary:hover { background: linear-gradient(135deg, #f0e2ae 0%, var(--oro-light) 100%); }
  .dock-sep {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.18);
    margin: 0 2px;
  }
  @media (max-width: 600px) {
    #dock { bottom: calc(14px + env(safe-area-inset-bottom, 0px)); gap: 4px; padding: 6px; }
    #dock button { width: 48px; height: 48px; }
    #dock button svg { width: 19px; height: 19px; }
  }

  main {
    display: block;
  }

  .panel-select {
    padding: 28px 24px calc(130px + env(safe-area-inset-bottom, 0px));
    max-width: 900px;
    margin: 0 auto;
  }
  /* Il testo composto non viene più mostrato in pagina: resta comunque generato
     nel DOM (nascosto) perché "Modalità celebrazione" e "Stampa / PDF" lo riusano
     come unica fonte di verità. */
  .panel-output {
    display: none;
    padding: 20px;
    background: #fff;
  }

  section.sezione {
    margin-bottom: 14px;
    border: 1px solid var(--bordo);
    border-radius: var(--radius);
    background: var(--carta);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.22s var(--ease), border-color 0.22s var(--ease);
  }
  section.sezione:hover { box-shadow: var(--shadow-md); }
  section.sezione > .sezione-title {
    background: linear-gradient(135deg, var(--bordeaux-light) 0%, var(--bordeaux) 100%);
    color: #fff;
    padding: 14px 18px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    user-select: none;
    transition: background 0.18s var(--ease);
  }
  section.sezione > .sezione-title:hover { background: linear-gradient(135deg, #9c2333 0%, var(--bordeaux) 100%); }
  section.sezione > .sezione-title:focus-visible { outline: 2px solid var(--oro-light); outline-offset: -2px; }
  .sezione-title-main {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
    flex: 1;
  }
  .sezione-title-heading {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sezione-title-heading .titolo-testo {
    font-family: var(--font-liturgico);
    text-transform: uppercase;
  }
  section.sezione .chevron {
    display: inline-block;
    flex-shrink: 0;
    margin-top: 2px;
    transition: transform 0.3s var(--ease);
    font-size: 0.85rem;
    color: var(--oro-light);
  }
  section.sezione.collapsed .chevron { transform: rotate(-90deg); }
  section.sezione > .sezione-body {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 0.32s var(--ease);
  }
  section.sezione.collapsed > .sezione-body { grid-template-rows: 0fr; }
  section.sezione > .sezione-body > .sezione-body-inner {
    overflow: hidden;
    min-height: 0;
    padding: 6px 18px 16px;
  }

  .blocco {
    margin: 14px 0;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--bordo);
  }
  .blocco:last-child { border-bottom: none; }
  .blocco-title {
    font-weight: 600;
    color: var(--bordeaux-dark);
    margin-bottom: 5px;
    font-size: 0.95rem;
    letter-spacing: 0.1px;
  }
  .blocco-note {
    font-size: 0.78rem;
    color: var(--grigio);
    font-style: italic;
    margin-bottom: 6px;
  }
  select.opz-select {
    width: 100%;
    padding: 9px 34px 9px 12px;
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%236b1420"><path d="M5.5 7.5l4.5 4.5 4.5-4.5"/></svg>') no-repeat right 10px center / 14px;
    appearance: none;
    -webkit-appearance: none;
    font-family: var(--font-ui);
    font-size: 0.9rem;
    color: var(--testo);
    cursor: pointer;
    transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }
  select.opz-select:hover { border-color: var(--oro); }
  select.opz-select:focus-visible {
    outline: none;
    border-color: var(--oro);
    box-shadow: 0 0 0 3px rgba(176,141,47,0.25);
  }
  /* Anteprima del testo dell'opzione correntemente selezionata (v. sotto
     ogni select di opzioni): riquadro piccolo, scrollabile, visivamente
     distinto dal testo composto principale. */
  .anteprima-box {
    margin-top: 6px;
    padding: 8px 10px;
    background: #f6f0e2;
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    font-family: var(--font-liturgico);
    font-size: 0.78rem;
    line-height: 1.45;
    color: var(--grigio);
    max-height: 170px;
    overflow-y: auto;
  }
  .anteprima-box:empty { display: none; }
  .anteprima-box .rubrica { display: block; margin-bottom: 0.5em; }
  /* Evidenzia in rosso "[" "]" e il segnaposto "N." nel testo (v. F) */
  .testo-evidenza { color: var(--rubrica-rossa); font-weight: 700; }
  /* Intestazione dei gruppi a scelta unica (mutua esclusione) */
  .gruppo-esclusivo-title {
    margin: 16px 0 4px;
    padding: 8px 10px;
    background: var(--oro-soft);
    border: 1px solid var(--oro-light);
    border-radius: var(--radius-sm);
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--bordeaux-dark);
    letter-spacing: 0.1px;
  }
  textarea.campo-libero {
    width: 100%;
    min-height: 70px;
    padding: 10px 12px;
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 0.92rem;
    resize: vertical;
    background: #fffef9;
    transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }
  textarea.campo-libero:hover { border-color: var(--oro); }
  textarea.campo-libero:focus-visible {
    outline: none;
    border-color: var(--oro);
    box-shadow: 0 0 0 3px rgba(176,141,47,0.25);
  }

  /* ---------------------------------------------------------------------
     EDITOR "APPUNTI" CON FORMATTAZIONE MINIMA (Omelia, Preghiera dei
     fedeli, Avvisi al popolo): barra Grassetto/Corsivo/Sottolineato/
     Elenco puntato sopra un <div contenteditable>, niente librerie esterne.
     --------------------------------------------------------------------- */
  .appunti-editor {
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    background: #fffef9;
    overflow: hidden;
    transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }
  .appunti-editor:focus-within {
    border-color: var(--oro);
    box-shadow: 0 0 0 3px rgba(176,141,47,0.25);
  }
  .appunti-toolbar {
    display: flex;
    gap: 4px;
    padding: 6px 8px;
    background: #f6f0e2;
    border-bottom: 1px solid var(--bordo);
  }
  .appunti-btn {
    min-width: 30px;
    height: 28px;
    padding: 0 8px;
    border: 1px solid var(--bordo);
    border-radius: 6px;
    background: #fff;
    color: var(--bordeaux-dark);
    font-family: var(--font-ui);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
  }
  .appunti-btn:hover { border-color: var(--oro); background: var(--oro-soft); }
  .appunti-btn:nth-child(2) { font-style: italic; }
  .appunti-btn:nth-child(3) { text-decoration: underline; }
  .appunti-editable {
    min-height: 90px;
    max-height: 320px;
    overflow-y: auto;
    padding: 10px 12px;
    font-family: var(--font-ui);
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--testo);
    outline: none;
  }
  .appunti-editable ul { margin: 0.4em 0; padding-left: 1.4em; }
  .appunti-editable:empty::before {
    content: attr(data-placeholder);
    color: var(--grigio-soft);
    font-style: italic;
    pointer-events: none;
  }
  /* Contenitore del contenuto HTML "appunti" dentro il testo composto
     (#testo-composto): eredita la stessa tipografia liturgica del resto
     del testo, così risulta coerente sia in modalità celebrazione sia in
     stampa, pur venendo inserito come HTML anziché tramite formattaTesto(). */
  #testo-composto .appunti-html {
    font-family: inherit;
    font-size: inherit;
    line-height: inherit;
  }
  #testo-composto .appunti-html ul { margin: 0.3em 0 0.9em; padding-left: 1.5em; }
  #testo-composto .appunti-html div,
  #testo-composto .appunti-html p { margin: 0 0 0.4em 0; }

  /* --- Pulsante di aiuto nell'header ("Come funziona questa app") --- */
  .header-help-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-family: var(--font-liturgico);
    font-size: 1.15rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.18s var(--ease), transform 0.18s var(--ease), border-color 0.18s var(--ease);
  }
  .header-help-btn:hover { background: rgba(255,255,255,0.18); border-color: var(--oro-light); transform: translateY(-1px); }
  .header-help-btn:focus-visible { outline: 2px solid var(--oro-light); outline-offset: 2px; }

  /* --- Pulsante "0. Premesse e Prænotanda": stessa veste dei pulsanti di
     sezione, con un accento dorato per segnalare che è consultazione e non
     composizione (non fa parte di MESSALE_DATA.sezioni) --- */
  .sezione-btn.sezione-btn-guida {
    border-color: var(--oro-light);
    background: linear-gradient(160deg, var(--oro-soft) 0%, #f7f1e2 100%);
  }
  .sezione-btn.sezione-btn-guida:hover, .sezione-btn.sezione-btn-guida:focus-visible {
    background: linear-gradient(160deg, #fdf6e3 0%, #f2e6c4 100%);
  }
  .sezione-btn.sezione-btn-guida .sezione-btn-num {
    background: linear-gradient(135deg, var(--oro-light) 0%, var(--oro) 100%);
    color: var(--bordeaux-dark);
  }

  /* --- Contenuto di sola consultazione (guida "Premesse e Prænotanda" e
     guida "Come funziona questa app"): accordion nativo <details>/<summary>,
     senza select né logica di stato --- */
  .guida-intro {
    font-family: var(--font-ui);
    font-size: 0.95rem;
    line-height: 1.62;
    color: var(--testo);
    margin: 2px 0 18px;
  }
  .guida-blocco {
    border: 1px solid var(--bordo);
    border-radius: var(--radius-sm);
    background: var(--carta);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .guida-blocco > summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 16px;
    font-family: var(--font-liturgico);
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--bordeaux-dark);
    background: linear-gradient(135deg, #f9f3e4 0%, #f6efdd 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    user-select: none;
  }
  .guida-blocco > summary::-webkit-details-marker { display: none; }
  .guida-blocco > summary::after {
    content: "›";
    color: var(--oro);
    font-size: 1.15rem;
    transition: transform 0.25s var(--ease);
    flex-shrink: 0;
  }
  .guida-blocco[open] > summary::after { transform: rotate(90deg); }
  .guida-blocco > summary:hover { background: linear-gradient(135deg, #f3e8ce 0%, #efe1c1 100%); }
  .guida-blocco-body {
    padding: 4px 18px 16px;
    font-family: var(--font-ui);
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--testo);
  }
  .guida-blocco-body p { margin: 0 0 12px; }
  .guida-blocco-body p:last-child { margin-bottom: 0; }
  .guida-blocco-body strong { color: var(--bordeaux-dark); }
  .guida-blocco-body ul, .guida-blocco-body ol { margin: 0 0 12px; padding-left: 20px; }
  .guida-blocco-body li { margin-bottom: 6px; }
  .guida-nota-rossa { color: var(--rubrica-rossa); font-style: italic; }
  .guida-grassetto-demo { font-weight: 700; }
  .guida-badge-esempio {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--oro-light) 0%, var(--oro) 100%);
    color: var(--bordeaux-dark);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .guida-sempre-incluso {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    background: var(--oro-soft);
    border: 1px solid var(--oro-light);
    color: var(--bordeaux-dark);
    font-size: 0.72rem;
    font-weight: 600;
  }

  /* ---------------------------------------------------------------
     GRIGLIA DEI 5 PULSANTI DI SEZIONE + FINESTRE A SCOMPARSA (drawer)
     Sostituisce il precedente accordion: ogni sezione principale è ora
     un pulsante che apre una finestra dedicata con solo i suoi blocchi.
     ------------------------------------------------------------- */
  .sezioni-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .sezione-btn {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    gap: 18px;
    padding: 26px 24px;
    min-height: 96px;
    width: 100%;
    border: 1px solid var(--bordo);
    border-radius: var(--radius);
    background: linear-gradient(160deg, var(--carta) 0%, #f7f1e2 100%);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    font-family: var(--font-ui);
    color: var(--bordeaux-dark);
    text-align: left;
    transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease), border-color 0.2s var(--ease), background 0.2s var(--ease);
  }
  .sezione-btn:hover, .sezione-btn:focus-visible {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
    border-color: var(--oro);
    background: linear-gradient(160deg, #fffdf7 0%, #f4ecd6 100%);
  }
  .sezione-btn:focus-visible { outline: 2px solid var(--oro); outline-offset: 2px; }
  .sezione-btn:active { transform: translateY(0); }
  .sezione-btn-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bordeaux-light) 0%, var(--bordeaux-dark) 100%);
    color: var(--oro-soft);
    font-family: var(--font-liturgico);
    font-size: 1rem;
    flex-shrink: 0;
  }
  .sezione-btn-title {
    font-family: var(--font-liturgico);
    text-transform: uppercase;
    font-size: 1.05rem;
    letter-spacing: 0.4px;
    line-height: 1.3;
    flex: 1;
  }
  .sezione-btn-chevron {
    flex-shrink: 0;
    color: var(--oro);
    font-size: 1.1rem;
    opacity: 0.7;
  }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(36, 26, 18, 0.42);
    backdrop-filter: blur(1.5px);
    z-index: 600;
    opacity: 0;
    transition: opacity 0.28s var(--ease);
  }
  .drawer-overlay.is-open { opacity: 1; }

  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(480px, 100vw);
    max-width: 100vw;
    background: var(--carta);
    z-index: 601;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    opacity: 0;
    transition: transform 0.32s var(--ease), opacity 0.32s var(--ease);
  }
  .drawer.is-open { transform: translateX(0); opacity: 1; }
  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;

  @media (max-width: 768px) {

     appesantisce la lettura durante la messa: la si nasconde qui, restando
     comunque visibile nella vista normale e in stampa. */

    display: none;
  }

  /* --- Modalità celebrazione (lettura a schermo intero) --- */
  #celebration-bar {
    display: none;
    position: fixed;
    left: 50%;
    bottom: calc(22px + env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    z-index: 10000;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: linear-gradient(135deg, var(--bordeaux-light) 0%, var(--bordeaux-dark) 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
    max-width: calc(100vw - 16px);
  }
  #celebration-bar button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;

  }
  #celebration-bar button svg { width: 22px; height: 22px; }
  #celebration-bar button:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
  #celebration-bar button:active { transform: translateY(0); }
  #celebration-bar button:focus-visible { outline: 2px solid var(--oro-light); outline-offset: 2px; }
  #celebration-bar button.dock-primary {
    background: linear-gradient(135deg, var(--oro-light) 0%, var(--oro) 100%);
    color: var(--bordeaux-dark);

  #celebration-bar button.dock-primary:hover { background: linear-gradient(135deg, #f0e2ae 0%, var(--oro-light) 100%); }

  /* ---------------------------------------------------------------------
     SPLASH SCREEN INIZIALE
     Breve animazione liturgica mostrata al primo caricamento: una croce
     dorata che si "disegna" tramite stroke-dashoffset su SVG, un bagliore
     caldo pulsante dietro di essa e il titolo dell'app che appare in
     dissolvenza. Cliccabile per saltare subito, si chiude comunque da sola
     dopo pochi secondi (vedi script in fondo alla pagina). Puro CSS/SVG,
     nessuna dipendenza esterna.
  --------------------------------------------------------------------- */
  #splash-screen {
    position: fixed;
    inset: 0;
    z-index: 20000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: radial-gradient(ellipse at 50% 40%, var(--bordeaux-light) 0%, var(--bordeaux-dark) 62%, #2a080d 100%);
    cursor: pointer;
    overflow: hidden;
    animation: splash-in 0.5s var(--ease) both;
  }
  #splash-screen.splash-hide {
    animation: splash-out 0.6s var(--ease) both;
    pointer-events: none;
  }
  @keyframes splash-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes splash-out { from { opacity: 1; } to { opacity: 0; } }

  .splash-glow {
    position: absolute;
    width: 60vmin;
    height: 60vmin;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,214,140,0.55) 0%, rgba(240,214,140,0.12) 45%, rgba(240,214,140,0) 72%);
    animation: splash-pulse 2.6s ease-in-out infinite;
    filter: blur(2px);
  }
  @keyframes splash-pulse {
    0%, 100% { transform: scale(0.92); opacity: 0.75; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .splash-logo {
    position: relative;
    width: 132px;
    height: auto;
    /* Il logo è già bianco e senza sfondo (stesso file usato nell'header);
       il bagliore dorato dietro (.splash-glow) resta invariato, qui si
       aggiunge solo un'ombra dorata soffusa coerente con lo stile che
       aveva la croce disegnata in precedenza. */
    filter: drop-shadow(0 0 14px rgba(240,214,140,0.55));
    opacity: 0;
    transform: scale(0.85);
    animation: splash-logo-in 1.3s var(--ease) 0.15s forwards;
  }
  @keyframes splash-logo-in {
    to { opacity: 1; transform: scale(1); }
  }

  .splash-title {
    position: relative;
    font-family: var(--font-liturgico);
    color: var(--oro-soft);
    font-size: clamp(1.2rem, 6vw, 1.6rem);
    letter-spacing: 1.2px;
    font-weight: 500;
    text-align: center;
    text-transform: uppercase;
    opacity: 0;
    padding: 0 6vw;
    animation: splash-fade-up 0.9s var(--ease) 1.5s forwards;
  }
  .splash-subtitle {
    position: relative;
    font-family: var(--font-ui);
    color: rgba(255,255,255,0.65);
    font-size: clamp(0.7rem, 3vw, 0.82rem);
    letter-spacing: 0.4px;
    text-align: center;
    opacity: 0;
    padding: 0 6vw;
    animation: splash-fade-up 0.9s var(--ease) 1.9s forwards;
  }
  .splash-hint {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom, 0px) + 14px);
    font-family: var(--font-ui);
    color: rgba(255,255,255,0.45);
    font-size: 0.75rem;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: splash-fade-up 0.9s var(--ease) 2.4s forwards;
  }
  @media (max-height: 480px) {
    #splash-screen { gap: 12px; }
    .splash-logo { width: 78px; }
    .splash-hint { bottom: max(10px, env(safe-area-inset-bottom, 0px) + 6px); font-size: 0.68rem; }
  }
  @keyframes splash-fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    #splash-screen, #splash-screen * { animation-duration: 0.01ms !important; animation-delay: 0s !important; }
  }
</style>

<script>
const MESSALE_DATA = {"sezioni":[{"titolo":"Riti di introduzione","blocchi":[{"titolo":"Segno della croce","opzioni":[{"etichetta":"Formula","testo":"Nel nome del Padre e del Figlio e dello Spirito Santo.\n[[R]]Amen.","rubrica":"Terminato il canto d'ingresso, il sacerdote e i fedeli, in piedi, fanno il segno della croce."}]},{"titolo":"Saluto iniziale","opzioni":[{"etichetta":"1ª formula (2Cor 13,13)","testo":"La grazia del Signore nostro Gesù Cristo, l'amore di Dio Padre e la comunione dello Spirito Santo siano con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"2ª formula (1Cor 1,3)","testo":"La grazia e la pace di Dio nostro Padre e del Signore nostro Gesù Cristo siano con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"3ª formula (Rt 2,4)","testo":"Il Signore sia con voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"3ª formula (Rt 2,4) — formula episcopale","testo":"La pace sia con voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il vescovo rivolge il saluto al popolo, allargando le braccia e dicendo (in luogo di «Il Signore sia con voi»):"},{"etichetta":"4ª formula (2Ts 3,5)","testo":"Il Signore, che guida i nostri cuori all'amore e alla pazienza di Cristo, sia con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"5ª formula (Rm 15,13)","testo":"Il Dio della speranza, che ci riempie di ogni gioia e pace nella fede per la potenza dello Spirito Santo, sia con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"6ª formula (Ef 6,23)","testo":"La pace, la carità e la fede da parte di Dio Padre e del Signore nostro Gesù Cristo siano con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"},{"etichetta":"7ª formula (1Pt 1,1-2)","testo":"Fratelli e sorelle, eletti secondo la prescienza di Dio Padre mediante la santificazione dello Spirito per obbedire a Gesù Cristo e per essere aspersi del suo Sangue, grazia e pace in abbondanza siano con tutti voi.\n[[R]]E con il tuo spirito.","rubrica":"Quindi il sacerdote rivolge il saluto al popolo, allargando le braccia e dicendo:"}],"note":"Il sacerdote, o il diacono, o un altro ministro, può introdurre brevemente i fedeli alla Messa del giorno."},{"titolo":"Atto penitenziale — Monizione introduttiva","opzioni":[{"etichetta":"1ª","testo":"Fratelli e sorelle, per celebrare degnamente i santi misteri, riconosciamo i nostri peccati.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"2ª","testo":"Invitati dal Signore alla mensa del suo sacrificio redentore, umiliamoci pentiti dinanzi a lui, perché alle debolezze della nostra umana miseria supplisca il perdono della sua infinita misericordia.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"3ª","testo":"Il Signore Gesù, che ci invita alla mensa della parola e dell'Eucaristia, ci chiama alla conversione. Riconosciamo di essere peccatori e invochiamo con fiducia la misericordia di Dio.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"4ª","testo":"Gesù Cristo, il giusto, intercede per noi e ci riconcilia con il Padre. Apriamo il nostro spirito al pentimento, per essere meno indegni di accostarci alla mensa del Signore.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"5ª","testo":"Il Signore ha detto: «Chi di voi è senza peccato, scagli la prima pietra». Riconosciamoci tutti peccatori e perdoniamoci a vicenda dal profondo del cuore.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"6ª","testo":"Accostiamoci con fiducia a Dio, nostro Padre; nella sua bontà perdoni le nostre colpe, perché possiamo partecipare ai santi misteri con l'abito nuziale della sua grazia.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"7ª","testo":"Il Signore è buono, eterna è la sua misericordia; le nostre colpe meritano condanna, ma egli è il Dio che accoglie e che perdona.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."},{"etichetta":"8ª (specialmente nelle domeniche e nel tempo pasquale)","testo":"Cristo risorto ha vinto il peccato e la morte. Chiediamo il perdono delle nostre colpe perché possiamo camminare nella vita nuova.","rubrica":"Il sacerdote invita i fedeli al pentimento. Segue una breve pausa di silenzio."}],"note":"Il sacerdote invita i fedeli al pentimento con queste parole o con altre simili. Segue una breve pausa di silenzio."},{"titolo":"Atto penitenziale — 1ª formula: invocazioni con Kýrie eléison","opzioni":[{"etichetta":"Invocazioni comuni","testo":"Tu che sei inviato dal Padre per salvare i contriti di cuore, Kýrie eléison.\n[[R]]Kýrie eléison.\n\nTu che sei venuto a chiamare i peccatori, Kýrie eléison.\n[[R]]Kýrie eléison.\n\nTu che intercedi per noi presso il Padre, Kýrie eléison.\n[[R]]Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale a) Per la nostra salvezza","testo":"Tu che ti sei fatto uomo per salvarci, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei morto in croce per tutti gli uomini, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci hai riaperto la via del cielo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale b) Buon pastore","testo":"Tu, buon pastore, che conosci le tue pecorelle, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che vai in cerca della pecorella smarrita, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci guidi ai pascoli eterni del cielo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale c) Via, verità e vita","testo":"Tu che sei la via per ricondurci al Padre, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei la verità per illuminare i popoli, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei la vita per rinnovare il mondo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale d) Mite e umile di cuore","testo":"Tu che hai parole di vita eterna, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei mite e umile di cuore, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che per noi ti sei fatto obbediente fino alla morte, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale e) Perdono a Pietro","testo":"Tu che a Pietro pentito hai offerto il tuo perdono, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che al ladro in croce hai promesso il paradiso, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che hai donato agli apostoli il tuo Spirito per la remissione dei peccati, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale f) Disceso dal cielo","testo":"Tu che sei disceso dal cielo per la nostra salvezza, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei morto in croce per darci la tua vita, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei risorto e sei salito al cielo per condurci al Padre, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale g) Non a condannare","testo":"Tu che sei venuto non a condannare, ma a perdonare, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che fai festa per ogni peccatore pentito, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che perdoni molto a chi molto ama, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale h) Cercare chi era perduto","testo":"Tu che sei venuto a cercare chi era perduto, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei venuto per dare la vita in riscatto per tutti, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che raccogli nell'unità i figli dispersi, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Feriale i) Pienezza di grazia","testo":"Tu che sei la pienezza di verità e di grazia, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ti sei fatto povero per arricchirci, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei venuto a fare di noi il tuo popolo santo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Avvento — a)","testo":"Tu che sei venuto nel mondo per salvarci, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che continui a visitarci con la grazia del tuo Spirito, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che verrai un giorno a giudicare le nostre opere, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Avvento — b)","testo":"Tu che sei il difensore dei poveri, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei il rifugio dei deboli, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei la speranza dei peccatori, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Avvento — c)","testo":"Tu che vieni a visitare il tuo popolo nella pace, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che vieni a salvare chi è perduto, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che vieni a creare un mondo nuovo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Natale — a)","testo":"Tu, Figlio di Dio, che nascendo da Maria Vergine ti sei fatto nostro fratello, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu, Figlio dell'uomo, che conosci e comprendi la nostra debolezza, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu, Figlio unigenito del Padre, che fai di noi una sola famiglia, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Natale — b)","testo":"Tu che sei re della pace, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei luce nelle tenebre, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei immagine dell'uomo nuovo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo dopo l'Epifania — a)","testo":"Tu che ti sei manifestato potente in parole e opere, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ricolmi la Chiesa con l'esuberanza dei tuoi doni, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che riveli all'umanità l'infinita misericordia del Padre, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo dopo l'Epifania — b)","testo":"Tu che ti sei manifestato come la fonte della gioia, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ti sei rivelato potente sulle forze del male, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che apri a tutti gli uomini i tesori della divina clemenza, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Quaresima — a)","testo":"Tu che comandi di perdonarci prima di venire al tuo altare, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sulla croce hai invocato il perdono per i peccatori, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che affidi alla tua Chiesa il ministero della Riconciliazione, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Quaresima — b)","testo":"Tu che nell'acqua e nello Spirito ci hai rigenerato a tua immagine, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che mandi il tuo Spirito a creare in noi un cuore nuovo, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci fai partecipi del tuo Corpo e del tuo Sangue, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Quaresima — c)","testo":"Tu che fai passare dalla morte alla vita chi ascolta la tua parola, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che hai voluto essere innalzato da terra per attirarci a te, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci sottoponi al giudizio della tua croce, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Pasqua — a)","testo":"Tu che sei nostra pace, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei nostra Pasqua, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei nostra vita, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Pasqua — b)","testo":"Tu che sei l'eterno sacerdote della nuova alleanza, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci edifichi come pietre vive nel tempio santo di Dio, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci fai concittadini dei santi nel regno dei cieli, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo di Pasqua — c)","testo":"Tu che, asceso alla destra del Padre, ci fai dono del tuo Spirito, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sostieni ogni cosa con la potenza della tua parola, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei re dell'universo e dominatore dei secoli, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo dopo Pentecoste — a)","testo":"Tu che porti a compimento la storia della salvezza, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che nella Chiesa rinnovi il patto di alleanza con il popolo della promessa, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che sei il passato, il presente e il futuro del mondo e della storia, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo dopo Pentecoste — b)","testo":"Tu che hai amato la Chiesa e hai dato tutto te stesso per lei, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ogni giorno purifichi la tua Chiesa perché sia santa e immacolata, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che fai di noi un regno di sacerdoti e una nazione santa, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."},{"etichetta":"Tempo dopo Pentecoste — c)","testo":"Tu che vuoi che tutti gli uomini siano salvati e giungano alla conoscenza della verità, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che mandi i tuoi discepoli fino ai confini della terra per evangelizzare tutte le genti, Kýrie eléison.\n[[R]]℟ Kýrie eléison.\nTu che ci vuoi pietre vive per la costruzione di un edificio spirituale, Kýrie eléison.\n[[R]]℟ Kýrie eléison.","rubrica":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison."}],"note":"Il sacerdote, o un altro ministro idoneo, dice o canta le invocazioni con il Kýrie eléison, scegliendo tra le invocazioni comuni, quelle feriali (a-i) o quelle proprie del tempo liturgico. Segue l'assoluzione del sacerdote."},{"titolo":"Atto penitenziale — 2ª formula: Confesso","opzioni":[{"etichetta":"Confesso (Confiteor)","testo":"Confesso a Dio onnipotente e a voi, fratelli e sorelle, che ho molto peccato in pensieri, parole, opere e omissioni,\n\n[[RUBRICA: E, battendosi il petto, dicono:]]\n\nper mia colpa, mia colpa, mia grandissima colpa.\nE supplico la beata sempre Vergine Maria, gli angeli, i santi e voi, fratelli e sorelle, di pregare per me il Signore Dio nostro.","rubrica":"Si fa una breve pausa di silenzio. Poi tutti insieme pronunciano la formula della confessione generale."}],"note":"Si fa una breve pausa di silenzio. Poi tutti insieme pronunciano la formula della confessione generale."},{"titolo":"Atto penitenziale — 3ª formula: dialogo penitenziale","opzioni":[{"etichetta":"Formula","testo":"Pietà di noi, Signore.\n[[R]]Contro di te abbiamo peccato.\n\nMostraci, Signore, la tua misericordia.\n[[R]]E donaci la tua salvezza.","rubrica":"Si fa una breve pausa di silenzio."}],"note":"Si fa una breve pausa di silenzio."},{"titolo":"Assoluzione del sacerdote","opzioni":[{"etichetta":"Formula","testo":"Dio onnipotente abbia misericordia di noi, perdoni i nostri peccati e ci conduca alla vita eterna.\n[[R]]Amen.","rubrica":"Segue l'assoluzione del sacerdote, che conclude tutte le formule dell'atto penitenziale."}],"note":"Segue l'assoluzione da parte del sacerdote (conclude tutte le formule dell'atto penitenziale)."},{"titolo":"In alternativa: Rito della benedizione e aspersione dell'acqua — Formulario I","opzioni":[{"etichetta":"Monizione + orazione 1","testo":"Fratelli e sorelle carissimi, preghiamo umilmente Dio nostro Padre, perché benedica quest'acqua con la quale saremo aspersi in ricordo del nostro Battesimo. Il Signore rinnovi la nostra vita e ci renda sempre fedeli al dono dello Spirito Santo.\n\nDio onnipotente ed eterno, che hai voluto santificare nell'acqua i tuoi figli per la vita eterna, benedici ✠ quest'acqua perché diventi segno della tua protezione in questo giorno a te consacrato. Rinnova in noi, o Padre, la fonte viva della grazia e difendici da ogni male perché veniamo a te con cuore puro. Per Cristo nostro Signore.\n[[R]]Amen."},{"etichetta":"Monizione + orazione 2 (alternativa)","testo":"Fratelli e sorelle carissimi, preghiamo umilmente Dio nostro Padre, perché benedica quest'acqua con la quale saremo aspersi in ricordo del nostro Battesimo. Il Signore rinnovi la nostra vita e ci renda sempre fedeli al dono dello Spirito Santo.\n\nDio onnipotente, origine e fonte della vita, benedici ✠ quest'acqua, perché, purificàti da ogni colpa, otteniamo la grazia del perdono, la difesa da ogni insidia del Maligno e la tua perenne protezione. La tua misericordia, o Padre, faccia sgorgare per la vita eterna una sorgente di acqua viva, perché, liberi da ogni pericolo, possiamo venire a te con cuore rinnovato. Per Cristo nostro Signore.\n[[R]]Amen."},{"etichetta":"Orazione 3 (tempo pasquale, se non si usa l'acqua della veglia)","testo":"Dio di bontà e di misericordia, ascolta la preghiera di questo popolo che ricorda l'opera mirabile della creazione e la grazia ancora più mirabile della salvezza. Dégnati di benedire ✠ quest'acqua creata a portare fertilità alla terra, freschezza e sollievo ai nostri corpi. In questo tuo dono riveli molti segni della tua benevolenza. Passando per le acque del Mar Rosso, Israele ha raggiunto la libertà promessa; una sorgente, che hai fatto scaturire nel deserto, ha sollevato il tuo popolo dal tormento della sete; con l'immagine dell'acqua viva i profeti hanno offerto agli uomini l'annuncio della nuova alleanza. Infine, nell'acqua del fiume Giordano, santificato da Cristo, tuo Figlio, hai dato inizio al popolo nuovo, liberato dalla colpa d'origine nel sacramento della rinascita. Nel segno di quest'acqua benedetta, ravviva, o Padre, il ricordo del nostro Battesimo e raduna l'assemblea gioiosa di tutti i fratelli, battezzati nel mistero pasquale di Cristo Signore, che vive e regna nei secoli dei secoli.\n[[R]]Amen."}],"note":"Sostituisce l'atto penitenziale, specialmente ogni domenica (nel tempo pasquale è raccomandato il Formulario II). Segue l'aspersione con eventuale antifona, e l'orazione conclusiva sotto."},{"titolo":"In alternativa: Rito della benedizione e aspersione dell'acqua — Formulario II","opzioni":[{"etichetta":"Monizione + tre invocazioni","testo":"Fratelli e sorelle carissimi, invochiamo la benedizione di Dio nostro Padre, perché questo rito di aspersione ravvivi in noi la grazia del Battesimo, per mezzo del quale siamo stati immersi nella morte redentrice del Signore per risorgere con lui alla vita nuova. (Tutti pregano in silenzio.)\n\nDio creatore, che nell'acqua e nello Spirito hai dato forma e volto all'uomo e all'universo.\n[[R]]Purifica e benedici la tua Chiesa.\n\nCristo, che dal costato trafitto sulla croce hai fatto scaturire i sacramenti della nostra salvezza.\n[[R]]Purifica e benedici la tua Chiesa.\n\nSpirito Santo, che dal grembo battesimale della Chiesa ci hai fatto rinascere come nuove creature.\n[[R]]Purifica e benedici la tua Chiesa.\n\nO Dio, che raduni la tua Chiesa, sposa e corpo del Signore, nel giorno memoriale della risurrezione, benedici il tuo popolo e ravviva in noi per mezzo di quest'acqua il gioioso ricordo e la grazia della prima Pasqua nel Battesimo. Per Cristo nostro Signore.\n[[R]]Amen."},{"etichetta":"Monizione + tre invocazioni (tempo pasquale)","testo":"Fratelli e sorelle carissimi, invochiamo la benedizione di Dio nostro Padre, perché questo rito di aspersione ravvivi in noi la grazia del Battesimo, per mezzo del quale siamo stati immersi nella morte redentrice del Signore per risorgere con lui alla vita nuova. (Tutti pregano in silenzio.)\n\nPadre, gloria a te, che dall'Agnello immolato sulla croce fai scaturire le sorgenti dell'acqua viva.\n[[R]]Gloria a te, o Signore.\n\nCristo, gloria a te, che rinnovi la giovinezza della Chiesa nel lavacro dell'acqua con la parola della vita.\n[[R]]Gloria a te, o Signore.\n\nSpirito, gloria a te, che dalle acque del Battesimo ci fai riemergere come primizia dell'umanità nuova.\n[[R]]Gloria a te, o Signore.\n\nO Dio, che raduni la tua Chiesa, sposa e corpo del Signore, nel giorno memoriale della risurrezione, benedici il tuo popolo e ravviva in noi per mezzo di quest'acqua il gioioso ricordo e la grazia della prima Pasqua nel Battesimo. Per Cristo nostro Signore.\n[[R]]Amen."},{"etichetta":"Se non si usa l'acqua della veglia pasquale","testo":"Dio onnipotente, che nei santi segni della nostra fede rinnovi i prodigi della creazione e della redenzione, benedici ✠ quest'acqua, e fa' che tutti i rinati nel Battesimo siano annunciatori e testimoni della Pasqua che sempre si rinnova nella tua Chiesa. Per Cristo nostro Signore.\n[[R]]Amen."}],"note":"Nel tempo pasquale, se il popolo riceve l'acqua già benedetta nella veglia pasquale, è d'obbligo l'uso di questo Formulario II."},{"titolo":"Conclusione del rito dell'aspersione","opzioni":[{"etichetta":"Formula finale","testo":"Dio onnipotente ci purifichi dai peccati e per questa celebrazione ci renda degni di partecipare alla mensa del suo regno, per tutti i secoli dei secoli.\n[[R]]Amen.","rubrica":"Il sacerdote asperge se stesso, i ministri, il clero e il popolo, quindi torna alla sede."}],"note":"Il sacerdote asperge se stesso, i ministri, il clero e il popolo, quindi torna alla sede; a questo punto, omesso tutto il resto, si prosegue con il Gloria, quando è prescritto."},{"titolo":"Gloria","opzioni":[{"etichetta":"Testo italiano","testo":"Gloria a Dio nell'alto dei cieli e pace in terra agli uomini, amati dal Signore.\nNoi ti lodiamo, ti benediciamo, ti adoriamo, ti glorifichiamo, ti rendiamo grazie per la tua gloria immensa,\nSignore Dio, Re del cielo, Dio Padre onnipotente.\nSignore, Figlio unigenito, Gesù Cristo, Signore Dio, Agnello di Dio, Figlio del Padre,\ntu che togli i peccati del mondo, abbi pietà di noi;\ntu che togli i peccati del mondo, accogli la nostra supplica;\ntu che siedi alla destra del Padre, abbi pietà di noi.\nPerché tu solo il Santo, tu solo il Signore, tu solo l'Altissimo, Gesù Cristo, con lo Spirito Santo: nella gloria di Dio Padre.\n[[R]]Amen.","rubrica":"Si canta o si proclama in piedi, a braccia allargate, quando è prescritto."},{"etichetta":"Testo latino","testo":"Glória in excélsis Deo et in terra pax homínibus bonæ voluntátis.\nLaudámus te, benedícimus te, adorámus te, glorificámus te, grátias ágimus tibi propter magnam glóriam tuam,\nDómine Deus, Rex cæléstis, Deus Pater omnípotens.\nDómine Fili unigénite, Iesu Christe, Dómine Deus, Agnus Dei, Fílius Patris,\nqui tollis peccáta mundi, miserére nobis;\nqui tollis peccáta mundi, súscipe deprecatiónem nostram.\nQui sedes ad déxteram Patris, miserére nobis.\nQuóniam tu solus Sanctus, tu solus Dóminus, tu solus Altíssimus, Iesu Christe, cum Sancto Spíritu: in glória Dei Patris.\n[[R]]Amen.","rubrica":"Si canta o si proclama in piedi, a braccia allargate, quando è prescritto."},{"etichetta":"Nessun Gloria (omesso)","testo":""}],"note":"Si canta o si proclama quando è prescritto (non nelle ferie di Avvento e Quaresima)."},{"titolo":"Orazione all'inizio dell'assemblea liturgica","opzioni":[{"etichetta":"Testo libero (proprio del giorno)","testo":"","rubrica":"Il sacerdote, a mani giunte, introduce l'orazione; quindi, allargando le braccia, la canta o dice."}],"note":"Il sacerdote canta o dice l'orazione propria del giorno (Colletta), che termina con la conclusione lunga. Testo da inserire manualmente, tratto dal Proprio del giorno."}]},{"titolo":"Liturgia della parola","blocchi":[{"titolo":"Benedizione prima della Lettura","opzioni":[{"etichetta":"Se dall'Antico Testamento (lettura profetica)","testo":"Benedicimi, padre.\nLa lettura profetica ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dai libri sapienziali dell'A.T.","testo":"Benedicimi, padre.\nLa lettura sapienziale ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dal Nuovo Testamento (lettura apostolica)","testo":"Benedicimi, padre.\nLa lettura apostolica ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dalla passione/biografia del santo patrono o titolare","testo":"Benedicimi, padre.\nLa parola della Chiesa ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se lo stesso lettore proclama le due letture prima del Vangelo","testo":"Benedicimi, padre.\nLa parola di Dio ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Formula breve (sempre utilizzabile)","testo":"Benedicimi, padre.\nLeggi ✠ nel nome del Signore."}],"note":"Il lettore, prima di annunciare il titolo della Lettura, inchinato verso il sacerdote chiede la benedizione."},{"titolo":"Prima lettura (riferimenti e/o testo)","opzioni":[{"etichetta":"Testo libero (riferimenti e/o testo)","testo":""}],"note":"Prima Lettura, Salmo responsoriale, Epistola (se presente), Vangelo: da inserire secondo il Proprio del giorno. Al termine di ogni lettura biblica il lettore dice «Parola di Dio», il popolo risponde «Rendiamo grazie a Dio»; al termine della lettura della passione di un santo: «Onore e gloria al Signore Nostro Gesù Cristo, che regna nei secoli dei secoli» — «Amen»."},{"titolo":"Salmo (riferimenti e/o testo)","opzioni":[{"etichetta":"Testo libero (riferimenti e/o testo)","testo":""}]},{"titolo":"Benedizione prima della Seconda lettura","opzioni":[{"etichetta":"Se dall'Antico Testamento (lettura profetica)","testo":"Benedicimi, padre.\nLa lettura profetica ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dai libri sapienziali dell'A.T.","testo":"Benedicimi, padre.\nLa lettura sapienziale ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dal Nuovo Testamento (lettura apostolica)","testo":"Benedicimi, padre.\nLa lettura apostolica ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se dalla passione/biografia del santo patrono o titolare","testo":"Benedicimi, padre.\nLa parola della Chiesa ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Se lo stesso lettore proclama le due letture prima del Vangelo","testo":"Benedicimi, padre.\nLa parola di Dio ✠ ci illumini e ci giovi a salvezza."},{"etichetta":"Formula breve (sempre utilizzabile)","testo":"Benedicimi, padre.\nLeggi ✠ nel nome del Signore."}],"note":"Il lettore, prima di annunciare il titolo della Lettura, inchinato verso il sacerdote chiede la benedizione."},{"titolo":"Seconda lettura (riferimenti e/o testo)","opzioni":[{"etichetta":"Testo libero (riferimenti e/o testo)","testo":""}]},{"titolo":"Benedizione prima del Vangelo (diacono/sacerdote)","opzioni":[{"etichetta":"Con diacono","testo":"Benedicimi, padre.\nIl Signore sia nel tuo cuore e sulle tue labbra perché tu possa annunciare degnamente il suo Vangelo: nel nome del Padre e del Figlio ✠ e dello Spirito Santo.\n[[R]]Amen."},{"etichetta":"Senza diacono (sottovoce)","testo":"Purifica il mio cuore e le mie labbra, o Dio onnipotente, perché possa annunciare degnamente il tuo santo Vangelo."}],"note":"Poi: «Il Signore sia con voi» — «E con il tuo spirito». «Lettura del Vangelo secondo N.» — «Gloria a te, o Signore». Al termine: «Parola del Signore» — «Lode a te, o Cristo»."},{"titolo":"Omelia","opzioni":[{"etichetta":"Appunti (spazio per note)","testo":""}],"note":"Prescritta nelle domeniche e feste di precetto, raccomandata negli altri giorni.","note_formattabile":true},{"titolo":"Professione di fede — Monizione introduttiva","opzioni":[{"etichetta":"1ª","testo":"Fratelli e sorelle, chiamati a partecipare dello stesso pane e dello stesso calice, in comunione con tutta la Chiesa cattolica professiamo la nostra fede:"},{"etichetta":"2ª","testo":"Fratelli e sorelle, raccolti dallo stesso Spirito di Cristo, proclamiamo con cuore sincero il simbolo della nostra fede:"},{"etichetta":"3ª","testo":"Fratelli e sorelle, per celebrare con frutto l'Eucaristia, sacramento dell'unità della Chiesa, proclamiamo insieme la fede cattolica:"}]},{"titolo":"Professione di fede — Simbolo niceno-costantinopolitano","opzioni":[{"etichetta":"Testo italiano","testo":"Credo in un solo Dio Padre onnipotente, creatore del cielo e della terra, di tutte le cose visibili e invisibili.\nCredo in un solo Signore, Gesù Cristo, unigenito Figlio di Dio, nato dal Padre prima di tutti i secoli: Dio da Dio, Luce da Luce, Dio vero da Dio vero, generato, non creato, della stessa sostanza del Padre; per mezzo di lui tutte le cose sono state create.\nPer noi uomini e per la nostra salvezza discese dal cielo, e per opera dello Spirito Santo si è incarnato nel seno della Vergine Maria e si è fatto uomo.\nFu crocifisso per noi sotto Ponzio Pilato, morì e fu sepolto. Il terzo giorno è risuscitato, secondo le Scritture, è salito al cielo, siede alla destra del Padre.\nE di nuovo verrà, nella gloria, per giudicare i vivi e i morti, e il suo regno non avrà fine.\nCredo nello Spirito Santo, che è Signore e dà la vita, e procede dal Padre e dal Figlio. Con il Padre e il Figlio è adorato e glorificato, e ha parlato per mezzo dei profeti.\nCredo la Chiesa, una santa cattolica e apostolica. Professo un solo Battesimo per il perdono dei peccati.\nAspetto la risurrezione dei morti e la vita del mondo che verrà. Amen.","rubrica":"Alle parole «e per opera dello Spirito Santo» fino a «si è fatto uomo», tutti si inchinano."},{"etichetta":"Testo latino","testo":"Credo in unum Deum, Patrem omnipoténtem, factórem cæli et terræ, visibílium ómnium et invisibílium.\nEt in unum Dóminum Iesum Christum, Fílium Dei unigénitum, et ex Patre natum ante ómnia sǽcula. Deum de Deo, Lumen de Lúmine, Deum verum de Deo vero, génitum, non factum, consubstantiálem Patri: per quem ómnia facta sunt.\nQui propter nos hómines et propter nostram salútem descéndit de cælis. Et incarnátus est de Spíritu Sancto ex María Vírgine, et homo factus est.\nCrucifíxus étiam pro nobis sub Póntio Piláto; passus et sepúltus est, et resurréxit tértia die, secúndum Scriptúras, et ascéndit ad cælos, sedet ad déxteram Patris.\nEt íterum ventúrus est cum glória, iudicáre vivos et mórtuos, cuius regni non erit finis.\nEt in Spíritum Sanctum, Dóminum et vivificántem: qui ex Patre Filióque procédit. Qui cum Patre et Filio simul adorátur et conglorificátur: qui locútus est per prophétas.\nEt unam, sanctam, cathólicam et apostólicam Ecclésiam. Confíteor unum Baptísma in remissiónem peccatórum.\nEt exspécto resurrectiónem mortuórum, et vitam ventúri sǽculi. Amen.","rubrica":"Alle parole «Et incarnátus... homo factus est», tutti si inchinano."}],"note":"In luogo del Simbolo niceno-costantinopolitano si può usare il Simbolo degli apostoli (sotto), specialmente nel sabato in traditione symboli, nelle Messe per i battezzati e nelle domeniche di quaresima."},{"titolo":"Professione di fede — Simbolo degli apostoli","opzioni":[{"etichetta":"Testo","testo":"Io credo in Dio Padre onnipotente, creatore del cielo e della terra; e in Gesù Cristo, suo unico Figlio, nostro Signore,\nil quale fu concepito di Spirito Santo, nacque da Maria Vergine, patì sotto Ponzio Pilato, fu crocifisso, morì e fu sepolto; discese agli inferi; il terzo giorno risuscitò da morte; salì al cielo, siede alla destra di Dio Padre onnipotente; di là verrà a giudicare i vivi e i morti.\nCredo nello Spirito Santo, la santa Chiesa cattolica, la comunione dei santi, la remissione dei peccati, la risurrezione della carne, la vita eterna. Amen.","rubrica":"Alle parole «il quale fu concepito... Maria Vergine», tutti si inchinano."}]},{"titolo":"Preghiera dei fedeli","opzioni":[{"etichetta":"Appunti (spazio per note)","testo":""}],"note":"Segue la preghiera universale o dei fedeli, con le intenzioni proposte da un lettore o diacono e l'invocazione del popolo.","note_formattabile":true},{"titolo":"Orazione a conclusione della liturgia della parola","opzioni":[{"etichetta":"Testo libero (proprio del giorno)","testo":""}],"note":"Orazione che non va mai omessa; termina con la conclusione breve. Prima, se previsto: «Alziamoci per la preghiera del sacerdote» — «Ci eleviamo a te, Signore»."}]},{"titolo":"Liturgia eucaristica","blocchi":[{"titolo":"Rito della pace (prima dell'offertorio)","opzioni":[{"etichetta":"1ª","testo":"Sia pace tra voi.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."},{"etichetta":"2ª","testo":"Secondo l'ammonimento del Signore, prima di presentare i nostri doni all'altare scambiamoci la pace.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."},{"etichetta":"3ª","testo":"Scambiamoci la pace.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."},{"etichetta":"4ª","testo":"Come figli del Dio della pace, scambiamoci un gesto di comunione fraterna.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."},{"etichetta":"5ª","testo":"In Cristo, che ci ha resi tutti fratelli con la sua croce, scambiamoci il dono della pace.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."},{"etichetta":"6ª","testo":"Nello Spirito del Cristo risorto, scambiamoci il dono della pace.","rubrica":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace e comunione fraterna."}],"note":"Il diacono, o il sacerdote, dice una di queste monizioni; tutti si scambiano un gesto di pace. Quindi si portano all'altare i doni (canto di offertorio)."},{"titolo":"Presentazione delle offerte ai fedeli","opzioni":[{"etichetta":"Formula","testo":"Ti benedica il Signore ✠ con questo tuo dono.","rubrica":"Il sacerdote benedice i singoli fedeli che presentano i doni, dicendo:"}]},{"titolo":"Offerta del pane","opzioni":[{"etichetta":"Formula sottovoce","testo":"O Padre clementissimo, accogli questo pane perché diventi il Corpo di Cristo, tuo Figlio.\n\n[[RUBRICA: Quindi depone sul corporale la patena con il pane.]]\n\n","rubrica":"Il sacerdote, all'altare, prende la patena con il pane e, tenendola leggermente sollevata sull'altare, dice sottovoce:"},{"etichetta":"Formula alternativa ad alta voce (se non c'è canto)","testo":"Benedetto sei tu, Signore, Dio dell'universo: dalla tua bontà abbiamo ricevuto questo pane, frutto della terra e del lavoro dell'uomo; lo presentiamo a te perché diventi per noi cibo di vita eterna.\n[[R]]Benedetto nei secoli il Signore.","rubrica":"Se non si esegue il canto di offertorio, il sacerdote dice questa formula ad alta voce; al termine il popolo acclama «Benedetto nei secoli il Signore»:"}]},{"titolo":"Preparazione del calice e offerta del vino","opzioni":[{"etichetta":"Formula sottovoce (mescolanza acqua/vino + offerta)","testo":"\n\n[[RUBRICA: Il diacono, o il sacerdote, versa nel calice il vino con un po' d'acqua, dicendo:]]\n\nDal fianco aperto di Cristo uscì sangue e acqua.\n\n[[RUBRICA: Il sacerdote prende il calice e, tenendolo un poco sollevato sull'altare, dice sottovoce:]]\n\nO Padre clementissimo, accogli questo vino perché diventi il Sangue di Cristo, tuo Figlio.\n\n[[RUBRICA: Quindi depone il calice sul corporale.]]\n\n"},{"etichetta":"Formula alternativa ad alta voce (se non c'è canto)","testo":"Dal fianco aperto di Cristo uscì sangue e acqua.\n\nBenedetto sei tu, Signore, Dio dell'universo: dalla tua bontà abbiamo ricevuto questo vino, frutto della vite e del lavoro dell'uomo; lo presentiamo a te perché diventi per noi bevanda di salvezza.\n[[R]]Benedetto nei secoli il Signore.","rubrica":"Se non si esegue il canto di offertorio, il sacerdote dice questa formula ad alta voce; al termine il popolo acclama «Benedetto nei secoli il Signore»:"}]},{"titolo":"Umili e pentiti (inchinandosi)","opzioni":[{"etichetta":"Formula sottovoce","testo":"Umili e pentiti accoglici, o Signore: ti sia gradito il nostro sacrificio che oggi si compie dinanzi a te.\n\n[[RUBRICA: Il sacerdote, secondo l'opportunità, incensa i doni, la croce e la mensa dell'altare; il diacono incensa il sacerdote e il popolo. Quindi, se necessario, si lava le mani in silenzio.]]\n\n","rubrica":"Il sacerdote, inchinandosi, dice sottovoce:"}],"note":"Segue eventuale incensazione e lavabo, in silenzio."},{"titolo":"Orazione sui doni","opzioni":[{"etichetta":"Testo libero (proprio del giorno)","testo":"","rubrica":"Il sacerdote, con le mani allargate, canta o dice l'orazione, che termina con la conclusione breve."}],"note":"Il sacerdote canta o dice l'orazione propria del giorno; termina con la conclusione breve."},{"titolo":"Antifone proprie (ingresso, offertorio, comunione)","opzioni":[{"etichetta":"Testo libero","testo":""}]},{"titolo":"Dialogo introduttivo e Prefazio","opzioni":[{"etichetta":"Dialogo (fisso)","testo":"\n\n[[RUBRICA: Allargando le braccia, il sacerdote dice:]]\n\nIl Signore sia con voi.\n[[R]]E con il tuo spirito.\n\n[[RUBRICA: Alzando le braccia, prosegue:]]\n\nIn alto i nostri cuori.\n[[R]]Sono rivolti al Signore.\n\n[[RUBRICA: Con le braccia allargate, soggiunge:]]\n\nRendiamo grazie al Signore, nostro Dio.\n[[R]]È cosa buona e giusta.\n\n[[RUBRICA: Il sacerdote continua il Prefazio con le braccia allargate.]]\n\n"},{"etichetta":"Prefazio — testo libero (proprio del giorno/tempo)","testo":"","rubrica":"Testo proprio del Prefazio, da inserire secondo il tempo liturgico o la celebrazione."}],"note":"Il sacerdote continua il Prefazio (proprio del tempo o della celebrazione, da inserire a parte) con le braccia allargate."},{"titolo":"Santo (Sanctus)","opzioni":[{"etichetta":"Testo italiano","testo":"Santo, Santo, Santo il Signore Dio dell'universo. I cieli e la terra sono pieni della tua gloria. Osanna nell'alto dei cieli. Benedetto colui che viene nel nome del Signore. Osanna nell'alto dei cieli.","rubrica":"Alla fine del Prefazio, il sacerdote congiunge le mani e conclude cantando insieme con il popolo, o dicendo ad alta voce:"},{"etichetta":"Testo latino","testo":"Sanctus, Sanctus, Sanctus Dóminus Deus Sábaoth. Pleni sunt cæli et terra glória tua. Hosánna in excélsis. Benedíctus qui venit in nómine Dómini. Hosánna in excélsis.","rubrica":"Alla fine del Prefazio, il sacerdote congiunge le mani e conclude cantando insieme con il popolo, o dicendo ad alta voce:"}]},{"titolo":"Preghiera Eucaristica","tipo":"preghiera_eucaristica","note":"Scegliere quale Preghiera Eucaristica utilizzare (obbligatorio: se ne usa sempre una), l'acclamazione dell'anamnesi dopo la consacrazione (\"Mistero della fede\") e, per le preghiere che ne dispongono (I, II, III e V), le rispettive parti proprie secondo il tempo liturgico o l'occasione (per la I: In comunione / Accetta con benevolenza; per la II: tempo liturgico / inserto per il Battesimo / formula per i defunti; per la III: inserto rituale / tempo liturgico / formula per i defunti; per la V: incipit del racconto dell'istituzione).","preghiere":[{"id":"I","etichetta":"Preghiera Eucaristica I (Canone Romano)","note":"Sempre utilizzabile; particolarmente indicata nei giorni con In comunione (Communicantes) proprio, nelle feste degli apostoli e dei santi menzionati nella preghiera e in tutte le domeniche. Nella Preghiera Eucaristica I si possono omettere le espressioni tra parentesi quadre [ ].","template":"\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, inizia il Canone. Congiunge le mani dicendo «di accettare questi doni» e traccia un segno di croce sulle offerte alle parole «di benedire ✠ queste offerte».]]\n\n[[VOCE: CP]]\n\nPadre clementissimo, noi ti supplichiamo e ti chiediamo per Gesù Cristo, tuo Figlio e nostro Signore, di accettare questi doni, di benedire ✠ queste offerte, questo santo e immacolato sacrificio. Noi te l'offriamo anzitutto per la tua Chiesa santa e cattolica, perché tu le dia pace e la protegga, la raccolga nell'unità e la governi su tutta la terra, con il tuo servo il nostro papa N., il nostro vescovo N., e con tutti quelli che custodiscono la fede cattolica, trasmessa dagli apostoli.\n\n[[VOCE: 1C]]\n\nINTERCESSIONE PER I VIVI\nRicòrdati, Signore, dei tuoi fedeli [N. e N.].\n\n[[RUBRICA: Congiunge le mani e prega brevemente per i vivi che vuole ricordare. Poi, con le braccia allargate, continua:]]\n\nRicòrdati di tutti i presenti, dei quali conosci la fede e la devozione: per loro ti offriamo e anch'essi ti offrono questo sacrificio di lode, e innalzano la preghiera a te, Dio eterno, vivo e vero, per ottenere a sé e ai loro cari redenzione, sicurezza di vita e salute.\n\n[[VOCE: 2C]]\n\nMEMORIA DEI SANTI\nIn comunione con tutta la Chiesa, {{COMMUNICANTES}}la gloriosa e sempre Vergine Maria, madre del nostro Dio e Signore Gesù Cristo, ✝ san Giuseppe, suo sposo, i santi apostoli e martiri: Pietro e Paolo, Andrea, [Giacomo, Giovanni, Tommaso, Giacomo, Filippo, Bartolomeo, Matteo, Simone e Taddeo, Sisto, Lorenzo, Ippolito, Vincenzo, Cornelio e Cipriano, Clemente, Crisogono, Giovanni e Paolo, Cosma e Damiano, Apollinare, Vitale, Nazaro e Celso, Protaso e Gervaso, Vittore, Nàbore, Felice e Calimero,] sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi; per i loro meriti e le loro preghiere donaci sempre aiuto e protezione.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\n[[VOCE: CP]]\n\nAccetta con benevolenza, o Padre, l'offerta che ti presentiamo noi tuoi ministri e tutta la tua famiglia: {{HANC_IGITUR}}\n\n[[RUBRICA: Congiunge le mani; tenendole poi stese sulle offerte, dice:]]\n\n[[VOCE: CC]]\n\nSantifica, o Dio, con la potenza della tua benedizione, questa offerta che noi eleviamo alla tua bontà paterna e dégnati di accettarla a nostro favore, in sacrificio spirituale e perfetto, perché diventi per noi il Corpo e il Sangue del tuo amatissimo Figlio, il Signore nostro Gesù Cristo.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nLa vigilia della sua passione, sofferta per la salvezza nostra e del mondo intero, egli prese il pane, e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, spezzò il pane, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nDopo la cena, allo stesso modo, prese il calice e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Diede loro anche questo comando: ogni volta che farete questo lo farete in memoria di me: predicherete la mia morte, annuncerete la mia risurrezione, attenderete con fiducia il mio ritorno finché di nuovo verrò a voi dal cielo».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[RUBRICA: Con le braccia distese in forma di croce, il sacerdote continua:]]\n\n[[VOCE: CC]]\n\nPer questo, o Padre, noi tuoi ministri e il tuo popolo santo celebriamo il memoriale della passione, della mirabile risurrezione dai morti e della gloriosa ascensione al cielo di Cristo, tuo Figlio e nostro Signore; e offriamo alla tua maestà divina, tra i doni che ci hai dato, la vittima pura, santa e immacolata, il pane santo della vita eterna e il calice dell'eterna salvezza.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\nTu che hai voluto accettare i doni di Abele, il giusto, il sacrificio di Abramo, nostro padre nella fede, e l'oblazione pura e santa di Melchìsedek, tuo sommo sacerdote, volgi sulla nostra offerta il tuo sguardo sereno e benigno.\n\n[[RUBRICA: Si inchina e, a mani giunte, prosegue:]]\n\nTi supplichiamo, Dio onnipotente: fa' che questa offerta, per le mani del tuo angelo santo, sia portata sull'altare del cielo davanti alla tua maestà divina, perché su tutti noi che partecipiamo a questo altare, comunicando al santo mistero del Corpo e Sangue del tuo Figlio, scenda la pienezza di ogni grazia e di ogni benedizione.\n\n[[RUBRICA: In posizione eretta, si segna concludendo.]]\n\nINTERCESSIONE PER I DEFUNTI\n\n[[RUBRICA: Con le braccia allargate, dice:]]\n\n[[VOCE: 3C]]\n\nRicòrdati, o Padre, dei tuoi fedeli [N. e N.], che ci hanno preceduto nel segno della fede e dormono il sonno della pace.\n\n[[RUBRICA: Congiunge le mani e prega brevemente per i defunti che vuole ricordare. Poi, con le braccia allargate, prosegue:]]\n\nA loro, o Padre, e a tutti quelli che riposano in Cristo, dona la beatitudine, la luce e la pace.\n\n[[RUBRICA: Con la destra si batte il petto, dicendo:]]\n\n[[VOCE: 4C]]\n\nAnche a noi, tuoi ministri, ultimi e peccatori,\n\n[[RUBRICA: e, con le braccia allargate, prosegue:]]\n\nma fiduciosi nella tua infinita misericordia, concedi, o Dio, di avere parte alla comunità dei tuoi santi apostoli e martiri: ✝ Giovanni il Battista e Giovanni l'apostolo, Stefano, Barnaba, Agnese e Tecla e tutti i santi; ammettici a godere della loro sorte beata non per i nostri meriti, ma per la ricchezza del tuo perdono.\n\n[[RUBRICA: Congiunge le mani e dice:]]\n\n[[VOCE: CP]]\n\nPer Cristo Signore nostro tu, o Dio, crei e santifichi sempre, fai vivere, benedici e doni al mondo ogni bene per accrescere la nostra fede e liberarci dai nostri peccati.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nDa Cristo, per Cristo e in Cristo, a te, Dio Padre onnipotente, ogni magnificenza, ogni gloriosa lode, ogni sovranità su noi e sul mondo, nell'unità dello Spirito Santo per gli infiniti secoli dei secoli.\n[[R]]Amen.","parti_proprie":{"communicantes":{"titolo":"In comunione (Communicantes) — parte propria","opzioni":[{"etichetta":"— non includere — (giorni feriali)","testo":"ricordiamo e veneriamo anzitutto "},{"etichetta":"Per tutte le domeniche (testo comune)","testo":"mentre celebriamo il giorno nel quale Cristo ha vinto la morte e ci ha resi partecipi della sua vita immortale, ricordiamo e veneriamo anzitutto "},{"etichetta":"Natale","testo":"mentre celebriamo la notte santissima (il giorno santissimo), nella quale (nel quale) Maria, vergine illibata, diede al mondo il Salvatore, ricordiamo e veneriamo anzitutto lei, "},{"etichetta":"Epifania","testo":"mentre celebriamo il giorno santissimo nel quale il tuo unigenito Figlio, eterno con te nella gloria divina, si è manifestato con la vera nostra carne in un corpo visibile, ricordiamo e veneriamo anzitutto "},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua","testo":"mentre celebriamo il giorno santissimo della risurrezione del nostro Salvatore nel suo vero corpo, ricordiamo e veneriamo anzitutto "},{"etichetta":"Ascensione","testo":"mentre celebriamo il giorno santissimo nel quale il tuo unigenito Figlio ha portato alle altezze della sua gloria la fragile nostra natura, che egli aveva unito a sé, ricordiamo e veneriamo anzitutto "},{"etichetta":"Pentecoste","testo":"mentre celebriamo il giorno santissimo della Pentecoste nel quale lo Spirito Santo si manifestò agli apostoli in molteplici lingue di fuoco, ricordiamo e veneriamo anzitutto "}],"placeholder":"{{COMMUNICANTES}}"},"hanc_igitur":{"titolo":"Accetta con benevolenza (Hanc igitur) — parte propria","opzioni":[{"etichetta":"Testo comune","testo":"disponi nella tua pace i nostri giorni, salvaci dalla dannazione eterna, e accoglici nel gregge degli eletti."},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua","testo":"te la offriamo anche per coloro che ti sei degnato di far rinascere dall'acqua e dallo Spirito Santo, accordando loro il perdono di tutti i peccati. Disponi nella tua pace i nostri giorni, salvaci dalla dannazione eterna e accoglici nel gregge degli eletti."}],"placeholder":"{{HANC_IGITUR}}"}}},{"id":"II","etichetta":"Preghiera Eucaristica II","note":"Il prefazio proprio si può utilizzare nelle Messe feriali dei tempi dopo l'Epifania e dopo Pentecoste, o nelle Messe per varie necessità prive di un prefazio proprio (in alternativa si può usare il prefazio del giorno).","template":"[[VOCE: CP]]\n\nÈ veramente cosa buona e giusta, nostro dovere e fonte di salvezza, rendere grazie sempre, qui e in ogni luogo a te, Padre santo, per Gesù Cristo, tuo amatissimo Figlio. Egli è la tua Parola vivente, per mezzo di lui hai creato tutte le cose, lo hai mandato a noi salvatore e redentore, fatto uomo per opera dello Spirito Santo e nato dalla Vergine Maria. Per compiere la tua volontà e acquistarti un popolo santo, egli, nell'ora della passione, stese le braccia sulla croce, morendo distrusse la morte e proclamò la risurrezione. Per questo mistero di salvezza, uniti agli angeli e ai santi, cantiamo a una sola voce la tua gloria: Santo...\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo sei tu, o Padre, fonte di ogni santità.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice; traccia un segno di croce sul pane e sul calice alle parole «il Corpo e ✠ il Sangue»:]]\n\n[[VOCE: CC]]\n\nTi preghiamo: santifica questi doni con la rugiada del tuo Spirito, perché diventino per noi il Corpo e ✠ il Sangue del Signore nostro Gesù Cristo.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nEgli, consegnandosi volontariamente alla passione, prese il pane e rese grazie, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, prese il calice, di nuovo ti rese grazie, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[VOCE: CC]]\n\nCelebrando il memoriale della morte e risurrezione del tuo Figlio, ti offriamo, Padre, il pane della vita e il calice della salvezza, e ti rendiamo grazie perché ci hai resi degni di stare alla tua presenza a compiere il servizio sacerdotale. Ti preghiamo umilmente: per la comunione
