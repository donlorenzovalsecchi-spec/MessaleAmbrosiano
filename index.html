const PREMESSE_GUIDA_HTML = `
<p class="guida-intro">Questa guida sintetizza, per una rapida consultazione, l'Ordinamento del Messale Ambrosiano (le "Premesse e Prænotanda" della II edizione, 2024): il testo che precede il Messale vero e proprio e ne spiega il significato, la struttura e le norme di celebrazione. Non sostituisce il testo integrale, ma aiuta a ritrovare rapidamente un punto prima o durante la preparazione della Messa.</p>

<details class="guida-blocco" open>
<summary>Il senso della celebrazione eucaristica</summary>
<div class="guida-blocco-body">
<p>La Messa non è anzitutto un insieme di parole da dire, ma un'azione di Cristo e della Chiesa: nella Messa si rende presente e attuale, in modo sacramentale, l'unico sacrificio che Cristo ha offerto una volta per sempre sulla croce. Il sacerdote agisce "nella persona di Cristo" e presiede l'assemblea radunata; la comunità, unita a lui, offre insieme il sacrificio e ne riceve i frutti. Per questo la Messa è insieme sacrificio di lode, di ringraziamento, di propiziazione e di espiazione, e in essa Cristo è realmente presente: nell'assemblea riunita nel suo nome, nella persona del ministro, nella sua parola proclamata e, in modo sostanziale e permanente, sotto le specie eucaristiche del pane e del vino consacrati.</p>
<p>La celebrazione eucaristica è "il centro di tutta la vita cristiana", tanto per la Chiesa universale quanto per la comunità locale e per ogni singolo fedele: in essa culmina sia l'azione con cui Dio santifica il mondo in Cristo, sia il culto che gli uomini rendono al Padre per mezzo di Cristo, nello Spirito Santo. Tutte le altre azioni della vita cristiana sono in relazione con la Messa, da essa derivano e a essa sono ordinate.</p>
<p>Questo mistero coinvolge tutti, sebbene con compiti diversi: il popolo cristiano, "stirpe eletta, sacerdozio regale, nazione santa", esercita il proprio sacerdozio battesimale offrendo insieme al sacerdote, mentre a quest'ultimo, in forza dell'ordine sacro, spetta di presiedere e di agire nella persona di Cristo. Anche quando la partecipazione piena dei fedeli non è possibile, la Messa conserva sempre la sua piena efficacia e dignità, perché è sempre azione di Cristo e della Chiesa: per questo il sacerdote è invitato a celebrarla ogni giorno, quando può.</p>
</div>
</details>

<details class="guida-blocco">
<summary>La struttura della Messa e i suoi elementi</summary>
<div class="guida-blocco-body">
<p>La Messa è formata da due parti strettamente unite tra loro, tanto da costituire un unico atto di culto: la <strong>liturgia della parola</strong> e la <strong>liturgia eucaristica</strong>. In essa viene imbandita ai fedeli sia la mensa della parola di Dio sia la mensa del Corpo di Cristo. Ad esse si aggiungono i riti che aprono e chiudono la celebrazione.</p>
<p><strong>Riti di introduzione.</strong> Il canto d'ingresso, il segno della croce, il saluto, l'atto penitenziale (o l'aspersione dell'acqua benedetta), il Gloria e l'orazione all'inizio dell'assemblea hanno lo scopo di far sì che i fedeli riuniti formino una vera comunità e si dispongano ad ascoltare la parola di Dio e a celebrare degnamente l'Eucaristia. Sono riti preparatori: nessuno di essi ha valore a sé, ma servono a mettere l'assemblea nell'atteggiamento giusto.</p>
<p><strong>Liturgia della parola.</strong> Le letture bibliche, con i canti che le accompagnano, ne costituiscono la parte principale: quando nella Chiesa si legge la Sacra Scrittura è Dio stesso che parla al suo popolo e Cristo, presente nella sua parola, annuncia il Vangelo. L'omelia spiega le letture o un altro testo della Messa del giorno e fa parte dell'azione liturgica: è obbligatoria nelle domeniche e feste di precetto con partecipazione di popolo. Seguono la professione di fede (nei giorni previsti) e la preghiera universale, con cui il popolo, radunato attorno alla parola ascoltata, prega per la Chiesa, per il mondo, per chi soffre e per la comunità locale.</p>
<p><strong>Liturgia eucaristica.</strong> Riproduce ciò che Cristo fece nell'ultima Cena: prese il pane e il vino, rese grazie, li spezzò e li diede ai discepoli. Si articola nella preparazione dei doni (con eventuale rito della pace e presentazione del pane e del vino da parte dei fedeli), nella preghiera eucaristica — il momento culminante di tutta la celebrazione, che comprende il prefazio, il Santo, l'epiclesi, il racconto dell'istituzione e la consacrazione, l'anamnesi, l'offerta, le intercessioni e la dossologia finale — e nei riti di comunione: Padre nostro, frazione del pane, "Agnello di Dio" e distribuzione della comunione ai fedeli.</p>
<p><strong>Riti di conclusione.</strong> Comprendono gli eventuali avvisi, il saluto e la benedizione del sacerdote (talvolta in forma più solenne), il congedo del popolo e il bacio dell'altare. Sono riti brevi, il cui scopo è semplicemente rimandare i fedeli "a lodare e benedire il Signore" nella vita quotidiana.</p>
</div>
</details>

<details class="guida-blocco">
<summary>Uffici e ministeri: chi fa cosa</summary>
<div class="guida-blocco-body">
<p>La celebrazione eucaristica è azione di tutto il corpo della Chiesa, e ciascuno vi partecipa secondo il proprio ordine e il proprio compito, senza sostituirsi ad altri: "tutti, sia ministri ordinati sia fedeli laici, esercitando il proprio ministero, compiano solo, ma tutto, ciò che è di loro competenza".</p>
<p>Il <strong>sacerdote</strong>, in virtù della sacra potestà dell'ordine, presiede l'assemblea nella persona di Cristo, ne dirige la preghiera, annuncia il messaggio della salvezza, offre il sacrificio a nome del popolo e distribuisce ai fratelli il pane della vita. A lui spettano in particolare la preghiera eucaristica e le altre "orazioni presidenziali" (colletta, orazione dopo le letture, sui doni, dopo la comunione).</p>
<p>Il <strong>diacono</strong>, se presente, occupa il primo posto dopo il sacerdote: proclama il Vangelo (e talvolta predica), propone le intenzioni della preghiera universale, assiste il sacerdote, prepara l'altare, distribuisce la comunione (specialmente sotto la specie del vino) e può guidare i gesti dell'assemblea.</p>
<p>Il <strong>lettore</strong> proclama le letture (eccetto il Vangelo) e, in mancanza del salmista, il salmo; l'<strong>accolito</strong> serve all'altare, prepara i vasi sacri e può distribuire la comunione come ministro straordinario. Il <strong>salmista</strong> canta o recita il salmo responsoriale; la <strong>schola cantorum</strong> o il <strong>cantore</strong> sostengono il canto proprio e quello dell'assemblea. Altri servizi (sagrestano, commentatore, chi raccoglie le offerte, chi accoglie i fedeli) completano l'organizzazione della celebrazione. Quando mancano ministri istituiti, i loro compiti possono essere affidati ad altri fedeli idonei, uomini e donne, incaricati per l'occasione — ma mai a più persone che si dividono un unico elemento (per esempio una stessa lettura non va spezzata fra due lettori).</p>
<p>Il <strong>popolo</strong>, "stirpe eletta, sacerdozio regale", non è spettatore ma soggetto attivo: ascolta la parola, risponde, canta, prega, offre insieme al sacerdote e riceve la comunione. La sua unità si manifesta anche nei gesti e nelle posture comuni.</p>
</div>
</details>

<details class="guida-blocco">
<summary>Gesti, posture e segni</summary>
<div class="guida-blocco-body">
<p>I gesti e le posture del corpo non sono un dettaglio cerimoniale: manifestano e insieme favoriscono l'intenzione e i sentimenti di chi partecipa, ed esprimono l'unità dell'assemblea. La tradizione distingue tre posture principali: <strong>stare in piedi</strong>, segno della condizione del redento, reso libero dalla Pasqua di Cristo (dall'inizio del canto d'ingresso fino alla colletta compresa; durante l'Alleluia e il Vangelo; durante la preghiera universale; durante il Credo e fino all'orazione sui doni); <strong>stare seduti</strong>, segno di ascolto e di meditazione (durante le letture che precedono il Vangelo e il salmo, l'omelia, la preparazione dell'altare e dei doni); <strong>stare in ginocchio</strong>, segno di penitenza, supplica e adorazione (alla consacrazione, salvo impedimenti). Chi non può inginocchiarsi alla consacrazione fa un profondo inchino mentre il sacerdote genuflette.</p>
<p>La <strong>genuflessione</strong> (piegare il ginocchio destro fino a terra) esprime adorazione ed è riservata al Santissimo Sacramento e alla santa croce. L'<strong>inchino del capo</strong> si fa quando sono nominate insieme le tre Persone divine, al nome di Gesù, della Vergine Maria e del santo del giorno; l'<strong>inchino profondo (di tutto il corpo)</strong> si fa davanti all'altare, in alcuni momenti della preghiera eucaristica I e da parte di lettore e diacono quando chiedono la benedizione prima delle letture.</p>
<p>L'<strong>incensazione</strong> esprime riverenza e preghiera che sale verso Dio: è sempre facoltativa e può accompagnare la processione d'ingresso, l'inizio della Messa (croce e altare), la proclamazione del Vangelo, la presentazione dei doni (con croce, altare, sacerdote e popolo) e l'elevazione dopo la consacrazione. Il <strong>bacio dell'altare</strong> e dell'Evangeliario è segno di venerazione. Il <strong>silenzio</strong>, infine, è parte integrante della celebrazione, non un vuoto da riempire: aiuta il raccoglimento nell'atto penitenziale, la meditazione dopo le letture e l'omelia, il ringraziamento dopo la comunione.</p>
</div>
</details>

<details class="guida-blocco">
<summary>Modalità particolari di celebrazione</summary>
<div class="guida-blocco-body">
<p><strong>Messa con il popolo.</strong> È la forma ordinaria: si intende quella celebrata con la partecipazione dei fedeli, possibilmente con il canto e un congruo numero di ministri, ma può svolgersi anche senza canto e con un solo ministro. Se è presente il diacono compie il proprio ufficio; è bene che assistano anche un accolito, un lettore e un cantore.</p>
<p><strong>Messa concelebrata.</strong> Manifesta in modo particolarmente evidente l'unità del sacerdozio, del sacrificio e di tutto il popolo di Dio. È prescritta per l'ordinazione di vescovo e presbiteri e per la Messa crismale; è raccomandata nella Messa vespertina della cena del Signore, nei concili e sinodi, nella Messa conventuale o principale delle chiese, negli incontri di sacerdoti. Nella preghiera eucaristica, il prefazio e il Santo sono detti da tutti (o dal solo celebrante principale per il prefazio); le parti che tutti i concelebranti devono dire — comprese le parole della consacrazione — si recitano sottovoce, in modo che si senta chiaramente la voce del celebrante principale; solo lui compie i gesti, salvo diversa indicazione.</p>
<p><strong>Messa con un solo ministro.</strong> Quando il sacerdote celebra con la sola presenza di un ministro che gli risponde, si segue sostanzialmente il rito della Messa con il popolo: il ministro pronuncia le parti che spetterebbero al popolo e può leggere i canti (ingresso, dopo il Vangelo, alla frazione del pane, alla comunione). Se il ministro è un diacono, compie i propri uffici specifici. <span class="guida-nota-rossa">In ogni forma di celebrazione, quando si è soli (senza concelebranti), il sacerdote dice comunque per intero tutte le parti previste, comprese quelle che nel Messale sono suddivise per voce (CP/CC/1°-4° concelebrante): la suddivisione serve solo a distribuire i ruoli quando ci sono più celebranti.</span></p>
<p>Il Messale prevede inoltre <strong>adattamenti</strong> per circostanze particolari (Messe con gruppi particolari, con i fanciulli, Messe rituali legate ai sacramenti, Messe per varie necessità e circostanze): in questi casi il sacerdote può scegliere, tra le possibilità offerte dai libri liturgici, i testi e i gesti più adatti ai partecipanti, ricordando però che non gli è consentito aggiungere, togliere o mutare nulla a proprio piacimento nella struttura del rito.</p>
</div>
</details>

<details class="guida-blocco">
<summary>Ciò che serve per celebrare</summary>
<div class="guida-blocco-body">
<p><strong>La chiesa e l'altare.</strong> L'assemblea si raduna normalmente in chiesa; il presbiterio è distinto dalla navata e deve permettere un comodo svolgimento della celebrazione. L'altare — che è insieme il luogo del sacrificio e la mensa del convito — sia possibilmente staccato dalla parete, per potervi girare intorno e celebrare rivolti al popolo, e costituisca il centro verso cui converge l'attenzione dei fedeli; sull'altare o accanto a esso si pongono almeno due candelieri con i ceri accesi (anche quattro, sei, o sette se celebra il vescovo) e la croce con l'immagine di Cristo crocifisso.</p>
<p><strong>Pane e vino.</strong> Il pane per l'Eucaristia dev'essere di solo frumento, azzimo, confezionato di recente, e tale da poter essere davvero spezzato e distribuito; il vino dev'essere genuino "frutto della vite", non alterato. Entrambi vanno conservati con cura, perché non si guastino.</p>
<p><strong>I vasi sacri.</strong> Patena e calice, nei quali si offrono, si consacrano e si consumano il pane e il vino, sono trattati con particolare rispetto: se non sono d'oro, sono dorati almeno all'interno. L'ostensorio ambrosiano ha tradizionalmente la forma "a torre", che allude al santo sepolcro; il turibolo ambrosiano è privo di coperchio.</p>
<p><strong>Le vesti liturgiche.</strong> Il camice (con cingolo, ed eventuale amitto) è la veste comune a tutti i ministri; il sacerdote vi aggiunge la stola e la casula (pianeta); il diacono la stola (portata trasversalmente) e la dalmatica. Il colore delle vesti segue il tempo e la celebrazione del giorno: il <strong>bianco</strong> nel tempo pasquale e natalizio e nelle feste del Signore, della Vergine, degli angeli e dei santi non martiri; il <strong>rosso</strong> nella Settimana Autentica, a Pentecoste, nel tempo dopo Pentecoste, nelle celebrazioni della Passione, della santa Croce e dei martiri; il <strong>verde</strong> nei tempi dopo l'Epifania e dopo la Dedicazione del Duomo; il <strong>morello (violaceo)</strong> in Avvento e Quaresima, oltre che nelle Messe votive per il perdono dei peccati; il <strong>nero</strong>, facoltativamente, nelle ferie di Quaresima e nelle Messe per i defunti.</p>
</div>
</details>

<details class="guida-blocco">
<summary>La scelta della Messa e delle letture</summary>
<div class="guida-blocco-body">
<p>Nelle domeniche e nelle solennità, feste e memorie obbligatorie, se la Messa si celebra con il popolo il sacerdote segue il Calendario della Chiesa in cui celebra; se invece la Messa è celebrata con la sola presenza di un ministro, può scegliere tra il Calendario del luogo e un proprio Calendario particolare. Quando è possibile scegliere tra una memoria del Calendario comune ambrosiano e una del Calendario particolare (diocesano o religioso), a parità di importanza si preferisce, secondo la tradizione, quella del Calendario particolare.</p>
<p>Le <strong>letture</strong> seguono di norma il Lezionario del giorno (tre letture nelle domeniche, sabati, solennità, feste, e in diversi tempi forti; due nelle ferie ordinarie): non vanno sostituite con testi non biblici, salvo il caso, previsto dalla tradizione ambrosiana, in cui nelle feste dei patroni la lettura biblica sia sostituita da una lettura agiografica approvata. Nella scelta tra un testo più lungo e uno più breve, o tra letture alternative, si tenga conto della reale capacità di ascolto dei fedeli riuniti, evitando però di escludere sistematicamente alcune parti della Scrittura.</p>
<p>Le <strong>orazioni</strong> (colletta, orazione dopo le letture, sui doni, dopo la comunione) e il prefazio proprio del giorno si dicono normalmente così come sono assegnati; nelle memorie dei santi, se manca l'orazione propria, si usa quella del comune corrispondente. Per la <strong>preghiera eucaristica</strong>, il Messale offre più forme, ciascuna con caratteristiche proprie: la I può sempre essere usata, in particolare quando è previsto un "In comunione" proprio; la II è più adatta ai giorni feriali; la III si può dire con qualsiasi prefazio ed è preferibile nelle domeniche; la IV, con prefazio proprio non sostituibile, ripercorre la storia della salvezza; la V è propria del Giovedì Santo e dei temi eucaristici; la VI è propria della veglia pasquale e del tempo di Pasqua. Alcune di queste ammettono l'inserimento di una formula per un defunto, altre no.</p>
</div>
</details>

<details class="guida-blocco">
<summary>L'anno liturgico ambrosiano</summary>
<div class="guida-blocco-body">
<p>Il rito ambrosiano ha un proprio ciclo dell'anno liturgico, in parte diverso da quello romano. Ogni giorno liturgico comincia, secondo l'antica tradizione ambrosiana, dai vespri del giorno precedente. La <strong>domenica</strong> occupa il primo posto e, per sé, esclude altre celebrazioni fisse, salvo alcune eccezioni (battesimo del Signore, santa Famiglia, santissima Trinità, dedicazione del Duomo di Milano, Cristo Re). Le celebrazioni si distinguono, in ordine di importanza, in solennità del Signore, solennità, feste del Signore, feste e memorie (obbligatorie o facoltative).</p>
<p>Il <strong>triduo pasquale</strong> — dalla Messa vespertina "nella Cena del Signore" alla veglia pasquale, fino ai vespri della domenica di Risurrezione — è il vertice di tutto l'anno liturgico. Segue il <strong>tempo di Pasqua</strong>, cinquanta giorni di gioia fino a Pentecoste, vissuti come "una sola grande domenica". Il <strong>tempo di Quaresima</strong> prepara la Pasqua e dura dalla domenica "all'inizio della Quaresima" fino alla Messa vespertina della Cena del Signore esclusa; in questo tempo non si canta l'Alleluia e, secondo l'antica tradizione ambrosiana, il venerdì non si celebra la liturgia eucaristica (salvo solennità). La <strong>Settimana Autentica</strong> (l'equivalente ambrosiano della Settimana Santa) inizia con la domenica delle Palme e culmina, il Giovedì, con la Messa crismale in cui l'arcivescovo benedice gli oli santi.</p>
<p>Il <strong>tempo di Natale</strong> va dalla vigilia di Natale alla domenica dopo l'Epifania (battesimo del Signore); comprende l'ottava di Natale (con le memorie di santo Stefano, san Giovanni evangelista e i santi Innocenti) e l'Epifania il 6 gennaio. Il <strong>tempo di Avvento</strong>, caratteristico della tradizione ambrosiana per la sua durata di sei settimane, comincia dai vespri della domenica dopo l'11 novembre (san Martino) e prepara sia la memoria della prima venuta del Signore sia l'attesa della sua venuta finale; la sesta domenica è detta "dell'Incarnazione". Caratteristiche del tempo di Avvento ambrosiano sono anche le ferie prenatalizie dell'"Accolto" (17-23 dicembre).</p>
<p>Dopo l'Epifania e dopo Pentecoste si distendono i due <strong>tempi "dopo l'Epifania"</strong> (fino alla Quaresima) e <strong>"dopo Pentecoste"</strong> (fino all'Avvento), che nella II edizione del Messale hanno sostituito l'antico unico "Tempo Ordinario". Il tempo dopo Pentecoste si articola a sua volta in tre sezioni, scandite dalla festa del martirio di san Giovanni il Precursore (29 agosto) e dalla solennità della Dedicazione del Duomo di Milano (terza domenica di ottobre), che costituisce un vero e proprio punto di riferimento per tutta la Chiesa ambrosiana. Accanto al Calendario comune, ogni diocesi, famiglia religiosa o singola chiesa può avere un proprio <strong>Calendario particolare</strong>, con le celebrazioni dei propri patroni e santi, approvato dalla Congregazione del Rito Ambrosiano e promulgato dall'arcivescovo di Milano come capo del rito.</p>
</div>
</details>

// ---------------------------------------------------------------------
// DRAWER GENERICO PER CONTENUTI STATICI (guida "0." e guida "Come
// funziona l'app"): elementi DOM propri, creati una sola volta e
// aggiunti direttamente a <body> (non dentro #panel-select, che viene
// azzerato e ricostruito da buildPanel()), per restare disponibili
// anche dopo "Azzera selezioni". Non condivide stato con il drawer di
// sezione (#sezione-drawer/apriDrawerSezione), quindi non tocca in
// alcun modo MESSALE_DATA né gli indici usati altrove nel codice.
// ---------------------------------------------------------------------
let guidaDrawerTriggerBtn = null;

function ensureGuidaDrawer() {
  if (document.getElementById('guida-drawer')) return;

  const overlay = document.createElement('div');
  overlay.id = 'guida-drawer-overlay';
  overlay.className = 'drawer-overlay';
  overlay.hidden = true;
  overlay.addEventListener('click', chiudiDrawerStatico);
  document.body.appendChild(overlay);

  const drawer = document.createElement('div');
  drawer.id = 'guida-drawer';
  drawer.className = 'drawer';
  drawer.hidden = true;
  drawer.setAttribute('role', 'dialog');
  drawer.setAttribute('aria-modal', 'true');
  drawer.setAttribute('aria-hidden', 'true');
  drawer.innerHTML =
    '<div class="drawer-header">' +
      '<span class="drawer-title" id="guida-drawer-title"></span>' +
      '<button type="button" class="drawer-close" id="guida-drawer-close" aria-label="Chiudi finestra">✕ Chiudi</button>' +
    '</div>' +
    '<div class="drawer-body" id="guida-drawer-body"></div>';
  document.body.appendChild(drawer);
  drawer.querySelector('.drawer-close').addEventListener('click', chiudiDrawerStatico);
  // Un click dentro al drawer non deve richiuderlo (l'overlay sottostante
  // ha già il proprio listener di chiusura).
  drawer.addEventListener('click', (e) => e.stopPropagation());
}

function apriDrawerStatico(titolo, html, triggerBtn) {
  ensureGuidaDrawer();
  const overlay = document.getElementById('guida-drawer-overlay');
  const drawer = document.getElementById('guida-drawer');
  const title = document.getElementById('guida-drawer-title');
  const body = document.getElementById('guida-drawer-body');
  if (!overlay || !drawer || !title || !body) return;
  guidaDrawerTriggerBtn = triggerBtn || null;
  title.textContent = titolo;
  body.innerHTML = html;
  overlay.hidden = false;
  drawer.hidden = false;
  requestAnimationFrame(() => {
    overlay.classList.add('is-open');
    drawer.classList.add('is-open');
  });
  drawer.setAttribute('aria-hidden', 'false');
  document.body.classList.add('drawer-open');
  const closeBtn = document.getElementById('guida-drawer-close');
  if (closeBtn) closeBtn.focus();
}

function chiudiDrawerStatico() {
  const overlay = document.getElementById('guida-drawer-overlay');
  const drawer = document.getElementById('guida-drawer');
  if (!overlay || !drawer || !drawer.classList.contains('is-open')) return;
  overlay.classList.remove('is-open');
  drawer.classList.remove('is-open');
  drawer.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('drawer-open');
  setTimeout(() => {
    if (!drawer.classList.contains('is-open')) {
      overlay.hidden = true;
      drawer.hidden = true;
    }
  }, 320);
  if (guidaDrawerTriggerBtn) {
    guidaDrawerTriggerBtn.focus();
    guidaDrawerTriggerBtn = null;
  }
}

// Esc per chiudere il drawer statico; focus trap minimo, analogo a
// quello già usato per #sezione-drawer ma indipendente da esso.
document.addEventListener('keydown', (e) => {
  const drawer = document.getElementById('guida-drawer');
  if (!drawer || !drawer.classList.contains('is-open')) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    chiudiDrawerStatico();
    return;
  }
  if (e.key === 'Tab') {
    const focusable = drawer.querySelectorAll('button, summary, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});

// Pulsante "?" nell'header: apre sempre la guida "Come funziona l'app".
// L'elemento #btn-help è statico nell'HTML (non ricostruito da

(function initBtnHelp() {
  const btnHelp = document.getElementById('btn-help');
  if (btnHelp) {
    btnHelp.addEventListener('click', () => apriDrawerStatico('Come funziona questa app', COME_FUNZIONA_HTML, btnHelp));
  }

// NOTA: il vecchio meccanismo ridondante "CAMPI_LIBERI" (un secondo set di
// textarea extra, in coda a ciascuna sezione, per le stesse orazioni già
// coperte dai blocchi "Testo libero..." di MESSALE_DATA/isCampoLiberoBlocco)
// è stato rimosso: creava caselle di testo duplicate per la stessa orazione
// e, per "Orazione sui doni" e "Antifone proprie", il testo finiva in coda
// a tutta la Liturgia Eucaristica invece che al posto liturgicamente giusto.
// Resta solo il meccanismo moderno basato su isCampoLiberoBlocco, già
// posizionato correttamente nella sequenza dei blocchi.

// stato: per ogni sezione/blocco memorizza indice opzione selezionata (o -1 = nessuna)
const stato = {};

function keyFor(si, bi) { return si + "_" + bi; }

// ---------------------------------------------------------------------
// PARTI FISSE / OBBLIGATORIE
// Elenco (prima passata, da rifinire insieme al celebrante) dei blocchi
// che nel Messale Ambrosiano sono sempre presenti nella celebrazione e
// che quindi l'utente non deve poter escludere dalla composizione.
// Chiave = "sezioneIndex_bloccoIndex" (vedi MESSALE_DATA).
//
// NB: dalla ristrutturazione delle Preghiere Eucaristiche (vedi commento
// sulla struttura dati "tipo": "preghiera_eucaristica" in MESSALE_DATA),
// i sei blocchi "Preghiera Eucaristica I..VI" sono stati fusi in un solo
// blocco "Preghiera Eucaristica" a indice [2,9]; tutti i blocchi che
// nella sezione 2 venivano dopo (Padre nostro, frazione, comunione...)
// si sono quindi spostati indietro di 5 posizioni rispetto alla prima
// versione dei dati.
//
// Criterio usato:
//  - Preghiera Eucaristica (in sé: se ne sceglie sempre una tra I e VI,
//    anche se ora è composta da più parti — preghiera + anamnesi +
//    parti proprie) [2,9]
//  - Padre nostro [2,11]
//  - Santo/Sanctus, all'interno del Prefazio [2,8]
//  - Dialogo introduttivo del Prefazio (sempre presente prima del testo
//    proprio del prefazio) [2,7]
//  - Embolismo "Liberaci, o Signore" dopo il Padre nostro [2,12]
//  - Rito della pace dopo il Padre nostro (scambio della pace) [2,13]
//  - Frazione del pane / Agnello di Dio, con l'invito "Beati gli
//    invitati alla cena dell'Agnello" [2,14]
//  - Antifona/dialogo alla comunione del popolo ("Il Corpo di Cristo" —
//    "Amen") [2,16]
//  - Orazione a conclusione della liturgia della Parola, il cui stesso
//    testo dei dati dice "non va mai omessa" [1,7]
//  - Congedo finale [3,4]
//
//  - Segno della croce iniziale, con risposta "Amen" [0,0].
//  - Offerta del pane [2,2] e Preparazione del calice e offerta del
//    vino [2,3]: ciascuno con due opzioni alternative (formula
//    sottovoce / formula alternativa ad alta voce), tra cui va
//    scelta una variante ma che non può essere esclusa del tutto.
//  - Umili e pentiti (inchinandosi) [2,4].
//
// TODO (prossima iterazione, da definire insieme al celebrante):
//  - Separare, nel blocco "Dialogo introduttivo e Prefazio" [2,7], il
//    dialogo fisso dal testo proprio del prefazio (oggi sono modellati
//    come due "opzioni" alternative dello stesso blocco).
const BLOCCHI_FISSI = new Set([
  "0_0",  // Segno della croce iniziale
  "1_11", // Orazione a conclusione della liturgia della parola (indice
          // aggiornato dopo l'inserimento di Salmo, Seconda lettura e
          // Preghiera dei fedeli nella sezione 1: era 1_7)
  "2_2",  // Offerta del pane
  "2_3",  // Preparazione del calice e offerta del vino
  "2_4",  // Umili e pentiti (inchinandosi)
  "2_7",  // Dialogo introduttivo e Prefazio
  "2_8",  // Santo (Sanctus)
  "2_9",  // Preghiera Eucaristica (blocco unificato: preghiera+anamnesi+parti proprie)
  "2_11", // Padre nostro
  "2_12", // Embolismo (Liberaci, o Signore)
  "2_13", // Rito della pace (dopo il Padre nostro)
  "2_14", // Frazione del pane / Agnello di Dio
  "2_16", // Antifona alla comunione del popolo
  "3_5"   // Congedo (indice spostato da 3_4 a 3_5 dopo l'inserimento del
          // nuovo blocco "Benedizione episcopale" in sezione 3, indice 3)
]);
function isBloccoFisso(si, bi) { return BLOCCHI_FISSI.has(keyFor(si, bi)); }
// Un blocco "tipo": "preghiera_eucaristica" è sempre trattato come fisso
// (obbligatorio) indipendentemente dalla chiave: la funzione sopra
// copre già [2,9], questo helper serve a riconoscerlo esplicitamente
// nelle altre funzioni (buildPanel/renderOutput) senza duplicare "2_9".
function isBloccoPreghieraEucaristica(b) { return !!b && b.tipo === "preghiera_eucaristica"; }

// ---------------------------------------------------------------------
// GRUPPI A SCELTA UNICA (mutua esclusione tra blocchi alternativi)
// ---------------------------------------------------------------------
// Gruppo A — Rito penitenziale iniziale vs rito dell'aspersione: cinque
// alternative reciprocamente esclusive (selezionarne una in una di
// queste cinque riporta a "non incluso" le altre quattro) e il gruppo
// nel suo complesso è OBBLIGATORIO (non è mai possibile lasciarle tutte
// e cinque non incluse). "Assoluzione del sacerdote" (0_6) e
// "Conclusione del rito dell'aspersione" (0_9) sono agganciati
// automaticamente in base a quale delle cinque alternative è attiva.
const GRUPPO_A_ATTO_PENITENZIALE = [[0,3],[0,4],[0,5]]; // Kýrie / Confesso / dialogo penitenziale
const GRUPPO_A_ASPERSIONE = [[0,7],[0,8]];               // Formulario I / Formulario II
const GRUPPO_A_TUTTI = GRUPPO_A_ATTO_PENITENZIALE.concat(GRUPPO_A_ASPERSIONE);
function isInGruppoA(si, bi) { return GRUPPO_A_TUTTI.some(([s,b]) => s === si && b === bi); }
// Applica la logica del gruppo A assumendo che (si,bi) sia il membro
// appena selezionato con un'opzione reale: deseleziona gli altri quattro
// membri e imposta di conseguenza assoluzione/conclusione-aspersione.
function applicaGruppoA(si, bi) {
  GRUPPO_A_TUTTI.forEach(([s, b]) => {
    if (!(s === si && b === bi)) stato[keyFor(s, b)] = -1;
  });
  const attoPenitenziale = GRUPPO_A_ATTO_PENITENZIALE.some(([s,b]) => s === si && b === bi);
  stato[keyFor(0,6)] = attoPenitenziale ? 0 : -1; // Assoluzione del sacerdote
  stato[keyFor(0,9)] = attoPenitenziale ? -1 : 0; // Conclusione del rito dell'aspersione
}

// Gruppo B — Professione di fede: Simbolo niceno-costantinopolitano (1_7)
// vs Simbolo degli apostoli (1_8). Mutuamente esclusivi ma, a differenza
// del gruppo A, il gruppo nel suo complesso resta OMETTIBILE: nessuno dei
// due incluso è una scelta legittima quando la professione di fede non è
// prescritta.
// (Indici aggiornati da 1_5/1_6 a 1_7/1_8 dopo l'inserimento dei blocchi
// "Salmo" e "Seconda lettura" nella sezione 1.)
const GRUPPO_B = [[1,8],[1,9]];
function isInGruppoB(si, bi) { return GRUPPO_B.some(([s,b]) => s === si && b === bi); }
function applicaGruppoB(si, bi) {
  GRUPPO_B.forEach(([s, b]) => { if (!(s === si && b === bi)) stato[keyFor(s, b)] = -1; });
}

// Gruppo D — Benedizione finale, tre alternative reciprocamente esclusive:
// "Benedizione finale semplice" (3_2), "Benedizione episcopale" (3_3) e
// "Benedizione solenne" (3_4). Selezionandone una le altre due tornano a
// "non incluso". Il gruppo nel suo complesso resta ometttibile (nessuna
// delle tre è mai obbligatoria).
const GRUPPO_D = [[3,2],[3,3],[3,4]];
function isInGruppoD(si, bi) { return GRUPPO_D.some(([s,b]) => s === si && b === bi); }
function applicaGruppoD(si, bi) {
  GRUPPO_D.forEach(([s, b]) => { if (!(s === si && b === bi)) stato[keyFor(s, b)] = -1; });
}

function initStato() {
  MESSALE_DATA.sezioni.forEach((s, si) => {
    s.blocchi.forEach((b, bi) => {
      if (isBloccoPreghieraEucaristica(b)) {
        // Stato composito per il blocco unificato "Preghiera Eucaristica":
        // invece di un semplice indice di opzione, si tengono gli indici
        // delle quattro scelte indipendenti (vedi commento sulla
        // struttura dati accanto a MESSALE_DATA). Si parte sempre dalla
        // Preghiera Eucaristica I (indice 0), prima formula di anamnesi,
        // e prime varianti delle parti proprie: il blocco è comunque
        // fisso/obbligatorio, quindi non esiste uno stato "non incluso".
        // Default aggiornato: si parte dalla Preghiera Eucaristica II
        // (indice 1) anziché dalla I, prima formula di anamnesi, e prime
        // varianti delle parti proprie.
        // Le eventuali "parti proprie" (communicantes, tempo liturgico,
        // inserti rituali, formule per i defunti, ecc.) sono tenute in un
        // oggetto generico { nomeParte: indiceOpzione }, popolato in modo
        // dinamico secondo le "parti_proprie" della preghiera scelta di
        // volta in volta (vedi costruisciBloccoPreghieraEucaristica).
        stato[keyFor(si,bi)] = { preghiera: 1, anamnesi: 0, parti_proprie: {} };
        return;
      }
      // Default: nessuna opzione selezionata, tranne per i blocchi fissi
      // (sempre presenti nella celebrazione), che partono già con la
      // prima opzione selezionata e non possono essere disattivati.
      // Eccezione: il Saluto iniziale (sezione 0, blocco 1) parte già
      // selezionato sulla 3ª formula (Rt 2,4), preferita dal celebrante.
      if (si === 0 && bi === 1) {
        stato[keyFor(si,bi)] = 2;
        return;
      }
      stato[keyFor(si,bi)] = isBloccoFisso(si,bi) ? 0 : -1;
    });
  });

  // -----------------------------------------------------------------
  // Default aggiuntivi (v.2 delle richieste del celebrante): applicati
  // DOPO il ciclo generale sopra, così da poter sovrascrivere in modo
  // esplicito e leggibile i valori generici già assegnati.
  // -----------------------------------------------------------------

  // Gruppo A: rito penitenziale iniziale / aspersione (v. sopra). Default
  // sulla 1ª formula dell'atto penitenziale (Kýrie), prima opzione (la
  // più generica: "Invocazioni comuni"), con "Assoluzione del sacerdote"
  // conseguentemente inclusa. La "Monizione introduttiva" (0_2, facoltativa
  // e fuori dal gruppo esclusivo) parte anch'essa sulla sua prima opzione.
  stato[keyFor(0,2)] = 0;  // Atto penitenziale — Monizione introduttiva, 1ª
  applicaGruppoA(0, 3);
  stato[keyFor(0,3)] = 0;  // Atto penitenziale — 1ª formula: Kýrie, "Invocazioni comuni"

  // Gruppo B: professione di fede. Default sul Simbolo niceno-costantinopolitano,
  // testo italiano; il Simbolo degli apostoli resta non incluso.
  applicaGruppoB(1, 8);
  stato[keyFor(1,8)] = 0;  // Simbolo niceno-costantinopolitano — Testo italiano

  // Nuovi default semplici (gruppo C della richiesta):
  stato[keyFor(1,5)] = 1;   // Benedizione prima del Vangelo — "Senza diacono (sottovoce)"
  stato[keyFor(1,0)] = 5;   // Benedizione prima della Lettura — "Formula breve (sempre utilizzabile)"
  stato[keyFor(1,3)] = 5;   // Benedizione prima della Seconda lettura — "Formula breve (sempre utilizzabile)"
  stato[keyFor(2,10)] = 0;  // Introduzione al Padre nostro — prima opzione
  stato[keyFor(2,0)] = 1;   // Rito della pace (prima dell'offertorio) — seconda opzione
  stato[keyFor(2,15)] = 0;  // Preghiera del sacerdote prima della comunione — prima opzione
  stato[keyFor(3,1)] = 0;   // Saluto prima della benedizione finale — Formula semplice (inclusa di default)
}
initStato();

function isCampoLiberoBlocco(b) {
  if (isBloccoPreghieraEucaristica(b)) return false;
  if (b.note_formattabile) return false; // gestito da isCampoNoteFormattabile, non da qui
  return b.opzioni.length === 1 && (b.opzioni[0].etichetta.startsWith("Testo libero"));
}

// ---------------------------------------------------------------------
// BLOCCHI "APPUNTI" CON FORMATTAZIONE MINIMA (Omelia, Preghiera dei
// fedeli, Avvisi al popolo): riconosciuti tramite il flag booleano
// "note_formattabile" sul blocco dati (MESSALE_DATA), invece dell'etichetta
// dell'opzione usata da isCampoLiberoBlocco. Vengono resi in pannello come
// un <div contenteditable> con una piccola barra Grassetto/Corsivo/
// Sottolineato/Elenco puntato (vedi creaBloccoDiv), invece di una semplice
// <textarea> di solo testo.
// ---------------------------------------------------------------------
function isCampoNoteFormattabile(b) {
  return !!(b && b.note_formattabile);
}

// Whitelist dei soli tag che document.execCommand('bold'|'italic'|
// 'underline'|'insertUnorderedList') può generare in pratica nei browser
// desktop/mobile moderni. Qualunque altro tag (es. <script>, <img>,
// <iframe>...) viene "srotolato" (i suoi figli vengono promossi al suo
// posto, il tag stesso eliminato), e tutti gli attributi vengono rimossi
// da ogni tag conservato: non serve una libreria di sanitizzazione, ma
// il contenuto salvato/inserito nell'HTML della pagina resta comunque
// vincolato a questo insieme ristretto e sicuro di elementi senza
// attributi (quindi senza handler tipo onerror/onclick, senza script,
// senza src/href arbitrari).
const APPUNTI_TAG_ALLOWLIST = new Set(['B','STRONG','I','EM','U','UL','OL','LI','BR','DIV','SPAN','P']);
function sanitizeAppuntiHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  (function clean(node) {
    Array.from(node.childNodes).forEach((child) => {
      if (child.nodeType === 1) { // Element
        if (!APPUNTI_TAG_ALLOWLIST.has(child.tagName)) {
          while (child.firstChild) node.insertBefore(child.firstChild, child);
          node.removeChild(child);
          return;
        }
        Array.from(child.attributes).forEach((attr) => child.removeAttribute(attr.name));
        clean(child);
      } else if (child.nodeType !== 3) { // non è testo: commenti ecc., via
        node.removeChild(child);
      }
    });
  })(tmp);
  return tmp.innerHTML;
}

// ---------------------------------------------------------------------
// PANNELLO DI SELEZIONE: 5 PULSANTI + FINESTRE A SCOMPARSA (drawer)
// ---------------------------------------------------------------------
// Le 5 sezioni principali della Messa non sono più rese come un lungo
// accordion (tutte le sezioni una sotto l'altra): sono 5 pulsanti in
// una griglia. Al click su un pulsante si apre una finestra dedicata
// "a scomparsa" (drawer, da destra su schermi larghi, a tutto schermo
// su mobile — vedi CSS ".drawer") che mostra SOLO i blocchi di quella
// sezione. Si chiude con il pulsante "Chiudi", con Esc o cliccando
// fuori dal pannello (sull'overlay), e si torna alla vista con i 5
// pulsanti. Il testo composto (#testo-composto) resta comunque
// generato/aggiornato in tempo reale ad ogni cambiamento di select,
// indipendentemente da quale drawer sia aperto: renderOutput() legge
// solo lo stato "stato"/MESSALE_DATA, non la visibilità del pannello.
//
// Per evitare di ricreare gli elementi (e i loro event listener) ad
// ogni apertura/chiusura, il contenuto di ciascuna sezione viene
// costruito una sola volta per ogni chiamata di buildPanel(), in un
// <div> tenuto "fuori schermo" in sezioneContentEls[si]; aprire una
// sezione significa semplicemente spostare quel <div> dentro il corpo
// del drawer.
let sezioneContentEls = {};   // si -> HTMLElement con i blocchi di quella sezione
let drawerTriggerBtn = null;  // pulsante che ha aperto il drawer (per ridare il focus alla chiusura)
// keyFor(si,bi) -> { sel, anteprima, blocco }: riferimenti ai <select> di
// opzione "semplice" creati da creaBloccoDiv, usati per risincronizzare
// select + anteprima quando un gruppo a scelta unica (A/B/D) cambia lo
// stato di un blocco diverso da quello su cui l'utente ha appena agito
// (vedi sincronizzaPannelloDaStato più sotto).
let selectEls = {};

function apriDrawerSezione(si, triggerBtn) {
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('sezione-drawer');
  const title = document.getElementById('drawer-title');
  const body = document.getElementById('drawer-body');
  if (!overlay || !drawer || !title || !body) return;
  drawerTriggerBtn = triggerBtn || null;
  title.textContent = (si + 1) + '. ' + MESSALE_DATA.sezioni[si].titolo;
  body.innerHTML = '';
  if (sezioneContentEls[si]) body.appendChild(sezioneContentEls[si]);
  drawer.dataset.si = si;
  overlay.hidden = false;
  drawer.hidden = false;
  // Due passaggi (rimuovere "hidden" e SOLO DOPO aggiungere la classe
  // che anima transform/opacity) per far partire la transizione CSS
  // invece di comparire di scatto.
  requestAnimationFrame(() => {
    overlay.classList.add('is-open');
    drawer.classList.add('is-open');
  });
  drawer.setAttribute('aria-hidden', 'false');
  document.body.classList.add('drawer-open');
  const closeBtn = document.getElementById('drawer-close');
  if (closeBtn) closeBtn.focus();
}

function chiudiDrawerSezione() {
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('sezione-drawer');
  if (!overlay || !drawer || !drawer.classList.contains('is-open')) return;
  overlay.classList.remove('is-open');
  drawer.classList.remove('is-open');
  drawer.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('drawer-open');
  setTimeout(() => {
    // Nasconde davvero gli elementi solo a transizione finita, così
    // restano cliccabili/animati durante la chiusura.
    if (!drawer.classList.contains('is-open')) {
      overlay.hidden = true;
      drawer.hidden = true;
    }
  }, 320);
  if (drawerTriggerBtn) {
    drawerTriggerBtn.focus();
    drawerTriggerBtn = null;
  }
}

// Esc per chiudere il drawer; focus trap minimo (Tab non esce dal
// drawer finché è aperto). Registrato una sola volta: cerca il drawer
// tramite id ad ogni evento, quindi resta valido anche dopo che
// buildPanel() lo ricrea (es. dopo "Azzera selezioni").
document.addEventListener('keydown', (e) => {
  const drawer = document.getElementById('sezione-drawer');
  if (!drawer || !drawer.classList.contains('is-open')) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    chiudiDrawerSezione();
    return;
  }
  if (e.key === 'Tab') {
    const focusable = drawer.querySelectorAll('button, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});

// ---------------------------------------------------------------------
// BLOCCO SPECIALE "Preghiera Eucaristica" (tipo: "preghiera_eucaristica")
// ---------------------------------------------------------------------
// Costruisce, dentro "div" (il contenitore del blocco), i quattro
// controlli della nuova voce unificata:
//   1) quale Preghiera Eucaristica (I..VI) — select su b.preghiere
//   2) l'anamnesi ("Mistero della fede") — select su b.anamnesi.opzioni,
//      si applica sempre, qualunque preghiera sia stata scelta
//   3+) le parti proprie (Communicantes/Hanc igitur per la Preghiera I,
//      tempo liturgico/battesimo/defunti per la II, rituale/tempo
//      liturgico/defunti per la III, incipit per la V, ecc.) — un
//      selettore per ciascuna voce di p.parti_proprie della preghiera
//      selezionata, mostrati SOLO se tale preghiera ha "parti_proprie"
//      (oggi le preghiere I, II, III e V; le altre non ne hanno).
// Lo stato è un oggetto { preghiera, anamnesi, parti_proprie }, dove
// parti_proprie è una mappa { nomeParte: indiceOpzioneScelta } popolata
// dinamicamente in base alla preghiera corrente
// (vedi initStato) tenuto in stato[keyFor(si,bi)].
function costruisciBloccoPreghieraEucaristica(div, b, si, bi) {
  const k = keyFor(si, bi);
  const st = stato[k];

  const wrapPreghiera = document.createElement('div');
  wrapPreghiera.className = 'pe-sub';
  const lblPreghiera = document.createElement('div');
  lblPreghiera.className = 'pe-sub-title';
  lblPreghiera.textContent = 'Quale Preghiera Eucaristica';
  const selPreghiera = document.createElement('select');
  selPreghiera.className = 'opz-select';
  // Le preghiere sono raggruppate visivamente con <optgroup> in base al
  // campo facoltativo "gruppo" di ciascuna voce di b.preghiere: le sei
  // preghiere ordinarie (che non hanno "gruppo") finiscono tutte sotto
  // un'unica etichetta comune, le altre (Riconciliazione I-II, per le
  // Messe per varie necessità 1-4) sotto la propria. In questo modo il
  // celebrante vede subito a colpo d'occhio a quale famiglia appartiene
  // ciascuna preghiera, anche se restano tutte nello stesso <select>
  // (un'unica scelta tra tutte le preghiere eucaristiche disponibili).
  const GRUPPO_ORDINARIE = 'Preghiere eucaristiche ordinarie I-VI';
  let optgroupCorrente = null;
  let gruppoCorrenteNome = null;
  b.preghiere.forEach((p, pi) => {
    const nomeGruppo = p.gruppo || GRUPPO_ORDINARIE;
    if (nomeGruppo !== gruppoCorrenteNome) {
      optgroupCorrente = document.createElement('optgroup');
      optgroupCorrente.label = nomeGruppo;
      selPreghiera.appendChild(optgroupCorrente);
      gruppoCorrenteNome = nomeGruppo;
    }
    const opt = document.createElement('option');
    opt.value = pi;
    opt.textContent = p.etichetta;
    optgroupCorrente.appendChild(opt);
  });
  selPreghiera.value = st.preghiera;
  const notaPreghiera = document.createElement('div');
  notaPreghiera.className = 'blocco-note pe-nota-preghiera';
  wrapPreghiera.appendChild(lblPreghiera);
  wrapPreghiera.appendChild(selPreghiera);
  wrapPreghiera.appendChild(notaPreghiera);

  const wrapAnamnesi = document.createElement('div');
  wrapAnamnesi.className = 'pe-sub';
  const lblAnamnesi = document.createElement('div');
  lblAnamnesi.className = 'pe-sub-title';
  lblAnamnesi.textContent = b.anamnesi.titolo;
  const selAnamnesi = document.createElement('select');
  selAnamnesi.className = 'opz-select';
  b.anamnesi.opzioni.forEach((o, oi) => {
    const opt = document.createElement('option');
    opt.value = oi;
    opt.textContent = o.etichetta;
    selAnamnesi.appendChild(opt);
  });
  selAnamnesi.value = st.anamnesi;
  wrapAnamnesi.appendChild(lblAnamnesi);
  wrapAnamnesi.appendChild(selAnamnesi);

  // Contenitore generico delle "parti proprie": non più limitato a
  // Communicantes/Hanc igitur (Preghiera Eucaristica I), ma capace di
  // ospitare un numero qualunque di selettori dinamici, uno per ciascuna
  // voce dell'oggetto p.parti_proprie della preghiera correntemente
  // selezionata (es. per la Preghiera II: tempo_liturgico, battesimo,
  // defunti; per la III: rituale, tempo_liturgico, defunti; per la V:
  // incipit). Ogni voce ha la forma { titolo, placeholder, opzioni }.
  const wrapPartiProprie = document.createElement('div');
  wrapPartiProprie.className = 'pe-parti-proprie';

  function aggiornaPartiProprie() {
    const p = b.preghiere[st.preghiera];
    notaPreghiera.textContent = p.note || '';
    notaPreghiera.style.display = p.note ? '' : 'none';
    wrapPartiProprie.innerHTML = '';
    if (!st.parti_proprie) st.parti_proprie = {};
    if (p.parti_proprie) {
      wrapPartiProprie.style.display = '';
      Object.keys(p.parti_proprie).forEach((nome) => {
        const parte = p.parti_proprie[nome];
        const wrap = document.createElement('div');
        wrap.className = 'pe-sub';
        const lbl = document.createElement('div');
        lbl.className = 'pe-sub-title';
        lbl.textContent = parte.titolo;
        const sel = document.createElement('select');
        sel.className = 'opz-select';
        parte.opzioni.forEach((o, oi) => {
          const opt = document.createElement('option');
          opt.value = oi;
          opt.textContent = o.etichetta;
          sel.appendChild(opt);
        });
        if (!(st.parti_proprie[nome] >= 0) || st.parti_proprie[nome] >= parte.opzioni.length) {
          st.parti_proprie[nome] = 0;
        }
        sel.value = st.parti_proprie[nome];
        sel.addEventListener('change', () => {
          st.parti_proprie[nome] = parseInt(sel.value, 10);
          renderOutput();
        });
        wrap.appendChild(lbl);
        wrap.appendChild(sel);
        wrapPartiProprie.appendChild(wrap);
      });
    } else {
      wrapPartiProprie.style.display = 'none';
    }
  }
  aggiornaPartiProprie();

  selPreghiera.addEventListener('change', () => {
    st.preghiera = parseInt(selPreghiera.value, 10);
    // Cambiando preghiera, le parti proprie precedenti non hanno più
    // significato (nomi e numero di varianti cambiano da preghiera a
    // preghiera): si riparte da zero, e aggiornaPartiProprie() imposterà
    // la prima variante per ciascuna parte propria della nuova preghiera.
    st.parti_proprie = {};
    aggiornaPartiProprie();
    renderOutput();
  });
  selAnamnesi.addEventListener('change', () => {
    st.anamnesi = parseInt(selAnamnesi.value, 10);
    renderOutput();
  });

  div.appendChild(wrapPreghiera);
  div.appendChild(wrapAnamnesi);
  div.appendChild(wrapPartiProprie);
}

// Costruisce il <div class="blocco"> di UN blocco (select normale,
// campo libero, blocco fisso a opzione unica, o il blocco speciale
// "Preghiera Eucaristica"). Estratto in funzione a sé per essere
// riusato nella costruzione del contenuto di ogni sezione.
function creaBloccoDiv(s, si, b, bi) {
  const fisso = isBloccoFisso(si, bi);
  const div = document.createElement('div');
  div.className = 'blocco' + (fisso ? ' fisso' : '') + (isBloccoPreghieraEucaristica(b) ? ' blocco-preghiera-eucaristica' : '');
  const t = document.createElement('div');
  t.className = 'blocco-title';
  t.textContent = b.titolo;
  if (fisso) {
    const badge = document.createElement('span');
    badge.className = 'badge-fisso';
    badge.textContent = 'Sempre incluso';
    t.appendChild(badge);
  }
  div.appendChild(t);
  if (b.note) {
    const n = document.createElement('div');
    n.className = 'blocco-note';
    n.textContent = b.note;
    div.appendChild(n);
  }
  if (isBloccoPreghieraEucaristica(b)) {
    costruisciBloccoPreghieraEucaristica(div, b, si, bi);
  } else if (isCampoNoteFormattabile(b)) {
    // Editor minimale ma reale per prendere appunti (Omelia, Preghiera dei
    // fedeli, Avvisi al popolo): barra Grassetto/Corsivo/Sottolineato/
    // Elenco puntato via document.execCommand + <div contenteditable>,
    // niente librerie esterne (l'app resta offline e single-file).
    const wrap = document.createElement('div');
    wrap.className = 'appunti-editor';
    const toolbar = document.createElement('div');
    toolbar.className = 'appunti-toolbar';
    const editable = document.createElement('div');
    editable.className = 'appunti-editable';
    editable.contentEditable = 'true';
    editable.setAttribute('role', 'textbox');
    editable.setAttribute('aria-multiline', 'true');
    editable.setAttribute('aria-label', b.titolo);
    editable.dataset.placeholder = 'Scrivi qui i tuoi appunti...';
    editable.dataset.si = si; editable.dataset.bi = bi;
    editable.innerHTML = freeTextHtmlValues[keyFor(si, bi)] || '';
    editable.addEventListener('input', () => { onFreeHtmlInput(si, bi, editable.innerHTML); });
    function mkAppuntiBtn(cmd, label, title) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'appunti-btn';
      btn.textContent = label;
      btn.title = title;
      btn.setAttribute('aria-label', title);
      // mousedown con preventDefault: evita che il click sul pulsante
      // tolga il focus/la selezione dal contenteditable prima che
      // execCommand possa applicarsi al testo selezionato.
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', () => {
        editable.focus();
        document.execCommand(cmd, false, null);
        onFreeHtmlInput(si, bi, editable.innerHTML);
      });
      return btn;
    }
    toolbar.appendChild(mkAppuntiBtn('bold', 'B', 'Grassetto'));
    toolbar.appendChild(mkAppuntiBtn('italic', 'I', 'Corsivo'));
    toolbar.appendChild(mkAppuntiBtn('underline', 'S', 'Sottolineato'));
    toolbar.appendChild(mkAppuntiBtn('insertUnorderedList', '•', 'Elenco puntato'));
    wrap.appendChild(toolbar);
    wrap.appendChild(editable);
    div.appendChild(wrap);
  } else if (isCampoLiberoBlocco(b)) {
    const ta = document.createElement('textarea');
    ta.className = 'campo-libero';
    ta.dataset.si = si; ta.dataset.bi = bi;
    ta.placeholder = 'Incolla o scrivi qui il testo...';
    ta.addEventListener('input', () => { onFreeTextInput(si, bi, ta.value); });
    div.appendChild(ta);
  } else if (fisso && b.opzioni.length === 1) {
    // Blocco fisso con una sola opzione: nessuna scelta possibile,
    // viene mostrato come testo informativo invece che come select,
    // e non compare alcuna casella per escluderlo.
    stato[keyFor(si,bi)] = 0;
    const info = document.createElement('div');
    info.className = 'fisso-info';
    info.textContent = 'Parte fissa del rito: sempre presente nel testo composto.';
    div.appendChild(info);
  } else {
    const sel = document.createElement('select');
    sel.className = 'opz-select';
    if (!fisso) {
      const optNone = document.createElement('option');
      optNone.value = -1;
      optNone.textContent = '— non includere —';
      sel.appendChild(optNone);
    }
    b.opzioni.forEach((o, oi) => {
      const opt = document.createElement('option');
      opt.value = oi;
      opt.textContent = o.etichetta;
      sel.appendChild(opt);
    });
    if (fisso && stato[keyFor(si,bi)] < 0) stato[keyFor(si,bi)] = 0;
    sel.value = stato[keyFor(si,bi)];

    // ANTEPRIMA: piccola area sotto il select che mostra il testo
    // completo (rubrica compresa) dell'opzione attualmente selezionata,
    // aggiornata a ogni "change". Riusa formattaTesto() per coerenza
    // visiva con il testo composto finale (stessi marcatori resi allo
    // stesso modo, comprese le evidenziazioni in rosso).
    const anteprima = document.createElement('div');
    anteprima.className = 'anteprima-box';
    div.appendChild(sel);
    div.appendChild(anteprima);
    aggiornaAnteprimaBlocco(anteprima, b, stato[keyFor(si,bi)]);
    selectEls[keyFor(si,bi)] = { sel, anteprima, blocco: b };

    sel.addEventListener('change', () => {
      let val = parseInt(sel.value, 10);
      if (isInGruppoA(si, bi) && val < 0) {
        // Il gruppo A è sempre obbligatorio: non si può lasciarlo del
        // tutto vuoto. Un tentativo di deselezionare l'unica alternativa
        // attualmente attiva la riporta sulla sua prima opzione.
        val = 0;
      }
      stato[keyFor(si,bi)] = val;
      if (val >= 0) {
        if (isInGruppoA(si,bi)) applicaGruppoA(si,bi);
        else if (isInGruppoB(si,bi)) applicaGruppoB(si,bi);
        else if (isInGruppoD(si,bi)) applicaGruppoD(si,bi);
      }
      // Se questo select appartiene a uno dei gruppi a scelta unica, la
      // logica sopra può aver cambiato lo stato di altri blocchi: risincronizza
      // tutti i <select>/anteprime del pannello con lo stato corrente.
      if (isInGruppoA(si,bi) || isInGruppoB(si,bi) || isInGruppoD(si,bi)) {
        sincronizzaPannelloDaStato();
      } else {
        sel.value = stato[keyFor(si,bi)];
        aggiornaAnteprimaBlocco(anteprima, b, stato[keyFor(si,bi)]);
      }
      renderOutput();
    });
  }
  return div;
}

// Aggiorna il contenuto di un'area di anteprima (vedi ANTEPRIMA sopra) in
// base all'indice di opzione correntemente selezionato per il blocco b.
// idx < 0 ("— non includere —") svuota e nasconde l'anteprima.
function aggiornaAnteprimaBlocco(anteprima, b, idx) {
  const o = b.opzioni && b.opzioni[idx];
  if (idx < 0 || !o) {
    anteprima.innerHTML = '';
    anteprima.style.display = 'none';
    return;
  }
  let html = '';
  if (o.rubrica) html += '<span class="rubrica">' + evidenziaSpeciali(escapeHtml(o.rubrica)) + '</span>';
  if (o.testo) html += formattaTesto(o.testo);
  anteprima.innerHTML = html;
  anteprima.style.display = '';
}

// Rimette in sincronia TUTTI i <select> (e le rispettive anteprime) già
// costruiti da creaBloccoDiv con il valore corrente di "stato": serve dopo
// che un gruppo a scelta unica (A/B/D) ha cambiato lo stato di blocchi
// diversi da quello su cui l'utente ha appena agito, così anche i loro
// controlli nel pannello riflettono subito il cambiamento.
function sincronizzaPannelloDaStato() {
  Object.keys(selectEls).forEach((key) => {
    const rec = selectEls[key];
    const val = stato[key];
    if (rec.sel.value !== String(val)) rec.sel.value = val;
    aggiornaAnteprimaBlocco(rec.anteprima, rec.blocco, val);
  });
}

function buildPanel() {
  const panel = document.getElementById('panel-select');
  panel.innerHTML = '';
  sezioneContentEls = {};
  selectEls = {};

  // --- 1) Griglia dei 5 pulsanti (uno per sezione principale) ---
  const grid = document.createElement('div');
  grid.className = 'sezioni-grid';

  // --- 0) Pulsante "0. Premesse e Prænotanda": NON fa parte di
  //        MESSALE_DATA.sezioni, e' un elemento separato della UI che apre
  //        il drawer statico generico (apriDrawerStatico) con la guida di
  //        sola consultazione PREMESSE_GUIDA_HTML. Non tocca in alcun modo
  //        gli indici numerici (si) usati per BLOCCHI_FISSI, i gruppi
  //        esclusivi A/B/D, renderOutput() o initStato().
  const btnGuidaPremesse = document.createElement('button');
  btnGuidaPremesse.type = 'button';
  btnGuidaPremesse.className = 'sezione-btn sezione-btn-guida';
  btnGuidaPremesse.setAttribute('aria-haspopup', 'dialog');
  btnGuidaPremesse.setAttribute('aria-label', 'Apri la guida "0. Premesse e Prænotanda"');
  btnGuidaPremesse.innerHTML =
    '<span class="sezione-btn-num">0</span>' +
    '<span class="sezione-btn-title">Premesse e Prænotanda</span>' +
    '<span class="sezione-btn-chevron">›</span>';
  btnGuidaPremesse.addEventListener('click', () => apriDrawerStatico('0. Premesse e Prænotanda', PREMESSE_GUIDA_HTML, btnGuidaPremesse));
  grid.appendChild(btnGuidaPremesse);

  MESSALE_DATA.sezioni.forEach((s, si) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sezione-btn';
    btn.setAttribute('aria-haspopup', 'dialog');
    btn.setAttribute('aria-label', 'Apri la finestra "' + s.titolo + '"');
    btn.innerHTML =
      '<span class="sezione-btn-num">' + (si + 1) + '</span>' +
      '<span class="sezione-btn-title">' + escapeHtml(s.titolo) + '</span>' +
      '<span class="sezione-btn-chevron">›</span>';
    btn.addEventListener('click', () => apriDrawerSezione(si, btn));
    grid.appendChild(btn);
  });
  panel.appendChild(grid);

  // --- 2) Overlay + finestra a scomparsa (drawer), vuoti/nascosti finché
  //        non si apre una sezione ---
  const overlay = document.createElement('div');
  overlay.id = 'drawer-overlay';
  overlay.className = 'drawer-overlay';
  overlay.hidden = true;
  overlay.addEventListener('click', chiudiDrawerSezione);
  panel.appendChild(overlay);

  const drawer = document.createElement('div');
  drawer.id = 'sezione-drawer';
  drawer.className = 'drawer';
  drawer.hidden = true;
  drawer.setAttribute('role', 'dialog');
  drawer.setAttribute('aria-modal', 'true');
  drawer.setAttribute('aria-hidden', 'true');
  drawer.innerHTML =
    '<div class="drawer-header">' +
      '<span class="drawer-title" id="drawer-title"></span>' +
      '<button type="button" class="drawer-close" id="drawer-close" aria-label="Chiudi finestra">✕ Chiudi</button>' +
    '</div>' +
    '<div class="drawer-body" id="drawer-body"></div>';
  panel.appendChild(drawer);
  drawer.querySelector('.drawer-close').addEventListener('click', chiudiDrawerSezione);
  // Un click dentro al drawer non deve richiudere il drawer stesso
  // (l'overlay sottostante ha già il suo listener di chiusura).
  drawer.addEventListener('click', (e) => e.stopPropagation());

  // --- 3) Contenuto di ciascuna sezione (i suoi blocchi), costruito una
  //        sola volta e spostato dentro il drawer quando aperto ---
  MESSALE_DATA.sezioni.forEach((s, si) => {
    const content = document.createElement('div');
    content.className = 'sezione-content';
    s.blocchi.forEach((b, bi) => {
      // Intestazione di gruppo prima del primo blocco del gruppo A (rito
      // penitenziale iniziale / aspersione): rende visivamente esplicito
      // che i cinque blocchi che seguono sono alternative reciprocamente
      // esclusive, di cui una è sempre obbligatoria.
      if (si === 0 && bi === 3) {
        const gruppoTitle = document.createElement('div');
        gruppoTitle.className = 'gruppo-esclusivo-title';
        gruppoTitle.textContent = 'Rito penitenziale — scegli UNA delle alternative seguenti (obbligatorio: atto penitenziale, 1ª/2ª/3ª formula, oppure rito dell\'aspersione, Formulario I o II)';
        content.appendChild(gruppoTitle);
      }
      // Analoga intestazione, non vincolante, prima della professione di
      // fede (gruppo B): qui il gruppo resta ometttibile nel suo complesso.
      if (si === 1 && bi === 8) {
        const gruppoTitle = document.createElement('div');
        gruppoTitle.className = 'gruppo-esclusivo-title';
        gruppoTitle.textContent = 'Professione di fede — al massimo UNO dei due Simboli seguenti (facoltativa nel suo complesso)';
        content.appendChild(gruppoTitle);
      }
      if (si === 3 && bi === 2) {
        const gruppoTitle = document.createElement('div');
        gruppoTitle.className = 'gruppo-esclusivo-title';
        gruppoTitle.textContent = 'Benedizione finale — alternativa tra "semplice" ed "episcopale" (quest\'ultima solo se celebra il vescovo)';
        content.appendChild(gruppoTitle);
      }
      content.appendChild(creaBloccoDiv(s, si, b, bi));
    });
    sezioneContentEls[si] = content;
  });
}


const freeTextValues = {};
function onFreeTextInput(si, bi, val) {
  freeTextValues[keyFor(si,bi)] = val;
  renderOutput();
}

// Analogo di freeTextValues/onFreeTextInput ma per i blocchi "appunti con
// formattazione" (isCampoNoteFormattabile): qui si salva l'HTML (già
// sanitizzato tramite sanitizeAppuntiHtml) prodotto dal contenteditable,
// non semplice testo, così grassetto/corsivo/sottolineato/elenco puntato
// sopravvivono nel testo composto finale.
const freeTextHtmlValues = {};
function onFreeHtmlInput(si, bi, html) {
  freeTextHtmlValues[keyFor(si,bi)] = sanitizeAppuntiHtml(html);
  renderOutput();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------
// EVIDENZIAZIONE IN ROSSO DI "[", "]" E DEL SEGNAPOSTO "N."
// Nel Messale le parentesi quadre segnalano parti facoltative/da
// adattare, "N." il punto in cui va detto a voce un nome (papa, vescovo,
// santo, defunto...). Si opera sul testo GIA' passato da escapeHtml
// (che non tocca "[" "]" "N" "."), quindi dopo che i marcatori interni
// [[RUBRICA: ]] / [[VOCE: ]] / [[R]] sono già stati gestiti sul testo
// residuo: qui non restano più marcatori doppi "[[ ]]", solo eventuali
// parentesi quadre singole letterali del testo liturgico.
// Le parentesi si evidenziano da sole (solo il simbolo, non il contenuto
// racchiuso) per non appesantire la lettura; "N." va riconosciuto come
// token isolato (preceduto da inizio riga/spazio/parentesi, seguito da
// spazio/punteggiatura/fine riga o dal tag <span> appena inserito per una
// parentesi quadra successiva) per non colpire altre parole con "n." al
// loro interno.
function evidenziaSpeciali(escapedStr) {
  let out = escapedStr.replace(/([\[\]])/g, '<span class="testo-evidenza">$1</span>');
  // Nota: ">" è incluso tra i caratteri "precedenti" validi perché, dopo
  // la sostituzione delle parentesi quadre appena sopra, un "N." che si
  // trovava subito dopo una parentesi quadra (es. "[N.]") ora si trova
  // subito dopo il tag di chiusura "</span>" appena inserito.
  out = out.replace(/(^|[\s(>])(N\.)(?=[\s.,;:)\]<]|$)/g, '$1<span class="testo-evidenza">$2</span>');
  return out;
}

// ---------------------------------------------------------------------
// GRASSETTO PER LE RISPOSTE DELL'ASSEMBLEA
// Il meccanismo principale e' il marcatore esplicito [[R]] (vedi
// R_MARKER_RE piu' sotto), che i dati antepongono all'inizio della riga
// di risposta. Questo elenco di pattern resta come FALLBACK di sicurezza:
// se una riga non ha il marcatore [[R]] ma corrisponde per intero
// (case-insensitive) a uno di questi pattern noti, viene comunque resa in
// grassetto, cosi' eventuali risposte non ancora marcate nei dati non
// passano inosservate.
const RISPOSTE_ASSEMBLEA_REGEX = [
  /^amen\.?$/i,
  /^e con il tuo spirito\.?$/i,
  /^rendiamo grazie a dio\.?$/i,
  /^gloria a te,? o signore\.?$/i,
  /^lode a te,? o cristo\.?$/i,
  /^k[yý]rie,? el[eé]ison\.?$/i,
  /^contro di te abbiamo peccato\.?$/i,
  /^e donaci la tua salvezza\.?$/i,
  /^sono rivolti al signore\.?$/i,
  /^[eè] cosa buona e giusta\.?$/i,
  /^ci eleviamo a te,? signore\.?$/i,
  /^tu ci hai redenti con la tua croce e la tua risurrezione: salvaci,? o salvatore del mondo\.?$/i,
  /^annunciamo la tua morte, signore, proclamiamo la tua risurrezione, nell'attesa della tua venuta\.?$/i,
  /^ogni volta che mangiamo di questo pane e beviamo a questo calice annunciamo la tua morte, signore, nell'attesa della tua venuta\.?$/i
];
function isRispostaAssemblea(riga) {
  const r = riga.trim();
  if (!r) return false;
  return RISPOSTE_ASSEMBLEA_REGEX.some(re => re.test(r));
}

// Marcatore esplicito per le risposte del popolo/assemblea. Si antepone
// all'inizio della riga che contiene (solo) il testo della risposta, es.
// "[[R]]Nel nome di Cristo". Se nel testo originale la risposta condivide
// una "riga logica" con parole del celebrante, in MESSALE_DATA la si separa
// su una riga propria (con "\n" semplice, stesso paragrafo) cosi' il
// marcatore si applica solo alla frase di risposta, sullo stesso modello di
// [[VOCE: ...]] che marca l'inizio di un paragrafo. Il vecchio elenco
// RISPOSTE_ASSEMBLEA_REGEX resta attivo come fallback per le eventuali righe
// che non abbiano (ancora) il marcatore esplicito.
const R_MARKER_RE = /^\[\[R\]\]\s*/;
const RUBRICA_MARKER_RE = /^\[\[RUBRICA:\s*([\s\S]*?)\]\]$/;
// Marcatore "chi parla" nelle Preghiere Eucaristiche quando la Messa è
// concelebrata: CP = celebrante principale, CC = tutti i concelebranti
// insieme, 1C..4C = un singolo concelebrante (usato per dividere tra loro
// le intercessioni). Compare come paragrafo a sé stante [[VOCE: CP]] subito
// prima del paragrafo a cui si riferisce, esattamente come [[RUBRICA: ...]].
const VOCE_MARKER_RE = /^\[\[VOCE:\s*([\s\S]*?)\]\]$/;
const VOCE_LABELS = {
  'CP': { sigla: 'CP', titolo: 'Celebrante principale' },
  'CC': { sigla: 'CC', titolo: 'Tutti i concelebranti insieme' },
  '1C': { sigla: '1°C', titolo: 'Primo concelebrante' },
  '2C': { sigla: '2°C', titolo: 'Secondo concelebrante' },
  '3C': { sigla: '3°C', titolo: 'Terzo concelebrante' },
  '4C': { sigla: '4°C', titolo: 'Quarto concelebrante' },
  'CP+CC': { sigla: 'CP + CC', titolo: 'Il celebrante principale intona, poi tutti i concelebranti insieme' }
};
function formattaVoceBadge(codice) {
  const v = VOCE_LABELS[codice.trim()];
  const sigla = v ? v.sigla : codice.trim();
  const titolo = (v ? v.titolo : '') +
    ' — se celebri da solo, dici comunque tutto il testo che segue.';
  return '<span class="voce-badge" title="' + escapeHtml(titolo) + '">' + escapeHtml(sigla) + '</span>';
}
function formattaTesto(testo) {
  // converte testo con doppio a-capo in paragrafi, mantiene a-capo singoli;
  // le righe riconosciute come risposte dell'assemblea vengono avvolte in
  // <strong> per distinguerle a video, in modalità celebrazione e in stampa.
  // un paragrafo che contiene solo un marcatore [[RUBRICA: ...]] viene reso
  // come nota rubricale (rossa, corsivo) invece che come testo da recitare,
  // così le indicazioni di gesti/tempi del sacerdote restano intervallate
  // nel punto esatto del testo, anche in modalità celebrazione e in stampa.
  // un paragrafo che contiene solo un marcatore [[VOCE: CP/CC/1C..4C]] non
  // viene reso come blocco a sé: viene invece trasformato in una piccola
  // etichetta ("badge") che si antepone al paragrafo successivo, per
  // indicare chi parla in una concelebrazione senza interrompere la
  // lettura fluida di chi celebra da solo.
  let badgeInSospeso = null;
  return testo.split('\n\n').filter(p => p.trim().length > 0).map(par => {
    const mRub = par.trim().match(RUBRICA_MARKER_RE);
    if (mRub) {
      return '<span class="rubrica">' + evidenziaSpeciali(escapeHtml(mRub[1].trim())) + '</span>';
    }
    const mVoce = par.trim().match(VOCE_MARKER_RE);
    if (mVoce) {
      badgeInSospeso = formattaVoceBadge(mVoce[1]);
      return '';
    }
    const righe = par.split('\n').map(riga => {
      const mR = riga.match(R_MARKER_RE);
      if (mR) {
        const resto = riga.slice(mR[0].length);
        return '<strong>' + evidenziaSpeciali(escapeHtml(resto)) + '</strong>';
      }
      const esc = evidenziaSpeciali(escapeHtml(riga));
      return isRispostaAssemblea(riga) ? '<strong>' + esc + '</strong>' : esc;
    });
    const badge = badgeInSospeso || '';
    badgeInSospeso = null;
    return '<p style="margin:0 0 0.9em 0;">' + badge + righe.join('<br>') + '</p>';
  }).join('');
}

function renderOutput() {
  const out = document.getElementById('testo-composto');
  let html = '';
  let haContenuto = false;

  MESSALE_DATA.sezioni.forEach((s, si) => {
    let sezioneHtml = '';
    s.blocchi.forEach((b, bi) => {
      const k = keyFor(si, bi);
      if (isBloccoPreghieraEucaristica(b)) {
        // Blocco unificato "Preghiera Eucaristica": si assembla il testo
        // finale a partire dal "template" della preghiera scelta (delle
        // 12 disponibili: I-VI, Riconciliazione I-II, Varie necessità
        // 1-4), sostituendo ciascun segnaposto con il pezzo corrispondente
        // scelto dal celebrante:
        //  - i segnaposto elencati in p.parti_proprie (variano da
        //    preghiera a preghiera: es. {{COMMUNICANTES}}/{{HANC_IGITUR}}
        //    per la I, {{TEMPO_LITURGICO}}/{{BATTESIMO}}/{{DEFUNTI}} per
        //    la II, {{RITUALE}}/{{TEMPO_LITURGICO}}/{{DEFUNTI}} per la
        //    III, {{INCIPIT}} per la V) solo se la preghiera scelta ha
        //    "parti_proprie";
        //  - {{ANAMNESI}} sempre, con la formula di "Mistero della fede"
        //    scelta, valida per qualunque Preghiera Eucaristica.
        const st = stato[k];
        const p = b.preghiere[st.preghiera];
        let testo = p.template;
        if (p.parti_proprie) {
          const partiSt = st.parti_proprie || {};
          Object.keys(p.parti_proprie).forEach((nome) => {
            const parte = p.parti_proprie[nome];
            const idx = (partiSt[nome] >= 0 && partiSt[nome] < parte.opzioni.length) ? partiSt[nome] : 0;
            const scelto = parte.opzioni[idx];
            testo = testo.split(parte.placeholder).join(scelto.testo);
          });
        }
        const anamnesi = b.anamnesi.opzioni[st.anamnesi];
        testo = testo.replace('{{ANAMNESI}}', anamnesi.testo);
        const label = b.titolo + ' — ' + p.etichetta;
        sezioneHtml += '<span class="parte-titolo">' + escapeHtml(label) + '</span>';
        if (/\[\[VOCE:/.test(testo)) {
          // Le sigle CP/CC/1°C..4°C indicano chi parla quando la Messa è
          // concelebrata da più sacerdoti; qui una sola volta per preghiera
          // ricordiamo che, celebrando da soli (il caso più comune), si
          // dice comunque per intero tutto il testo, incluse le parti
          // etichettate come dei concelebranti.
          sezioneHtml += '<span class="voce-legenda">Le sigle CP (celebrante principale), CC (concelebranti insieme) e 1°C–4°C (un singolo concelebrante) valgono solo in caso di concelebrazione: se celebri da solo dici comunque tutto il testo.</span>';
        }
        sezioneHtml += formattaTesto(testo);
        haContenuto = true;
      } else if (isCampoNoteFormattabile(b)) {
        const htmlVal = freeTextHtmlValues[k];
        // Testo "vuoto" possibile anche con markup residuo (es. solo <br>
        // o <div><br></div> lasciato dal contenteditable): si controlla il
        // testo semplice, non l'HTML grezzo, per decidere se c'è contenuto.
        const testoSemplice = htmlVal ? htmlVal.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').trim() : '';
        if (testoSemplice.length > 0) {
          sezioneHtml += '<span class="parte-titolo">' + escapeHtml(b.titolo) + '</span>';
          // L'HTML arriva solo da document.execCommand dell'utente stesso
          // (contesto locale/offline) ed è già stato ristretto da
          // sanitizeAppuntiHtml a una whitelist di tag semplici senza
          // attributi; qui va inserito così com'è (non tramite
          // escapeHtml/formattaTesto, pensati per testo semplice) dentro
          // un contenitore .appunti-html che eredita la stessa tipografia
          // del resto del testo composto.
          sezioneHtml += '<div class="appunti-html">' + sanitizeAppuntiHtml(htmlVal) + '</div>';
          haContenuto = true;
        }
      } else if (isCampoLiberoBlocco(b)) {
        const val = freeTextValues[k];
        if (val && val.trim().length > 0) {
          sezioneHtml += '<span class="parte-titolo">' + escapeHtml(b.titolo) + '</span>';
          sezioneHtml += formattaTesto(val.trim());
          haContenuto = true;
        }
      } else {
        const idx = stato[k];
        if (idx >= 0 && b.opzioni[idx]) {
          const o = b.opzioni[idx];
          if (o.testo && o.testo.trim().length > 0) {
            let label = b.titolo;
            if (b.opzioni.length > 1) label += ' — ' + o.etichetta;
            sezioneHtml += '<span class="parte-titolo">' + escapeHtml(label) + '</span>';
            if (o.rubrica) sezioneHtml += '<span class="rubrica">' + evidenziaSpeciali(escapeHtml(o.rubrica)) + '</span>';
            sezioneHtml += formattaTesto(o.testo);
            haContenuto = true;
          }
        }
      }
    });
    if (sezioneHtml) {
      html += '<div class="sezione-output"><h3 style="color:var(--bordeaux-dark);border-bottom:2px solid var(--oro);padding-bottom:4px;margin-top:1.8em;">' + escapeHtml(s.titolo) + '</h3>' + sezioneHtml + '</div>';
    }
  });

  if (!haContenuto) {
    out.innerHTML = '<p class="vuoto">Nessuna parte selezionata. Scegli le parti della Messa dal pannello a sinistra: qui apparirà il testo completo, pronto per essere letto o stampato.</p>';
  } else {
    out.innerHTML = html;
  }
}

document.getElementById('btn-print').addEventListener('click', () => window.print());
document.getElementById('btn-reset').addEventListener('click', () => {
  initStato();
  document.querySelectorAll('textarea.campo-libero').forEach(t => t.value = '');
  Object.keys(freeTextValues).forEach(k => delete freeTextValues[k]);
  document.querySelectorAll('.appunti-editable').forEach(e => e.innerHTML = '');
  Object.keys(freeTextHtmlValues).forEach(k => delete freeTextHtmlValues[k]);
  buildPanel();
  renderOutput();
});

let fontSize = 1.25;
document.getElementById('font-plus').addEventListener('click', () => {
  fontSize = Math.min(2.2, fontSize + 0.1);
  document.getElementById('testo-composto').style.fontSize = fontSize + 'rem';
});
document.getElementById('font-minus').addEventListener('click', () => {
  fontSize = Math.max(0.9, fontSize - 0.1);
  document.getElementById('testo-composto').style.fontSize = fontSize + 'rem';
});

// ---------------------------------------------------------------------
// MODALITÀ CELEBRAZIONE
// Visualizzazione a schermo intero del testo già composto, pensata per
// essere letta dall'ambone su tablet/telefono/laptop, senza stampare.
// Riusa lo stesso elemento #testo-composto (stessa fonte di verità del
// grassetto per le risposte dell'assemblea), semplicemente ingrandendolo
// e portandolo in overlay tramite la classe "celebration-mode" sul body.
let celebFontSize = 1.2;
const outTesto = document.getElementById('testo-composto');
const celebBar = document.getElementById('celebration-bar');

function enterCelebration() {
  document.body.classList.add('celebration-mode');
  outTesto.style.fontSize = celebFontSize + 'rem';
  window.scrollTo(0, 0);
  const el = document.documentElement;
  if (el.requestFullscreen) {
    el.requestFullscreen().catch(() => { /* fullscreen negato: la vista overlay funziona comunque */ });
  }
}
function exitCelebration() {
  document.body.classList.remove('celebration-mode');
  outTesto.style.fontSize = fontSize + 'rem';
  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}
document.getElementById('btn-celebrate').addEventListener('click', enterCelebration);
document.getElementById('celeb-exit').addEventListener('click', exitCelebration);
document.getElementById('celeb-font-plus').addEventListener('click', () => {
  celebFontSize = Math.min(4.5, celebFontSize + 0.2);
  outTesto.style.fontSize = celebFontSize + 'rem';
});
document.getElementById('celeb-font-minus').addEventListener('click', () => {
  celebFontSize = Math.max(1.2, celebFontSize - 0.2);
  outTesto.style.fontSize = celebFontSize + 'rem';
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('celebration-mode')) {
    exitCelebration();
  }
});
document.addEventListener('fullscreenchange', () => {
  // Se l'utente esce dal fullscreen nativo (es. Esc del browser), esci
  // anche dalla nostra vista overlay per restare coerenti.
  if (!document.fullscreenElement && document.body.classList.contains('celebration-mode')) {
    exitCelebration();
  }
});

buildPanel();
renderOutput();

// ---------------------------------------------------------------------
// SPLASH SCREEN INIZIALE
// Breve animazione liturgica (croce dorata + bagliore) mostrata una sola
// volta, al caricamento della pagina. Si chiude da sola dopo circa 3
// secondi oppure subito al click/tocco/tasto, e non si ripresenta più
// per il resto della sessione (basta ricaricare la pagina per rivederla).
(function initSplash() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  let dismissed = false;
  function dismissSplash() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('splash-hide');
    setTimeout(() => { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 650);
  }
  splash.addEventListener('click', dismissSplash);
  document.addEventListener('keydown', function onKey(e) {
    if (!dismissed) dismissSplash();
    document.removeEventListener('keydown', onKey);
  });
  setTimeout(dismissSplash, 3200);
})();
</script>
