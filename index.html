al Corpo e al Sangue di Cristo lo Spirito Santo ci riunisca in un solo corpo.\n\n[[VOCE: 1C]]\n\nRicòrdati, Padre, della tua Chiesa diffusa su tutta la terra:{{TEMPO_LITURGICO}} rendila perfetta nell'amore in unione con il nostro papa N., il nostro vescovo N., i presbiteri e i diaconi. {{BATTESIMO}}\n\n[[VOCE: 2C]]\n\n{{DEFUNTI}}\n\nDi noi tutti abbi misericordia: donaci di aver parte alla vita eterna, insieme con la beata Maria, vergine e madre di Dio, san Giuseppe, suo sposo, gli apostoli, sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi, che in ogni tempo ti furono graditi, e in Gesù Cristo, tuo Figlio,\n\n[[RUBRICA: Congiunge le mani.]]\n\ncanteremo la tua lode e la tua gloria.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen.","parti_proprie":{"tempo_liturgico":{"titolo":"Ricòrdati della tua Chiesa — parte propria per il tempo liturgico","placeholder":"{{TEMPO_LITURGICO}}","opzioni":[{"etichetta":"— non includere — (giorni feriali)","testo":""},{"etichetta":"Per tutte le domeniche (testo comune)","testo":" e qui convocata nel giorno in cui Cristo ha vinto la morte e ci ha resi partecipi della sua vita immortale,"},{"etichetta":"Natale","testo":" e qui convocata nel giorno santissimo (nella notte santissima) in cui la Vergine Maria diede al mondo il Salvatore,"},{"etichetta":"Epifania","testo":" e qui convocata nel giorno santissimo in cui il tuo unico Figlio, eterno con te nella gloria, si è manifestato nella nostra natura umana,"},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua","testo":" e qui convocata nel giorno glorioso della risurrezione di Cristo Signore nel suo vero corpo,"},{"etichetta":"Ascensione","testo":" e qui convocata nel giorno glorioso dell'Ascensione in cui Cristo è stato costituito Signore del cielo e della terra,"},{"etichetta":"Pentecoste","testo":" e qui convocata nel giorno santissimo in cui l'effusione del tuo Spirito l'ha costituita sacramento di unità per tutti i popoli,"}]},"battesimo":{"titolo":"Ricòrdati anche dei nostri fratelli — inserto per il Battesimo/iniziazione cristiana (facoltativo)","placeholder":"{{BATTESIMO}}","opzioni":[{"etichetta":"Nessuno (Messa ordinaria)","testo":""},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua o per l'iniziazione cristiana degli adulti","testo":"Ricòrdati anche dei nostri fratelli [e sorelle] [N. e N.], che mediante il Battesimo [e la Confermazione] sono entrati a far parte della tua famiglia: fa' che seguano Cristo, tuo Figlio, con animo generoso e ardente."}]},"defunti":{"titolo":"Ricòrdati anche dei nostri fratelli e sorelle — intercessione per i defunti","placeholder":"{{DEFUNTI}}","opzioni":[{"etichetta":"Forma ordinaria","testo":"Ricòrdati anche dei nostri fratelli e sorelle, che si sono addormentati nella speranza della risurrezione, e, nella tua misericordia, di tutti i defunti: ammettili alla luce del tuo volto."},{"etichetta":"Nelle Messe per i defunti","testo":"Ricòrdati del nostro fratello (della nostra sorella) N., che (oggi) hai chiamato a te da questa vita; e come per il Battesimo l'hai unito(a) alla morte di Cristo, tuo Figlio, così rendilo(a) partecipe della sua risurrezione. Ricòrdati anche dei nostri fratelli e sorelle che si sono addormentati nella speranza della risurrezione e, nella tua misericordia, di tutti i defunti: ammettili alla luce del tuo volto."}]}}},{"id":"III","etichetta":"Preghiera Eucaristica III","note":null,"template":"\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo sei tu, o Padre, ed è giusto che ogni creatura ti lodi. Per mezzo del tuo Figlio, il Signore nostro Gesù Cristo, nella potenza dello Spirito Santo fai vivere e santifichi l'universo, e continui a radunare intorno a te un popolo, che dall'oriente all'occidente offra al tuo nome il sacrificio perfetto.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice:]]\n\n[[VOCE: CP]]\n\nTi preghiamo umilmente: santifica e consacra con il tuo Spirito i doni che ti abbiamo presentato\n\n[[RUBRICA: Congiunge le mani e traccia un segno di croce sul pane e sul calice, dicendo:]]\n\n perché diventino il Corpo e ✠ il Sangue del tuo Figlio, il Signore nostro Gesù Cristo,\n\n[[RUBRICA: Congiunge le mani.]]\n\n che ci ha comandato di celebrare questi misteri.\n\n[[RUBRICA: Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nNella notte in cui veniva tradito, egli prese il pane, ti rese grazie con la preghiera di benedizione, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, prese il calice, ti rese grazie con la preghiera di benedizione, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[VOCE: CC]]\n\nCelebrando il memoriale della passione redentrice del tuo Figlio, della sua mirabile risurrezione e ascensione al cielo, nell'attesa della sua venuta nella gloria ti offriamo, o Padre, in rendimento di grazie questo sacrificio vivo e santo. Guarda con amore e riconosci, nell'offerta della tua Chiesa, la vittima immolata per la nostra redenzione; e a noi, che ci nutriamo del Corpo e del Sangue del tuo Figlio, dona la pienezza dello Spirito Santo perché diventiamo in Cristo un solo corpo e un solo spirito.\n\n[[VOCE: 1C]]\n\nLo Spirito Santo faccia di noi un'offerta perenne a te gradita, perché possiamo ottenere il regno promesso con i tuoi eletti: con la beata Maria, vergine e madre di Dio, san Giuseppe, suo sposo, i tuoi santi apostoli, i gloriosi martiri, sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi, nostri intercessori presso di te.\n\n[[VOCE: 2C]]\n\nTi preghiamo, o Padre: questo sacrificio della nostra riconciliazione doni pace e salvezza al mondo intero. Conferma nella fede e nell'amore la tua Chiesa pellegrina sulla terra: il tuo servo e nostro papa N., il nostro vescovo N., l'ordine episcopale, i presbiteri, i diaconi e il popolo che tu hai redento. {{RITUALE}}\n\nAscolta la preghiera di questa famiglia, che hai convocato alla tua presenza{{TEMPO_LITURGICO}}.\n\nRicongiungi a te, Padre misericordioso, tutti i tuoi figli ovunque dispersi. {{DEFUNTI}}\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen.","parti_proprie":{"rituale":{"titolo":"Assisti/Sostieni — inserto per il Battesimo (facoltativo)","placeholder":"{{RITUALE}}","opzioni":[{"etichetta":"Nessuno (Messa ordinaria)","testo":""},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua o per l'iniziazione cristiana degli adulti","testo":"Sostieni nell'impegno cristiano i tuoi figli [e figlie] [N. e N.], che oggi mediante il lavacro della rigenerazione [e il dono dello Spirito Santo] hai chiamato a far parte del tuo popolo: con il tuo aiuto possano camminare sempre in novità di vita."},{"etichetta":"Per il conferimento del Battesimo dei bambini","testo":"Assisti i nostri fratelli [e sorelle] [N. e N.], che oggi hai liberato dal peccato e rigenerato dall'acqua e dallo Spirito Santo: tu che li hai inseriti come membra vive nel corpo di Cristo scrivi i loro nomi nel libro della vita."}]},"tempo_liturgico":{"titolo":"Ascolta la preghiera di questa famiglia — parte propria per il tempo liturgico","placeholder":"{{TEMPO_LITURGICO}}","opzioni":[{"etichetta":"— non includere — (giorni feriali)","testo":""},{"etichetta":"Per tutte le domeniche (testo comune)","testo":" nel giorno in cui Cristo ha vinto la morte e ci ha resi partecipi della sua vita immortale"},{"etichetta":"Natale","testo":" nel giorno santissimo (nella notte santissima) in cui la Vergine Maria diede al mondo il Salvatore"},{"etichetta":"Epifania","testo":" nel giorno santissimo in cui il tuo unico Figlio, eterno con te nella gloria, si è manifestato nella nostra natura umana"},{"etichetta":"Dalla Messa di Pasqua alla II Domenica di Pasqua","testo":" nel giorno glorioso della risurrezione di Cristo Signore nel suo vero corpo"},{"etichetta":"Ascensione","testo":" nel giorno glorioso dell'Ascensione in cui Cristo è stato costituito Signore del cielo e della terra"},{"etichetta":"Pentecoste","testo":" nel giorno santissimo in cui l'effusione del tuo Spirito l'ha costituita sacramento di unità per tutti i popoli"}]},"defunti":{"titolo":"Accogli nel tuo regno — intercessione per i defunti","placeholder":"{{DEFUNTI}}","opzioni":[{"etichetta":"Forma ordinaria","testo":"Accogli nel tuo regno i nostri fratelli e sorelle defunti e tutti coloro che, in pace con te, hanno lasciato questo mondo; concedi anche a noi di ritrovarci insieme a godere per sempre della tua gloria, in Cristo, nostro Signore, per mezzo del quale tu, o Dio, doni al mondo ogni bene."},{"etichetta":"Nelle Messe per i defunti","testo":"Ricòrdati del nostro fratello (della nostra sorella) N. che (oggi) hai chiamato a te da questa vita: e come per il Battesimo l'hai unito(a) alla morte di Cristo, tuo Figlio, così rendilo(a) partecipe della sua risurrezione, quando egli farà sorgere i morti dalla terra e trasformerà il nostro corpo mortale per conformarlo al suo corpo glorioso. Accogli nel tuo regno i nostri fratelli e sorelle defunti e tutti coloro che, in pace con te, hanno lasciato questo mondo; concedi anche a noi di ritrovarci insieme a godere della tua gloria quando, asciugata ogni lacrima, i nostri occhi vedranno il tuo volto e noi saremo simili a te, e canteremo per sempre la tua lode, in Cristo, nostro Signore, per mezzo del quale tu, o Dio, doni al mondo ogni bene."}]}}},{"id":"IV","etichetta":"Preghiera Eucaristica IV","note":"Il prefazio proprio non si può mai sostituire con un altro. Presenta la sintesi della storia della salvezza; in questa preghiera non si può inserire una formula specifica per un defunto.","template":"[[VOCE: CP]]\n\nÈ veramente giusto renderti grazie, è bello cantare la tua gloria, Padre santo, unico Dio vivo e vero: prima del tempo e in eterno tu sei, nel tuo regno di luce inaccessibile. Tu solo sei buono e fonte della vita, e hai dato origine all'universo per effondere le tue benedizioni su tutte le creature e allietarle con gli splendori della tua luce. Schiere innumerevoli di angeli stanno davanti a te per servirti, contemplano la gloria del tuo volto e giorno e notte cantano la tua lode. Insieme con loro anche noi, fatti voce di ogni creatura che è sotto il cielo, confessiamo il tuo nome ed esultanti cantiamo: Santo...\n\n[[VOCE: CP]]\n\nNoi ti lodiamo, Padre santo, per la tua grandezza: tu hai fatto ogni cosa con sapienza e amore. Hai creato l'uomo a tua immagine, alle sue mani hai affidato la cura del mondo intero perché nell'obbedienza a te, unico creatore, esercitasse la signoria su tutte le creature. E quando, per la sua disobbedienza, l'uomo perse la tua amicizia, tu non lo hai abbandonato in potere della morte, ma, nella tua misericordia, a tutti sei venuto incontro, perché coloro che ti cercano ti possano trovare. Molte volte hai offerto agli uomini la tua alleanza, e per mezzo dei profeti hai insegnato a sperare nella salvezza. Padre santo, hai tanto amato il mondo da mandare a noi, nella pienezza dei tempi, il tuo unigenito Figlio come salvatore. Egli si è fatto uomo per opera dello Spirito Santo ed è nato dalla Vergine Maria; ha condiviso in tutto, eccetto il peccato, la nostra condizione umana.\n\nAi poveri annunciò il Vangelo di salvezza, la libertà ai prigionieri, agli afflitti la gioia. Per attuare il tuo disegno di redenzione consegnò se stesso alla morte e risorgendo distrusse la morte e rinnovò la vita. E perché non vivessimo più per noi stessi ma per lui che è morto e risorto per noi, ha mandato, o Padre, lo Spirito Santo, primo dono ai credenti, a perfezionare la sua opera nel mondo e compiere ogni santificazione.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\n[[VOCE: CP]]\n\nOra ti preghiamo, o Padre: venga il tuo santo Spirito a santificare questi doni\n\n[[RUBRICA: Congiunge le mani e traccia un segno di croce sul pane e sul calice, dicendo:]]\n\n perché diventino il Corpo e ✠ il Sangue del Signore nostro, Gesù Cristo, nella celebrazione di questo grande mistero, che ci ha lasciato come alleanza eterna.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nEgli, venuta l'ora di essere glorificato da te, Padre santo, avendo amato i suoi che erano nel mondo, li amò sino alla fine; e, mentre cenava con loro, prese il pane, pronunciò la benedizione, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, prese il calice, ti rese grazie con la preghiera di benedizione, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[VOCE: CC]]\n\nIn questo memoriale della nostra redenzione celebriamo, Padre, la morte di Cristo, la sua discesa agli inferi, proclamiamo la sua risurrezione e ascensione al cielo, dove siede alla tua destra; e, in attesa della sua venuta nella gloria, ti offriamo il suo Corpo e il suo Sangue, sacrificio a te gradito e fonte di salvezza per il mondo intero.\n\n[[VOCE: CC]]\n\nGuarda con amore, o Dio, il sacrificio che tu stesso hai preparato per la tua Chiesa; e a tutti coloro che parteciperanno a quest'unico pane e a quest'unico calice concedi che, riuniti in un solo corpo dallo Spirito Santo, diventino offerta viva in Cristo, a lode della tua gloria.\n\n[[VOCE: 1C]]\n\nOra, Padre, ricòrdati di tutti quelli per i quali noi ti offriamo questo sacrificio: del tuo servo e nostro papa N., del nostro vescovo N., dell'ordine episcopale, dei presbiteri, dei diaconi, di coloro che si uniscono alla nostra offerta, di quanti sono qui riuniti, dell'intero tuo popolo e di tutti quelli che ti cercano con cuore sincero.\n\n[[VOCE: 2C]]\n\nRicòrdati anche di coloro che sono morti nella pace del tuo Cristo e di tutti i defunti, dei quali tu solo hai conosciuto la fede. Padre misericordioso, concedi a tutti noi, tuoi figli, di ottenere con la beata Maria, vergine e madre di Dio, san Giuseppe, suo sposo, gli apostoli, sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi, l'eredità eterna del tuo regno, dove con tutte le creature, liberate dalla corruzione del peccato e della morte, canteremo la tua gloria, in Cristo nostro Signore, per mezzo del quale tu, o Dio, doni al mondo ogni bene.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen."},{"id":"V","etichetta":"Preghiera Eucaristica V","note":"Si deve usare nella Messa vespertina nella cena del Signore (Giovedì Santo); si può anche usare nelle Messe che hanno come tema il mistero dell'Eucaristia e della passione, nelle ordinazioni, negli anniversari sacerdotali e nelle riunioni sacerdotali. Non è prevista la formula speciale per il defunto.","template":"\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo, veramente benedetto sei tu, o Dio; tu ci hai voluto in comunione di vita con il Figlio tuo, eredi con lui del tuo regno, cittadini del cielo e compagni degli angeli, se però conserviamo con fede pura il mistero cantato dalle schiere celesti. E noi, elevati a tale dignità da poter presentare a te, per l'efficacia dello Spirito Santo, il sacrificio sublime del Corpo e del Sangue del Signore nostro Gesù Cristo, tutto possiamo sperare dalla tua misericordia.\n\n[[VOCE: CC]]\n\nPer la redenzione del mondo, egli andò incontro liberamente alla passione che ricordiamo con venerazione e con amore. E per istituire un sacrificio quale sacramento di salvezza perenne, per primo offrì se stesso come vittima e comandò di ripresentarne l'offerta.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\n{{INCIPIT}} egli prese il pane, e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, spezzò il pane, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nDopo la cena, allo stesso modo, prese il calice, e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Diede loro anche questo comando: ogni volta che farete questo lo farete in memoria di me: predicherete la mia morte, annuncerete la mia risurrezione, attenderete con fiducia il mio ritorno finché di nuovo verrò a voi dal cielo».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[VOCE: CC]]\n\nObbedendo al divino comando, noi celebriamo, o Padre, questo mistero e, ricercando nel convito del Corpo del Signore una comunione inseparabile con lui, ne annunciamo la morte. Manda a noi, o Padre onnipotente, l'unigenito tuo Figlio, tu che ce lo hai mandato con amore spontaneo prima ancora che l'uomo potesse cercarlo. Da te, che sei Dio ineffabile e immenso, lo hai generato Dio ineffabile e immenso, a te uguale. Donaci, ora, quale fonte di salvezza, il suo Corpo che ha sofferto per la redenzione degli uomini.\n\n[[VOCE: 1C]]\n\nGuarda propizio a questo popolo che è tuo possesso e a tutta la tua famiglia, che in comunione con il nostro papa N. e con il nostro vescovo N., rinnovando il mistero della passione del Signore, proclama le tue opere meravigliose e rivive i prodigi che l'hanno chiamata a libertà. Tu che ora ci raduni con il vincolo di un amore sincero nell'unità della Chiesa cattolica, serbaci per il banchetto del cielo e per la partecipazione alla tua gloria con la beata Vergine Maria, san Giuseppe, suo sposo, sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer il Signore nostro Gesù Cristo, nell'unità dello Spirito Santo, a te, o Padre, è l'onore, la lode, la gloria, la maestà e la potenza, ora e sempre, dall'eternità e per tutti i secoli dei secoli.\n[[R]]Amen.","parti_proprie":{"incipit":{"titolo":"Incipit del racconto dell'istituzione — parte propria","placeholder":"{{INCIPIT}}","opzioni":[{"etichetta":"Comune (fuori dal Giovedì Santo)","testo":"Alla vigilia di patire, per la salvezza nostra e del mondo intero, stando a mensa tra i suoi discepoli,"},{"etichetta":"Giovedì Santo (Messa nella Cena del Signore)","testo":"In questo giorno, alla vigilia di patire, per la salvezza nostra e del mondo intero, stando a mensa tra i suoi discepoli,"}]}}},{"id":"VI","etichetta":"Preghiera Eucaristica VI","note":"Si deve usare nella veglia pasquale; si può usare anche nelle Messe per i battezzati, nelle domeniche e nelle ferie del tempo pasquale e nelle Messe rituali dell'iniziazione cristiana.","template":"\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo, veramente benedetto è il Signore nostro Gesù Cristo, Figlio tuo.\n\n[[VOCE: CC]]\n\nEgli, che è Dio infinito ed eterno, discese dal cielo, si umiliò fino alla condizione di servo e venne a condividere la sorte di chi si era perduto. Accettò volontariamente di soffrire per liberare dalla morte l'uomo che lui stesso aveva creato; con amore che non conosce confini ci lasciò quale sacrificio da offrire al tuo nome il suo Corpo e il suo Sangue, che la potenza dello Spirito Santo rende presenti sull'altare.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nLa vigilia della sua passione, sofferta per la salvezza nostra e del mondo intero, stando a mensa tra i suoi discepoli, egli prese il pane, e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, spezzò il pane, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione.]]\n\n[[RUBRICA: Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nDopo la cena, allo stesso modo, prese il calice, e, alzando gli occhi al cielo, a te, Dio Padre suo onnipotente, rese grazie con la preghiera di benedizione, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Diede loro anche questo comando: ogni volta che farete questo lo farete in memoria di me: predicherete la mia morte, annuncerete la mia risurrezione, attenderete con fiducia il mio ritorno finché di nuovo verrò a voi dal cielo».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione.]]\n\n[[RUBRICA: Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[VOCE: CC]]\n\nIl mistero che celebriamo, o Padre, è obbedienza al comando di Cristo. Manda tra noi in questa azione sacrificale colui che l'ha istituita perché la presenza del Figlio tuo in questo sublime sacramento doni pienezza alla nostra fede. E a noi, che offriamo il vero sacrificio, concedi di comunicare alla viva e misteriosa realtà del Corpo e del Sangue del Signore.\n\n[[VOCE: 1C]]\n\nDégnati, o Dio, di accogliere questo sacrificio pasquale: uniti alla beata Vergine Maria, madre di Dio, a san Giuseppe, suo sposo, a sant'Ambrogio [san N.: santo del giorno o patrono] e a tutti i santi, insieme con il nostro papa N. e con il nostro vescovo N., noi te lo offriamo con cuore umile e grato per la tua santa Chiesa, diffusa su tutta la terra e radunata dalla potenza dello Spirito Santo nell'amore del suo Redentore.\n\nTe l'offriamo inoltre per i sacerdoti a te consacrati, per questo tuo popolo, che in te ha trovato misericordia, e per i nostri fratelli e sorelle che ci hanno preceduto nella fiduciosa speranza della venuta del tuo regno. Serba scritti nel libro della vita i nomi di tutti perché tu li possa tutti ritrovare nella comunione del Signore nostro Gesù Cristo.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia e con l'altra il calice e, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nCon lui e con lo Spirito Santo, a te, o Padre, è l'onore, la lode, la gloria, la maestà e la potenza, ora e sempre, dall'eternità e per tutti i secoli dei secoli.\n[[R]]Amen."},{"id":"RIC_I","gruppo":"Preghiere eucaristiche della Riconciliazione","etichetta":"Riconciliazione I","note":"Preghiera eucaristica della Riconciliazione I: da utilizzare nelle Messe in cui i fedeli sono introdotti in modo particolare al mistero della riconciliazione (per la concordia, per la pace e la giustizia, in tempo di guerra o di disordini, per la remissione dei peccati, per chiedere la virtù della carità, nel tempo di quaresima). Ha un prefazio proprio, ma può essere usata anche con altri prefazi sul tema della penitenza e della conversione.","template":"[[VOCE: CP]]\n\nÈ veramente cosa buona e giusta rendere grazie sempre, qui e in ogni luogo, a te, Signore, Padre santo, Dio onnipotente ed eterno. Tu non ti stanchi mai di chiamarci alla pienezza di vita; ricco di misericordia, continui a offrire il perdono e inviti i peccatori a confidare solo nella tua benevolenza. Molte volte abbiamo infranto la tua alleanza, ma tu, per mezzo di Gesù, tuo Figlio e nostro redentore, invece di abbandonarci hai stretto un nuovo vincolo di carità con la famiglia umana, un vincolo così saldo che nulla potrà spezzare. Anche a noi offri oggi un tempo di grazia e di riconciliazione, perché, affidandoci unicamente alla tua misericordia, ritroviamo la via del ritorno a te e, aprendoci all'azione dello Spirito Santo, viviamo in Cristo la vita nuova, nella lode perenne del tuo nome e nel servizio dei fratelli. Per questo, pieni di stupore, o Padre, esaltiamo la potenza del tuo amore e, confessando la nostra gioia per la salvezza, con la moltitudine dei cori celesti cantiamo senza fine l'inno della tua gloria: Santo...\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo, sei tu, o Padre, che fin dall'origine del mondo continui la tua opera, per renderci santi come tu sei santo.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice; traccia un segno di croce sul pane e sul calice alle parole «il Corpo ✠ e il Sangue»:]]\n\n[[VOCE: CC]]\n\nGuarda i doni del tuo popolo ed effondi su di essi la potenza del tuo Spirito, perché diventino il Corpo ✠ e il Sangue del tuo amatissimo Figlio, Gesù Cristo, nel quale anche noi siamo tuoi figli.\n\nEravamo perduti e incapaci di accostarci a te, ma tu ci hai dato la prova suprema del tuo amore, quando il tuo Figlio, il solo giusto, consegnò se stesso alla morte e per noi si lasciò inchiodare al legno della croce. Prima di stendere le braccia tra il cielo e la terra, in segno di perenne alleanza, egli volle celebrare la Pasqua con i suoi discepoli.\n\n[[RUBRICA: Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nMentre cenava, prese il pane, ti rese grazie con la preghiera di benedizione, lo spezzò, lo diede loro e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione. Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, sapendo che avrebbe riconciliato tutto in sé nel Sangue sparso sulla croce, prese il calice colmo del frutto della vite, di nuovo rese grazie, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione. Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[RUBRICA: Con le braccia distese in forma di croce, il sacerdote dice:]]\n\n[[VOCE: CC]]\n\nCelebrando il memoriale della morte e risurrezione dagli inferi del tuo Figlio, nostra Pasqua e nostra pace, in attesa del giorno beato della sua venuta alla fine dei tempi, offriamo a te, Dio vero e fedele, questo sacrificio che riconcilia nel tuo amore l'umanità intera.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\nGuarda, con benevolenza, Padre clementissimo, coloro che ricongiungi a te nel sacrificio del tuo Figlio, e fa' che, partecipando all'unico pane e all'unico calice, per la potenza dello Spirito Santo siano riuniti in Cristo in un solo corpo, che non conosca divisione e discordia.\n\n[[VOCE: 1C]]\n\nCustodisci tutti noi in comunione di fede e di amore con il nostro papa N. e il nostro vescovo N. [è permesso nominare anche il vescovo coadiutore, gli ausiliari o un altro vescovo]. Aiutaci ad attendere insieme l'avvento del tuo regno fino al giorno in cui staremo davanti a te, santi tra i santi, nella dimora del cielo, con la beata Maria, vergine e madre di Dio, san Giuseppe, gli apostoli, sant'Ambrogio e tutti i santi, con i nostri fratelli e sorelle defunti, che affidiamo alla tua misericordia. Allora, liberati ormai dalla ferita della colpa e fatti pienamente nuova creatura, canteremo con gioia l'inno di ringraziamento che sale a te dal tuo Cristo vivente in eterno.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia, e con l'altra il calice, ed, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen."},{"id":"RIC_II","gruppo":"Preghiere eucaristiche della Riconciliazione","etichetta":"Riconciliazione II","note":"Preghiera eucaristica della Riconciliazione II: da utilizzare nelle Messe in cui i fedeli sono introdotti in modo particolare al mistero della riconciliazione. Ha un prefazio proprio, ma può essere usata anche con altri prefazi sul tema della penitenza e della conversione.","template":"[[VOCE: CP]]\n\nÈ veramente cosa buona e giusta renderti grazie e innalzare a te le nostre lodi, Dio Padre onnipotente, per i prodigi che operi in questo mondo per mezzo di Gesù Cristo, Signore nostro. In un mondo lacerato da lotte e discordie riconosciamo la tua opera che piega la durezza dei cuori e li rende disponibili alla riconciliazione. Con la forza del tuo Spirito agisci nell'intimo dei cuori, perché i nemici si aprano al dialogo, gli avversari si stringano la mano e i popoli si incontrino nella concordia. Per tuo dono, o Padre, la ricerca sincera della pace estingue le contese, l'odio è vinto dall'amore, la vendetta è disarmata dal perdono. E noi, uniti agli angeli, cantori della tua gloria, innalziamo con gioia l'inno di benedizione e di lode: Santo...\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nPadre onnipotente, noi ti benediciamo per Gesù Cristo, Figlio tuo, venuto nel tuo nome: egli è per tutti la parola che salva, la mano che tendi ai peccatori, la via che ci guida alla tua pace. Quando ci siamo allontanati da te a causa del peccato, tu ci hai riconciliati per mezzo del tuo Figlio, consegnato alla morte per noi, perché, nuovamente rivolti a te, ci amassimo gli uni gli altri come lui ci ha amati.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice; traccia un segno di croce sul pane e sul calice alle parole «il Corpo e ✠ il Sangue»:]]\n\n[[VOCE: CC]]\n\nPer questo mistero di riconciliazione ti supplichiamo: santifica questi doni con l'effusione del tuo Spirito, perché diventino il Corpo e ✠ il Sangue del tuo Figlio, che ci ha comandato di celebrare questi misteri.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nEgli, venuta l'ora di dare la vita per la nostra liberazione, mentre cenava, prese il pane nelle sue mani, ti rese grazie con la preghiera di benedizione, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione. Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, in quella sera, prese nelle sue mani il calice della benedizione e, confessando la tua misericordia, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione. Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[RUBRICA: Con le braccia distese in forma di croce, il sacerdote dice:]]\n\n[[VOCE: CC]]\n\nCelebrando il memoriale della morte e risurrezione del tuo Figlio, ti offriamo, o Padre, il sacrificio della perfetta riconciliazione, che egli ci ha lasciato come pegno del suo amore e che tu stesso hai posto nelle nostre mani.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\nTi preghiamo umilmente, Padre santo: accetta anche noi con l'offerta del tuo Figlio, e nella partecipazione a questo convito di salvezza donaci il tuo Spirito, perché sia tolto ogni ostacolo sulla via della concordia.\n\n[[VOCE: 1C]]\n\nEgli renda la tua Chiesa segno di unità tra gli uomini e strumento della tua pace, e ci custodisca in comunione con il nostro papa N., il nostro vescovo N. [è permesso nominare anche il vescovo coadiutore, gli ausiliari o un altro vescovo], il collegio episcopale e l'intero tuo popolo. Accogli nel tuo regno i nostri fratelli e le nostre sorelle che si sono addormentati nel Signore, e tutti i defunti, dei quali tu solo hai conosciuto la fede.\n\n[[VOCE: 2C]]\n\nTu che ci hai convocati intorno alla mensa del tuo Figlio, raccogli in unità gli uomini di ogni stirpe e di ogni lingua, insieme con la Vergine Maria, gloriosa madre di Dio, con san Giuseppe, con gli apostoli, con sant'Ambrogio e tutti i santi nel convito della Gerusalemme nuova, dove splende la pienezza della tua pace, in Cristo Gesù, Signore nostro.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia, e con l'altra il calice, ed, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen."},{"id":"VN_1","gruppo":"Preghiera eucaristica per le Messe per varie necessità","etichetta":"Per varie necessità — 1. La Chiesa in cammino verso l'unità","note":"Da utilizzare, ad esempio, nelle Messe per la Chiesa, per il papa, per il vescovo, per l'elezione del papa o del vescovo, per un concilio o un sinodo, per i sacerdoti, per il sacerdote celebrante, per i ministri della Chiesa, per una riunione spirituale o pastorale, per l'unità dei cristiani.","template":"[[VOCE: CP]]\n\nÈ veramente cosa buona e giusta renderti grazie e innalzare a te l'inno di benedizione e di lode, Signore, Padre di bontà infinita. Con il Vangelo del tuo Figlio e con la forza del tuo Spirito hai costituito l'unica Chiesa, per mezzo della quale continui a radunare in unità il genere umano da ogni popolo, lingua e nazione. Così la Chiesa, manifestando l'alleanza del tuo amore, dona al mondo la beata speranza del regno e risplende quale segno della tua fedeltà, promessa per tutte le generazioni in Cristo Gesù, Signore nostro. Per questo mistero di salvezza, con tutte le potenze dei cieli, noi quaggiù sulla terra ti celebriamo senza fine e con tutta la Chiesa a una sola voce cantiamo: Santo…\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo sei tu e degno di gloria, Dio che ami gli uomini, sempre vicino a loro nel cammino della vita. Veramente benedetto è il tuo Figlio, presente in mezzo a noi ogni volta che siamo radunati dal suo amore. Egli, come un tempo ai discepoli, ci svela il senso delle Scritture e spezza il pane per noi.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice; traccia un segno di croce sul pane e sul calice alle parole «il Corpo ✠ e il Sangue»:]]\n\n[[VOCE: CC]]\n\nTi preghiamo, Padre clementissimo: manda il tuo Spirito Santo a santificare il pane e il vino, perché questi doni diventino per noi il Corpo ✠ e il Sangue del Signore nostro Gesù Cristo.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nLa vigilia della sua passione, nella notte dell'ultima cena, egli prese il pane e rese grazie, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione. Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, prese il calice, ti rese grazie, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione. Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[RUBRICA: Con le braccia distese in forma di croce, il sacerdote dice:]]\n\n[[VOCE: CC]]\n\nOra, Padre santo, celebrando il memoriale di Cristo tuo Figlio e nostro salvatore, che per la passione e la morte di croce hai fatto entrare nella gloria della risurrezione e hai posto alla tua destra, annunciamo l'opera del tuo amor oi figli. Per questo mistero di salvezza ti lodiamo e ti benediciamo, e, uniti agli angeli e ai santi, cantiamo senza fine l'inno della tua gloria: Santo…\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, dice:]]\n\n[[VOCE: CP]]\n\nVeramente santo sei tu e degno di gloria, Dio che ami gli uomini, sempre vicino a loro nel cammino della vita. Veramente benedetto è il tuo Figlio, presente in mezzo a noi ogni volta che siamo radunati dal suo amore. Egli, come un tempo ai discepoli, ci svela il senso delle Scritture e spezza il pane per noi.\n\n[[RUBRICA: Congiunge le mani e, tenendole stese sulle offerte, dice; traccia un segno di croce sul pane e sul calice alle parole «il Corpo ✠ e il Sangue»:]]\n\n[[VOCE: CC]]\n\nTi preghiamo, Padre clementissimo: manda il tuo Spirito Santo a santificare il pane e il vino, perché questi doni diventino per noi il Corpo ✠ e il Sangue del Signore nostro Gesù Cristo.\n\n[[RUBRICA: Congiunge le mani. Le parole del Signore si pronuncino con voce chiara e distinta. Prende il pane e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nLa vigilia della sua passione, nella notte dell'ultima cena, egli prese il pane e rese grazie, lo spezzò, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione:]]\n\n«PRENDETE, E MANGIATENE TUTTI: QUESTO È IL MIO CORPO OFFERTO IN SACRIFICIO PER VOI».\n\n[[RUBRICA: Presenta al popolo l'ostia consacrata, la depone sulla patena e genuflette in adorazione. Poi riprende: prende il calice e, tenendolo leggermente sollevato sull'altare, prosegue:]]\n\nAllo stesso modo, dopo aver cenato, prese il calice, ti rese grazie, lo diede ai suoi discepoli e disse:\n\n[[RUBRICA: Si inchina leggermente, poi pronuncia le parole della consacrazione del calice:]]\n\n«PRENDETE, E BEVETENE TUTTI: QUESTO È IL CALICE DEL MIO SANGUE PER LA NUOVA ED ETERNA ALLEANZA, VERSATO PER VOI E PER TUTTI IN REMISSIONE DEI PECCATI. Fate questo in memoria di me».\n\n[[RUBRICA: Presenta al popolo il calice, lo depone sul corporale e genuflette in adorazione. Quindi il sacerdote canta o dice:]]\n\n[[VOCE: CP]]\n\nMistero della fede.\n{{ANAMNESI}}\n\n[[RUBRICA: Con le braccia distese in forma di croce, il sacerdote dice:]]\n\n[[VOCE: CC]]\n\nOra, Padre santo, celebrando il memoriale di Cristo tuo Figlio e nostro salvatore, che per la passione e la morte di croce hai fatto entrare nella gloria della risurrezione e hai posto alla tua destra, annunciamo l'opera del tuo amore fino al giorno della sua venuta, e ti offriamo il pane della vita e il calice della benedizione.\n\n[[RUBRICA: Con le braccia allargate, prosegue:]]\n\nGuarda con benevolenza l'offerta della tua Chiesa: è il sacrificio pasquale di Cristo che egli stesso ci ha consegnato e che noi ti presentiamo. Concedi che, comunicando al suo Corpo e al suo Sangue, per la potenza del tuo Spirito di amore diventiamo, ora e per l'eternità, membra vive del tuo Figlio.\n\n[[VOCE: 1C]]\n\nConduci, Signore, la tua Chiesa alla pienezza della fede e dell'amore, in unione con il nostro papa N. e il nostro vescovo N. [è permesso nominare anche il vescovo coadiutore, gli ausiliari o un altro vescovo], con tutti i vescovi, i presbiteri e i diaconi e l'intero popolo che tu hai redento. Apri i nostri occhi perché vediamo le necessità dei fratelli, ispiraci parole e opere per confortare gli affaticati e gli oppressi. Fa' che li serviamo in sincerità di cuore sull'esempio di Cristo e secondo il suo comandamento. La tua Chiesa sia testimonianza viva di verità e di libertà, di giustizia e di pace, perché tutti gli uomini si aprano a una speranza nuova.\n\n[[VOCE: 2C]]\n\nRicòrdati anche dei nostri fratelli e delle nostre sorelle [N. e N.], che si sono addormentati nella pace del tuo Cristo, e di tutti i defunti, dei quali tu solo hai conosciuto la fede: ammettili a godere la luce del tuo volto e dona loro la pienezza di vita nella risurrezione. Concedi anche a noi, al termine del pellegrinaggio terreno, di giungere alla dimora eterna, dove vivremo sempre con te; e in comunione con la beata Maria, vergine e madre di Dio, san Giuseppe, gli apostoli e i martiri, sant'Ambrogio [san N.: santo del giorno o patrono] e tutti i santi,\n\n[[RUBRICA: Congiunge le mani.]]\n\nper Gesù Cristo, tuo Figlio, loderemo e proclameremo la tua grandezza.\n\n[[RUBRICA: Prende con una mano la patena su cui è l'ostia, e con l'altra il calice, ed, elevandoli insieme, canta o dice:]]\n\n[[VOCE: CP+CC]]\n\nPer Cristo, con Cristo e in Cristo, a te, Dio Padre onnipotente, nell'unità dello Spirito Santo, ogni onore e gloria per tutti i secoli dei secoli.\n[[R]]Amen."}],"anamnesi":{"titolo":"Mistero della fede (anamnesi)","opzioni":[{"etichetta":"Annunciamo la tua morte, Signore...","testo":"[[R]]Annunciamo la tua morte, Signore, proclamiamo la tua risurrezione, nell'attesa della tua venuta."},{"etichetta":"Ogni volta che mangiamo di questo pane...","testo":"[[R]]Ogni volta che mangiamo di questo pane e beviamo a questo calice annunciamo la tua morte, Signore, nell'attesa della tua venuta."},{"etichetta":"Tu ci hai redenti...","testo":"[[R]]Tu ci hai redenti con la tua croce e la tua risurrezione: salvaci, o Salvatore del mondo."}]}},{"titolo":"Introduzione al Padre nostro","opzioni":[{"etichetta":"1ª","testo":"Obbedienti alla parola del Salvatore e formati al suo divino insegnamento, osiamo dire:","rubrica":"Poi il sacerdote, a mani giunte, canta o dice queste parole o altre simili:"},{"etichetta":"2ª","testo":"Guidati dallo Spirito di Gesù e illuminati dalla sapienza del Vangelo, osiamo dire:","rubrica":"Poi il sacerdote, a mani giunte, canta o dice queste parole o altre simili:"},{"etichetta":"3ª","testo":"Dio Padre ha mandato nei nostri cuori lo Spirito del suo Figlio che grida: «Abbà, Padre!». Sia questo il nostro stesso grido mentre osiamo rivolgere a Dio la preghiera che Gesù stesso ci ha insegnato:","rubrica":"Poi il sacerdote, a mani giunte, canta o dice queste parole o altre simili:"},{"etichetta":"4ª","testo":"Con il Battesimo siamo diventati figli di Dio e come tali Dio stesso ci invita ora alla sua mensa; con gioiosa fiducia rivolgiamo a lui la preghiera che Gesù ci ha insegnato:","rubrica":"Poi il sacerdote, a mani giunte, canta o dice queste parole o altre simili:"},{"etichetta":"5ª","testo":"Elevando le mani verso il Padre che è nei cieli e lasciandoci guidare dallo Spirito Santo che prega in noi e per noi, diciamo insieme la preghiera che Gesù stesso ci ha insegnato:","rubrica":"Poi il sacerdote, a mani giunte, canta o dice queste parole o altre simili:"}]},{"titolo":"Padre nostro","opzioni":[{"etichetta":"Testo italiano","testo":"Padre nostro, che sei nei cieli, sia santificato il tuo nome, venga il tuo regno, sia fatta la tua volontà, come in cielo così in terra. Dacci oggi il nostro pane quotidiano, e rimetti a noi i nostri debiti come anche noi li rimettiamo ai nostri debitori, e non abbandonarci alla tentazione, ma liberaci dal male.","rubrica":"Con le braccia allargate, canta o dice insieme con il popolo:"},{"etichetta":"Testo latino","testo":"Pater noster, qui es in cælis: sanctificétur nomen tuum; advéniat regnum tuum; fiat volúntas tua, sicut in cælo, et in terra. Panem nostrum cotidiánum da nobis hódie; et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris; et ne nos indúcas in tentatiónem; sed líbera nos a malo.","rubrica":"Con le braccia allargate, canta o dice insieme con il popolo:"}]},{"titolo":"Embolismo (Liberaci, o Signore)","opzioni":[{"etichetta":"Testo","testo":"Liberaci, o Signore, da tutti i mali, concedi la pace ai nostri giorni, e con l'aiuto della tua misericordia vivremo sempre liberi dal peccato e sicuri da ogni turbamento, nell'attesa che si compia la beata speranza e venga il nostro salvatore Gesù Cristo.\n\n[[RUBRICA: Congiunge le mani. Il popolo conclude la preghiera con l'acclamazione:]]\n\n[[R]]Tuo è il regno, tua la potenza e la gloria nei secoli.","rubrica":"Solo il sacerdote, con le braccia allargate, continua:"}]},{"titolo":"Rito della pace (dopo il Padre nostro)","opzioni":[{"etichetta":"Formula","testo":"\n\n[[RUBRICA: Il sacerdote, con le braccia allargate, canta o dice ad alta voce:]]\n\nSignore Gesù Cristo, che hai detto ai tuoi apostoli: «Vi lascio la pace, vi do la mia pace», non guardare ai nostri peccati, ma alla fede della tua Chiesa, e donale unità e pace secondo la tua volontà. \n\n[[RUBRICA: Congiunge le mani.]]\n\nTu che vivi e regni nei secoli dei secoli.\n[[R]]Amen.\n\n[[RUBRICA: Il sacerdote, allargando e ricongiungendo le mani, canta o dice:]]\n\nLa pace e la comunione del Signore nostro Gesù Cristo siano sempre con voi.\n[[R]]E con il tuo spirito."}]},{"titolo":"Frazione del pane / Agnello di Dio","opzioni":[{"etichetta":"Formula","testo":"\n\n[[RUBRICA: Genuflette, prende l'ostia e, tenendola sollevata sulla patena o sul calice, rivolto al popolo, dice ad alta voce:]]\n\nEcco l'Agnello di Dio, ecco colui che toglie i peccati del mondo. Beati gli invitati alla cena dell'Agnello.\n\n[[RUBRICA: E continua, dicendo insieme con il popolo:]]\n\nO Signore, non sono degno di partecipare alla tua mensa, ma di' soltanto una parola e io sarò salvato."}],"note":"Il sacerdote spezza l'ostia sopra la patena o sopra il calice e ne lascia cadere un frammento nel calice (commistione), mentre si esegue il canto Allo spezzare del pane."},{"titolo":"Preghiera del sacerdote prima della comunione (sottovoce)","opzioni":[{"etichetta":"1ª","testo":"Signore Gesù Cristo, Figlio del Dio vivo, che per volontà del Padre e con l'opera dello Spirito Santo morendo hai dato la vita al mondo, per il santo mistero del tuo Corpo e del tuo Sangue liberami da ogni colpa e da ogni male, fa' che sia sempre fedele alla tua legge e non sia mai separato da te.","rubrica":"Il sacerdote, con le mani giunte, dice sottovoce:"},{"etichetta":"2ª","testo":"La comunione con il tuo Corpo e il tuo Sangue, Signore Gesù Cristo, non diventi per me giudizio di condanna, ma per tua misericordia sia rimedio e difesa dell'anima e del corpo.","rubrica":"Il sacerdote, con le mani giunte, dice sottovoce:"}]},{"titolo":"Antifona alla comunione del popolo","opzioni":[{"etichetta":"Formula","testo":"Il Corpo di Cristo.\n[[R]]Amen.","rubrica":"Il sacerdote presenta a ognuno l'ostia, dicendo «Il Corpo di Cristo»; il comunicando risponde:"}],"note":"Il sacerdote presenta a ognuno l'ostia dicendo «Il Corpo di Cristo»; il comunicando risponde «Amen»."},{"titolo":"Orazione dopo la comunione","opzioni":[{"etichetta":"Testo libero (proprio del giorno)","testo":"","rubrica":"Il sacerdote, con le braccia allargate, canta o dice l'orazione, che termina con la conclusione breve."}],"note":"Il sacerdote canta o dice l'orazione propria del giorno; termina con la conclusione breve. Prima si può osservare il sacro silenzio o cantare un salmo di ringraziamento."}]},{"titolo":"Riti di conclusione","blocchi":[{"titolo":"Avvisi al popolo","opzioni":[{"etichetta":"Appunti (spazio per note)","testo":""}],"note_formattabile":true},{"titolo":"Saluto prima della benedizione finale","opzioni":[{"etichetta":"Formula semplice","testo":"Il Signore sia con voi.\n[[R]]E con il tuo spirito. Kýrie eléison. Kýrie eléison. Kýrie eléison.","rubrica":"Il sacerdote, rivolto verso il popolo, con le braccia allargate, dice:"}]},{"titolo":"Benedizione finale semplice","opzioni":[{"etichetta":"Formula del sacerdote","testo":"\n\n[[RUBRICA: Il sacerdote benedice il popolo:]]\n\nVi benedica Dio onnipotente, Padre e Figlio ✠ e Spirito Santo.\n[[R]]Amen."},{"etichetta":"Formula del vescovo","testo":"Sia benedetto il nome del Signore.\nOra e sempre.\n\nIl nostro aiuto è nel nome del Signore.\nEgli ha fatto cielo e terra.\n\nVi benedica Dio onnipotente, Padre ✠ e Figlio ✠ e Spirito ✠ Santo.\n[[R]]Amen.","rubrica":"Nel benedire il popolo, il vescovo usa questa formula:"}]},{"titolo":"Benedizione episcopale","opzioni":[{"etichetta":"Formula","testo":"Sia benedetto il nome del Signore.\n[[R]]Ora e sempre.\n\nIl nostro aiuto è nel nome del Signore.\n[[R]]Egli ha fatto cielo e terra.\n\nVi benedica Dio onnipotente, Padre ✠ e Figlio ✠ e Spirito ✠ Santo.\n[[R]]Amen.","rubrica":"Nel benedire il popolo, il vescovo usa questa formula:"}],"note":"Da usare al posto della \"Benedizione finale semplice\" quando la Messa è celebrata dal vescovo."},{"titolo":"Benedizione solenne (facoltativa, in alternativa alla benedizione semplice)","opzioni":[{"etichetta":"Nell'Avvento","testo":"Dio onnipotente e misericordioso, che vi dà la grazia di commemorare nella fede la prima venuta del suo Figlio e di attendere nella speranza il suo avvento glorioso, vi santifichi ora con la luce della sua visita e vi colmi della sua benedizione.\n[[R]]Amen.\n\nNel cammino di questa vita, Dio vi renda saldi nella fede, gioiosi nella speranza, operosi nella carità.\n[[R]]Amen.\n\nVoi che vi rallegrate per la venuta del nostro Redentore, possiate godere della gioia eterna, quando egli verrà nella gloria.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nel Natale del Signore e nel tempo natalizio","testo":"Dio di immensa bontà, che ha rischiarato le tenebre del mondo con l'incarnazione di Cristo, suo Figlio, e nella sua gloriosa nascita ha inondato di luce questa notte (questo giorno / questo tempo) santissima(o), allontani da voi le tenebre del male e vi illumini con la luce del bene.\n[[R]]Amen.\n\nDio, che mandò gli angeli a recare ai pastori il lieto annuncio del Natale, vi riempia della sua gioia e vi faccia annunciatori del suo Vangelo.\n[[R]]Amen.\n\nDio, che nel suo Figlio fatto uomo ha congiunto la terra al cielo, vi riempia della sua pace e del suo amore e vi renda partecipi dell'assemblea dei santi.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"All'inizio dell'anno","testo":"Dio, sorgente e principio di ogni benedizione, effonda su di voi la sua grazia e vi doni per tutto l'anno vita e salute.\n[[R]]Amen.\n\nDio vi custodisca integri nella fede, pazienti nella speranza, perseveranti nella carità.\n[[R]]Amen.\n\nDio disponga opere e giorni nella sua pace, ascolti ora e sempre le vostre preghiere e vi conduca alla felicità eterna.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nell'Epifania del Signore","testo":"Dio, che dalle tenebre vi ha chiamato alla sua luce mirabile, effonda su di voi la sua benedizione e vi renda saldi nella fede, nella speranza e nella carità.\n[[R]]Amen.\n\nDio vi faccia testimoni della sua verità, come veri discepoli di Cristo, luce che splende nelle nostre tenebre.\n[[R]]Amen.\n\nCome i santi Magi, al termine del vostro cammino possiate trovare, con immensa gioia, Cristo, luce del mondo.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella Quaresima","testo":"Dio, Padre misericordioso, conceda a tutti voi il dono di una penitenza salutare, perché possiate giungere rinnovati alla gioia della Pasqua.\n[[R]]Amen.\n\nCristo, modello di preghiera e di vita, vi guidi nel cammino della quaresima all'autentica conversione del cuore.\n[[R]]Amen.\n\nLo Spirito di sapienza e di fortezza vi sostenga nella lotta contro il Maligno, perché possiate celebrare con Cristo la vittoria pasquale.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella Domenica delle Palme e alla Messa nella Cena del Signore","testo":"Il Padre di misericordia, che nella passione del suo Figlio ci ha manifestato la grandezza del suo amore, conceda a voi, nel servizio di Dio e degli uomini, il dono della sua benedizione.\n[[R]]Amen.\n\nCristo Signore, che nella sua passione ci ha salvato dalla morte eterna, vi conceda la vita senza fine.\n[[R]]Amen.\n\nVoi, che seguite Cristo umiliato e sofferente, possiate aver parte alla sua risurrezione.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella Veglia pasquale e nel giorno di Pasqua","testo":"In questa(o) santa(o) notte (giorno) di Pasqua, vi riempia di gioia Dio onnipotente e vi custodisca da ogni peccato.\n[[R]]Amen.\n\nDio, che nella risurrezione del suo Figlio ha rinnovato l'umanità intera, vi renda partecipi della sua vita immortale.\n[[R]]Amen.\n\nVoi, che dopo i giorni della passione celebrate con gioia la risurrezione del Signore, possiate giungere alla grande festa della Pasqua eterna.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nel tempo pasquale","testo":"Dio, che nella risurrezione del Cristo ha operato la nostra salvezza e ci ha fatto suoi figli, vi dia la gioia della sua benedizione.\n[[R]]Amen.\n\nIl Redentore, che ci ha dato il dono della vera libertà, vi renda partecipi dell'eredità eterna.\n[[R]]Amen.\n\nE voi, che per mezzo del Battesimo siete risorti con lui nella fede, possiate meritare, in santità di vita, d'incontrarlo un giorno nella patria del cielo.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nell'Ascensione del Signore","testo":"Dio onnipotente vi benedica nel giorno in cui il suo unico Figlio è asceso al cielo e vi ha aperto la via perché possiate anche voi salire fino a lui.\n[[R]]Amen.\n\nCristo, che dopo la sua risurrezione apparve visibilmente ai suoi discepoli, si mostri a voi giudice misericordioso e vi conduca all'eredità eterna.\n[[R]]Amen.\n\nIl mistero, che oggi professate nella fede, diventi un giorno eredità senza fine, quando Cristo, nella gloria del Padre, vi chiamerà alla gioia promessa.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella Domenica di Pentecoste","testo":"Dio, sorgente di ogni luce, che oggi ha illuminato la mente dei discepoli con l'effusione dello Spirito consolatore, vi benedica e vi colmi dei suoi doni.\n[[R]]Amen.\n\nIl fuoco dello Spirito Santo, che apparve mirabilmente sui discepoli, vi purifichi da ogni male e v'illumini tutti con il suo vivo splendore.\n[[R]]Amen.\n\nLo Spirito Santo, che ha riunito popoli diversi nell'unica Chiesa di Cristo, vi renda perseveranti nella fede e gioiosi nella speranza perché possiate giungere alla visione beata del cielo.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nei tempi dopo l'Epifania e dopo Pentecoste — 1 (Benedizione di Aronne)","testo":"Il Signore vi benedica e vi protegga.\n[[R]]Amen.\n\nFaccia risplendere il suo volto su di voi e vi doni la sua misericordia.\n[[R]]Amen.\n\nRivolga su di voi il suo sguardo e vi doni la sua pace.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nei tempi dopo l'Epifania e dopo Pentecoste — 2","testo":"Dio onnipotente e misericordioso vi protegga e vi dia il dono della vera sapienza, apportatrice di salvezza.\n[[R]]Amen.\n\nVi illumini sempre con gli insegnamenti della fede e vi aiuti a perseverare nel bene.\n[[R]]Amen.\n\nVi mostri la via della verità e della pace e guidi i vostri passi nel cammino verso la vita eterna.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nei tempi dopo l'Epifania e dopo Pentecoste — 3","testo":"Dio di ogni consolazione disponga nella sua pace i vostri giorni e vi conceda i doni della sua grazia.\n[[R]]Amen.\n\nVi liberi sempre da ogni pericolo e confermi nel suo amore i vostri cuori.\n[[R]]Amen.\n\nVi colmi di fede, di speranza e di carità perché sia ricca di opere buone la vostra vita terrena e possiate giungere alla gioia della vita eterna.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nei tempi dopo l'Epifania e dopo Pentecoste — 4","testo":"Dio onnipotente allontani da voi ogni male e vi conceda la ricchezza dei suoi doni.\n[[R]]Amen.\n\nRenda attenti i vostri cuori alla sua parola perché possiate godere la gioia senza fine.\n[[R]]Amen.\n\nVi aiuti a comprendere ciò che è buono e giusto perché, camminando sulla via dei suoi precetti, diventiate coeredi della città eterna.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nei tempi dopo l'Epifania e dopo Pentecoste — 5 (Fil 4,7)","testo":"La pace di Di  tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella solennità dei santi Pietro e Paolo","testo":"Dio onnipotente che ha fondato la Chiesa nella fede dell'apostolo Pietro, vi renda saldi nell'adesione a Cristo.\n[[R]]Amen.\n\nDio che ha illuminato le genti con la predicazione dell'apostolo Paolo, vi conceda di condurre a Cristo i vostri fratelli.\n[[R]]Amen.\n\nI due apostoli con la loro intercessione vi aiutino a raggiungere la gloria del cielo, che essi hanno meritato con il martirio.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nella solennità di Tutti i Santi","testo":"Dio, gloria e letizia dei santi, che ci concede di celebrare questa solennità, vi accompagni con la sua grazia.\n[[R]]Amen.\n\nL'intercessione dei santi vi liberi dai mali presenti, e i loro esempi vi spronino a una vita generosa nel servizio di Dio e dei fratelli.\n[[R]]Amen.\n\nPossiate godere, con tutti i santi, la pace e la gioia di quella patria nella quale la Chiesa esulta in eterno per la comunione gloriosa di tutti i suoi figli.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."},{"etichetta":"Nelle celebrazioni per i defunti","testo":"Dio di ogni consolazione, che nella sua bontà ha creato l'uomo e con la risurrezione del suo Figlio ha dato ai credenti la speranza di risorgere, effonda su di voi i doni della sua grazia.\n[[R]]Amen.\n\nA noi ancora pellegrini su questa terra doni la remissione dei peccati e a tutti i defunti la luce e la pace eterna.\n[[R]]Amen.\n\nA tutti noi che crediamo in Cristo risorto conceda Dio Padre la felicità del suo regno.\n[[R]]Amen.\n\nE la benedizione di Dio onnipotente, Padre e Figlio ✠ e Spirito Santo, discenda su di voi e con voi rimanga sempre.\n[[R]]Amen.","rubrica":"Il diacono, o il sacerdote, invita il popolo a inchinarsi; segue la formula in tre invocazioni, a cui il popolo risponde «Amen» dopo ciascuna, quindi la conclusione con il segno di croce."}],"note":"Il diacono (o il sacerdote) invita: «Inchinatevi per la benedizione». Il sacerdote, con le mani stese sul popolo, pronuncia la benedizione scelta e tutti rispondono «Amen» dopo ogni invocazione."},{"titolo":"Congedo","opzioni":[{"etichetta":"Formula","testo":"Andiamo in pace.\n[[R]]Nel nome di Cristo.","rubrica":"Il diacono, o il sacerdote, congeda il popolo:"}]}]},{"titolo":"Riti particolari (facoltativi)","blocchi":[{"titolo":"Benedizione e imposizione delle ceneri — Monizione e orazione","opzioni":[{"etichetta":"Orazione 1","testo":"Raccogliamoci, sorelle e fratelli carissimi, in umile preghiera davanti a Dio nostro Padre perché faccia scendere su di noi la sua benedizione e accolga l'atto penitenziale che stiamo per compiere.\n\nPadre buono e santo, ascolta la nostra voce: un tempo ti sei mosso a pietà degli abitanti di Ninive che, cosparsi di cenere, invocavano da te misericordia; guarda adesso l'umiltà del nostro rito: benedici ✠ questa cenere che ci poniamo sul capo fiduciosi nella tua clemenza ed esercita su di noi la tua azione santificatrice perché tutti i credenti, con questo gesto di penitenza, ottengano la grazia della conversione interiore e il perdono dei loro peccati. Per Gesù Cristo, tuo Figlio, nostro Signore e nostro Dio, che vive e regna con te, nell'unità dello Spirito Santo, per tutti i secoli dei secoli.\n[[R]]Amen.","rubrica":"Il sacerdote, a mani giunte, invita il popolo alla preghiera, poi, allargando le braccia, dice l'orazione di benedizione della cenere."},{"etichetta":"Orazione 2","testo":"Raccogliamoci, sorelle e fratelli carissimi, in umile preghiera davanti a Dio nostro Padre perché faccia scendere su di noi la sua benedizione e accolga l'atto penitenziale che stiamo per compiere.\n\nO Dio, che hai pietà di chi si pente e doni la tua pace a chi si converte, accogli con paterna bontà la preghiera del tuo popolo e benedici ✠ questi tuoi figli, che riceveranno l'austero simbolo delle ceneri, perché, attraverso l'itinerario spirituale della quaresima, giungano interiormente rinnovati a celebrare la Pasqua del tuo Figlio, Gesù Cristo. Per lui, nostro Signore e nostro Dio, che vive e regna con te, nell'unità dello Spirito Santo, per tutti i secoli dei secoli.\n[[R]]Amen.","rubrica":"Il sacerdote, a mani giunte, invita il popolo alla preghiera, poi, allargando le braccia, dice l'orazione di benedizione della cenere."},{"etichetta":"Orazione 3","testo":"Raccogliamoci, sorelle e fratelli carissimi, in umile preghiera davanti a Dio nostro Padre perché faccia scendere su di noi la sua benedizione e accolga l'atto penitenziale che stiamo per compiere.\n\nO Dio, che non vuoi la morte ma la conversione dei peccatori, ascolta benigno la nostra preghiera: benedici ✠ queste ceneri, che stiamo per imporre sul nostro capo, riconoscendo che il nostro corpo tornerà in polvere; l'esercizio della penitenza quaresimale ci ottenga il perdono dei peccati e una vita rinnovata a immagine del Crocifisso Risorto. Per lui, nostro Signore e nostro Dio, che vive e regna con te, nell'unità dello Spirito Santo, per tutti i secoli dei secoli.\n[[R]]Amen.","rubrica":"Il sacerdote, a mani giunte, invita il popolo alla preghiera, poi, allargando le braccia, dice l'orazione di benedizione della cenere."}],"note":"Il rito si compie dopo la Messa del primo lunedì di quaresima (o, per ragioni pastorali, dopo le Messe della prima domenica); se anticipato,
